<div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current Password</label><input id="cPw" class="ifield" type="password" placeholder="Enter current password"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Password</label><input id="nPw" class="ifield" type="password" placeholder="Min 6 characters"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Confirm New Password</label><input id="nPw2" class="ifield" type="password" placeholder="Confirm new password"></div><button class="bp" onclick="chPassword()"><i class="fa-solid fa-lock"></i> Change Password</button></div></div>'}

function sPr(){var n=document.getElementById('sN').value.trim(),b=document.getElementById('sB').value.trim();if(!n){toast('Name required','er');return}D.uU(CU.uid,{displayName:n,bio:b}).then(function(d){CU=d;toast('Profile saved!','ok')})}

function chUsername(){var nu=document.getElementById('nUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return}if(nu===CU.username){toast('Same as current','er');return}D.gUN(nu).then(function(ex){if(ex){toast('Username taken','er');return null}return D.gUE(nu)}).then(function(ue){if(ue&&ue.uid!==CU.uid){toast('Username taken','er');return null}return D.gUE(CU.username)}).then(function(ue2){return D.chUn(CU.username,nu,CU.uid,ue2?ue2.email:null)}).then(function(){return D.uU(CU.uid,{username:nu})}).then(function(d){CU=d;toast('Username changed to @'+nu,'ok');rDT();document.querySelector('.duinfo').innerHTML='<span>@'+E(CU.username)+'</span><br>UID '+(CU.uidNumber||'--')}).catch(function(e){toast(e.message||'Error','er')})}

function chPassword(){var cp=document.getElementById('cPw').value,np=document.getElementById('nPw').value,np2=document.getElementById('nPw2').value;if(!cp||!np){toast('Fill in all fields','er');return}if(np.length<6){toast('Min 6 chars','er');return}if(np!==np2){toast('Passwords do not match','er');return}var cred=firebase.auth.EmailAuthProvider.credential(auth.currentUser.email,cp);auth.currentUser.reauthenticateWithCredential(cred).then(function(){return auth.currentUser.updatePassword(np)}).then(function(){toast('Password changed!','ok');document.getElementById('cPw').value='';document.getElementById('nPw').value='';document.getElementById('nPw2').value=''}).catch(function(e){if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')toast('Wrong password','er');else toast(e.message,'er')})}

function dCu(u){var m=u.music||{};var tCount=(m.tracks||[]).length;
return'<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Customise</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Avatar</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL.</p><div style="display:flex;align-items:center;gap:16px;margin-bottom:14px"><div style="width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0">'+(u.avatar?'<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover">':'<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:700;font-size:24px;color:var(--bg)">'+(u.displayName||'?')[0].toUpperCase()+'</div>')+'</div><div style="flex:1"><input id="cAv" class="ifield" type="url" placeholder="https://example.com/avatar.png" value="'+E(u.avatar||'')+'"></div></div></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Background</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL for your profile background.</p>'+(u.backgroundUrl?'<div style="width:100%;height:120px;border-radius:10px;overflow:hidden;margin-bottom:14px;background:var(--bg);border:1px solid var(--border)"><img src="'+u.backgroundUrl+'" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'"></div>':'')+'<input id="cBg" class="ifield" type="url" placeholder="https://example.com/background.jpg" value="'+E(u.backgroundUrl||'')+'"></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Theme Color</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">'+['#f472b6','#fb7185','#f43f5e','#f97316','#fbbf24','#22c55e','#14b8a6','#06b6d4','#3b82f6','#a855f7'].map(function(c){return'<button onclick="pTC(\''+c+'\')" style="width:38px;height:38px;border-radius:10px;background:'+c+';border:2px solid '+(u.themeColor===c?'#fff':'transparent')+';cursor:pointer" title="'+c+'"></button>'}).join('')+'</div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:7px">Custom Color</label><div style="display:flex;gap:10px;align-items:center"><input type="color" id="ccI" value="'+(u.themeColor||'#f472b6')+'" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none"><span id="ccV" style="font-size:13px;color:var(--fg2)">'+(u.themeColor||'#f472b6')+'</span></div></div></div><div class="card" style="margin-bottom:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div style="display:flex;align-items:center;gap:10px"><h3 class="font-display" style="font-size:15px;font-weight:600">Music Player</h3><i class="fa-solid fa-music" style="color:var(--accent);font-size:13px"></i></div><span style="font-size:12px;color:var(--muted);background:var(--bg2);padding:3px 10px;border-radius:6px">'+tCount+' track'+(tCount!==1?'s':'')+'</span></div><p style="color:var(--fg2);font-size:13px;margin-bottom:16px">Add songs, set shuffle, and enable the player on your profile.</p><button class="bs" onclick="openAM()" style="width:100%;justify-content:center"><i class="fa-solid fa-sliders"></i> Open Audio Manager</button></div><button class="bp" onclick="saveAllCustom()" style="width:100%;justify-content:center;padding:12px"><i class="fa-solid fa-floppy-disk"></i> Save All Customisation</button>'}

function pTC(c){document.getElementById('ccI').value=c;document.getElementById('ccV').textContent=c;document.querySelectorAll('.card button[onclick^="pTC"]').forEach(function(b){b.style.borderColor=b.getAttribute('onclick').indexOf(c)>-1?'#fff':'transparent'})}

function saveAllCustom(){var a=document.getElementById('cAv').value.trim(),b=document.getElementById('cBg').value.trim(),c=document.getElementById('ccI').value;D.uU(CU.uid,{avatar:a,backgroundUrl:b,themeColor:c}).then(function(d){CU=d;toast('All customisation saved!','ok');rDT()})}

function dLn(u){var lHt=u.links.map(function(l,i){return'<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+E(l.title)+'</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+E(l.url)+'</div></div><button onclick="eLink('+i+')" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:none;color:var(--muted);cursor:pointer;flex-shrink:0" title="Delete"><i class="fa-solid fa-trash" style="font-size:11px"></i></button></div>'}).join('');
return'<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Links</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Add New Link</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Title</label><input id="lT" class="ifield" type="text" placeholder="My Website"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">URL</label><input id="lU" class="ifield" type="url" placeholder="https://example.com"></div><button class="bp" onclick="aLink()"><i class="fa-solid fa-plus"></i> Add Link</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:14px">Your Links ('+u.links.length+')</h3>'+(lHt||'<p style="color:var(--muted);font-size:13px">No links added yet.</p>')+'</div>'}

function aLink(){var t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();if(!t||!u){toast('Fill in all fields','er');return}var links=[].concat(CU.links||[]);links.push({title:t,url:u});D.uU(CU.uid,{links:links}).then(function(d){CU=d;toast('Link added!','ok');rDT()})}

function eLink(i){var links=[].concat(CU.links||[]);links.splice(i,1);D.uU(CU.uid,{links:links}).then(function(d){CU=d;toast('Link removed','in');rDT()})}

/* ===== ADMIN ===== */
function pAdmin(){return'<div class="dash-wrap"><div class="aside"><div class="anav on" onclick="sAT(\'users\')" id="an-users"><i class="fa-solid fa-users"></i>Users</div></div><div class="abody" id="aC"></div></div>'}

function rAC(){document.getElementById('aC').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>';D.aU().then(function(users){users.sort(function(a,b){return(b.views||0)-(a.views||0)});var tH='<table class="utbl"><thead><tr><th>User</th><th>Username</th><th>UID</th><th>Role</th><th>Views</th><th>Links</th><th>Actions</th></tr></thead><tbody>'+users.map(function(u){return'<tr><td style="font-weight:500">'+E(u.displayName||'-')+'</td><td style="color:var(--accent)">@'+E(u.username)+'</td><td style="color:var(--muted)">'+(u.uidNumber||'--')+'</td><td>'+rT(u.role)+'</td><td>'+(u.views||0)+'</td><td>'+(u.links||[]).length+'</td><td><div style="display:flex;gap:6px"><button class="bs bsm" onclick="eUser(\''+u.uid+'\')">Edit</button>'+(u.banned?'<button class="bs bsm" onclick="uBan(\''+u.uid+'\',false)" style="color:var(--success);border-color:rgba(34,197,94,0.3)">Unban</button>':'<button class="bd bsm" onclick="uBan(\''+u.uid+'\',true)">Ban</button>')+'</div></td></tr>'}).join('')+'</tbody></table>';document.getElementById('aC').innerHTML='<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Admin Panel</h2><div class="card">'+tH+'</div>'})}

function eUser(uid){showModal('Edit User','<div id="eUF">Loading...</div>',[{l:'Save',c:'bp',a:"sEU('"+uid+"')"},{l:'Cancel',c:'bs',a:'clM()'}]);loadEU(uid)}

function loadEU(uid){D.gU(uid).then(function(u){if(!u){document.getElementById('eUF').innerHTML='<p style="color:var(--danger)">User not found</p>';return}var rO=Object.keys(RL).filter(function(r){return canEdit(r,CU.role)});var bO=u.badges||[];document.getElementById('eUF').innerHTML='<div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="eN" class="ifield" type="text" value="'+E(u.displayName||'')+'"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Role</label><select id="eR" class="ifield">'+rO.map(function(r){return'<option value="'+r+'" '+(u.role===r?'selected':'')+'>'+r.charAt(0).toUpperCase()+r.slice(1)+'</option>'}).join('')+'</select></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Badges</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+Object.keys(BG).map(function(k){return'<label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="'+k+'" '+(bO.includes(k)?'checked':'')+' style="accent-color:var(--accent)"> '+BG[k].n+'</label>'}).join('')+'</div></div>'+(canEditUID(CU.role)?'<div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">UID Number</label><input id="eUID" class="ifield" type="number" value="'+(u.uidNumber||'')+'"></div>':'')+'</div>'})}

function sEU(uid){var n=document.getElementById('eN').value.trim();var r=document.getElementById('eR').value;var bgs=Array.from(document.querySelectorAll('#eUF input[type=checkbox]:checked')).map(function(c){return c.value});var up={displayName:n,role:r,badges:bgs};if(canEditUID(CU.role)){var uidNum=parseInt(document.getElementById('eUID').value);if(!isNaN(uidNum))up.uidNumber=uidNum}D.uU(uid,up).then(function(){toast('User updated!','ok');clM();rAC()})}

function uBan(uid,b){D.uU(uid,{banned:b}).then(function(){toast(b?'User banned':'User unbanned','in');rAC()})}

restoreSess().then(function(){router()});
