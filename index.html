function bH(k,sn){const b=BG[k];if(!b)return'';return`<span class="badge btip" data-tip="${b.d}" style="background:${b.bg};color:${b.c};">${b.s}${sn?' '+b.n:''}</span>`}

function E(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function lI(u){if(!u)return'fa-solid fa-link';const l=u.toLowerCase();if(l.includes('github'))return'fa-brands fa-github';if(l.includes('twitter')||l.includes('x.com'))return'fa-brands fa-x-twitter';if(l.includes('discord'))return'fa-brands fa-discord';if(l.includes('youtube'))return'fa-brands fa-youtube';if(l.includes('twitch'))return'fa-brands fa-twitch';if(l.includes('spotify'))return'fa-brands fa-spotify';if(l.includes('instagram'))return'fa-brands fa-instagram';if(l.includes('tiktok'))return'fa-brands fa-tiktok';if(l.includes('reddit'))return'fa-brands fa-reddit';if(l.includes('steam'))return'fa-brands fa-steam';if(l.includes('telegram'))return'fa-brands fa-telegram';return'fa-solid fa-arrow-up-right-from-square'}
function canEdit(tr,mr){if(mr==='owner')return true;return RL[mr]>RL[tr]}

const D={
  async gU(uid){try{const d=await db.collection('users').doc(uid).get();return d.exists?d.data():null}catch(e){return null}},
  async gUN(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();return s.empty?null:s.docs[0].data()}catch(e){return null}},
  async gUE(un){try{const d=await db.collection('usernames').doc(un).get();return d.exists?d.data():null}catch(e){return null}},
  async getNextUid(){const ref=db.collection('config').doc('counter');return db.runTransaction(async t=>{const d=await t.get(ref);let n=1;if(d.exists)n=(d.data().nextUid||0)+1;t.set(ref,{nextUid:n},{merge:true});return n})},
  async cU(uid,d){const num=await this.getNextUid();const u={uid,uidNumber:num,displayName:d.displayName||'',username:d.username||'',bio:'',avatar:'',backgroundUrl:'',links:[],badges:[],activeBadges:[],role:'user',banned:false,createdAt:Date.now(),views:0,themeColor:'#f472b6',musicEnabled:false,songs:[]};await db.collection('users').doc(uid).set(u);if(d.username&&d.email)await db.collection('usernames').doc(d.username).set({uid:uid,email:d.email});return u},
  async uU(uid,d){await db.collection('users').doc(uid).update(d);return this.gU(uid)},
  async dU(uid){const u=await this.gU(uid);if(u&&u.username){try{await db.collection('usernames').doc(u.username).delete()}catch(e){}}await db.collection('users').doc(uid).delete()},
  async aU(){try{const s=await db.collection('users').get();return s.docs.map(d=>d.data())}catch(e){return[]}},
  async iV(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();if(!s.empty){const r=s.docs[0].ref;await db.runTransaction(async t=>{const d=await t.get(r);if(d.exists)t.update(r,{views:(d.data().views||0)+1})})}}catch(e){}},
  async chUn(o,n,uid,email){if(o){try{await db.collection('usernames').doc(o).delete()}catch(e){}}if(n&&email)await db.collection('usernames').doc(n).set({uid:uid,email:email})},
  async gByUidNum(num){try{const s=await db.collection('users').where('uidNumber','==',num).limit(1).get();return s.empty?null:s.docs[0].data()}catch(e){return null}}
};

let CU=null,dTab='overview';

/* Music Player State */
let mpAudio=null,mpSongs=[],mpIdx=0,mpShuffle=false,mpLoop=false,mpUpdateInt=null,mpShuffleOrder=[],mpShufflePos=0;

function stopProfileAudio(){if(mpAudio){mpAudio.pause();mpAudio.src='';mpAudio=null}stopMpTick();mpSongs=[];mpIdx=0;mpShuffle=false;mpLoop=false;mpShuffleOrder=[];mpShufflePos=0}

function fmtTime(s){if(isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}

function startMpTick(){if(mpUpdateInt)return;mpUpdateInt=setInterval(tickMp,200)}
function stopMpTick(){if(mpUpdateInt){clearInterval(mpUpdateInt);mpUpdateInt=null}}

function tickMp(){const a=document.getElementById('mpAudio');if(!a||a.paused){stopMpTick();return}
const cur=a.currentTime,dur=a.duration||0;
const cE=document.getElementById('mpCur'),dE=document.getElementById('mpDur'),fE=document.getElementById('mpFill');
if(cE)cE.textContent=fmtTime(cur);if(dE)dE.textContent=fmtTime(dur);if(fE)fE.style.width=dur?(cur/dur*100)+'%':'0%'}

function loadSong(idx){if(!mpSongs.length)return;mpIdx=idx;const s=mpSongs[idx];const a=document.getElementById('mpAudio');if(!a)return;
a.src=s.audioUrl;a.load();
const bg=document.querySelector('.mp-bg');if(bg)bg.style.backgroundImage=s.coverUrl?`url('${s.coverUrl}')`:'none';
const cv=document.querySelector('.mp-cover');if(cv){cv.innerHTML=s.coverUrl?`<img src="${s.coverUrl}">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2)88);display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-music" style="color:var(--bg);font-size:18px"></i></div>`}
const tE=document.getElementById('mpTitle');if(tE)tE.textContent=s.title||'Untitled';
const aE=document.getElementById('mpArtist');if(aE)aE.textContent=s.artist||'Unknown Artist';
document.querySelectorAll('.mp-si').forEach((el,i)=>{el.classList.toggle('cur',i===idx)});
const fE=document.getElementById('mpFill');if(fE)fE.style.width='0%';
const cE=document.getElementById('mpCur');if(cE)cE.textContent='0:00';
const dE=document.getElementById('mpDur');if(dE)dE.textContent='0:00';
const pb=document.getElementById('mpPlayBtn');if(pb)pb.innerHTML='<i class="fa-solid fa-play"></i>';
stopMpTick()}

function togglePlay(){const a=document.getElementById('mpAudio');if(!a||!a.src)return;mpAudio=a;
if(a.paused){a.play().catch(()=>toast('Could not play audio','er'));document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';startMpTick()}else{a.pause();document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-play"></i>';stopMpTick()}}

function mpPrev(){if(!mpSongs.length)return;let ni;const a=document.getElementById('mpAudio');
if(a&&a.currentTime>3){a.currentTime=0;return}
if(mpShuffle){mpShufflePos=Math.max(0,mpShufflePos-1);ni=mpShuffleOrder[mpShufflePos]}else{ni=(mpIdx-1+mpSongs.length)%mpSongs.length}
const wasPlaying=a&&!a.paused;loadSong(ni);if(wasPlaying){setTimeout(()=>{const na=document.getElementById('mpAudio');if(na){na.play().catch(()=>{});document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';startMpTick()}},100)}}

function mpNext(){if(!mpSongs.length)return;let ni;const a=document.getElementById('mpAudio');const wasPlaying=a&&!a.paused;
if(mpShuffle){mpShufflePos++;if(mpShufflePos>=mpShuffleOrder.length){genShuffleOrder();mpShufflePos=0}ni=mpShuffleOrder[mpShufflePos]}else{ni=(mpIdx+1)%mpSongs.length}
loadSong(ni);if(wasPlaying){setTimeout(()=>{const na=document.getElementById('mpAudio');if(na){na.play().catch(()=>{});document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';startMpTick()}},100)}}

function toggleShuffle(){mpShuffle=!mpShuffle;const b=document.getElementById('mpShufBtn');if(b)b.classList.toggle('active',mpShuffle);
if(mpShuffle){genShuffleOrder();mpShufflePos=0;const curInShuf=mpShuffleOrder.indexOf(mpIdx);if(curInShuf>=0)mpShufflePos=curInShuf}else{mpShuffleOrder=[];mpShufflePos=0}}

function genShuffleOrder(){const n=mpSongs.length;mpShuffleOrder=Array.from({length:n},(_,i)=>i);
for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mpShuffleOrder[i],mpShuffleOrder[j]]=[mpShuffleOrder[j],mpShuffleOrder[i]]}
const cur=mpShuffleOrder.indexOf(mpIdx);if(cur>0){mpShuffleOrder.splice(cur,1);mpShuffleOrder.unshift(mpIdx)}}

function toggleLoop(){mpLoop=!mpLoop;const a=document.getElementById('mpAudio');if(a)a.loop=mpLoop;const b=document.getElementById('mpLoopBtn');if(b)b.classList.toggle('active',mpLoop)}

function toggleSongList(){const el=document.getElementById('mpSList');if(el)el.classList.toggle('open')}

function selectSong(idx){toggleSongList();const wasPlaying=mpAudio&&!mpAudio.paused;loadSong(idx);if(wasPlaying){setTimeout(()=>{const a=document.getElementById('mpAudio');if(a){a.play().catch(()=>{});document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-pause"></i>';startMpTick()}},100)}}

function seekMp(e){const a=document.getElementById('mpAudio');if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));a.currentTime=pct*a.duration}

function buildPlayer(songs,tc){mpSongs=songs||[];mpIdx=0;mpShuffle=false;mpLoop=false;mpShuffleOrder=[];mpShufflePos=0;
if(!mpSongs.length)return'';
const s=mpSongs[0];
const listHtml=mpSongs.map((sg,i)=>`<div class="mp-si${i===0?' cur':''}" onclick="event.stopPropagation();selectSong(${i})"><div class="mp-si-cover">${sg.coverUrl?`<img src="${sg.coverUrl}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-music" style="color:var(--muted);font-size:11px"></i></div>`}</div><div class="mp-si-info"><div class="mp-si-title">${E(sg.title||'Untitled')}</div><div class="mp-si-artist">${E(sg.artist||'Unknown')}</div></div></div>`).join('');
return`<div class="mplayer"><div class="mp-bg" style="background-image:url('${E(s.coverUrl||'')}')"></div><div class="mp-inner"><div class="mp-bar"><div class="mp-cover">${s.coverUrl?`<img src="${s.coverUrl}">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${tc||'var(--accent)'},${tc||'var(--accent)'}88);display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-music" style="color:var(--bg);font-size:18px"></i></div>`}</div><div class="mp-info" onclick="event.stopPropagation();toggleSongList()"><div class="mp-title" id="mpTitle">${E(s.title||'Untitled')} <i class="fa-solid fa-chevron-up" style="font-size:9px;color:var(--muted);margin-left:4px"></i></div><div class="mp-artist" id="mpArtist">${E(s.artist||'Unknown Artist')}</div><div class="mp-slist" id="mpSList">${listHtml}</div></div><div class="mp-ctrls"><button class="mp-cbtn" id="mpShufBtn" onclick="event.stopPropagation();toggleShuffle()" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button><button class="mp-cbtn" onclick="event.stopPropagation();mpPrev()" title="Previous"><i class="fa-solid fa-backward-step"></i></button><button class="mp-play" id="mpPlayBtn" onclick="event.stopPropagation();togglePlay()"><i class="fa-solid fa-play"></i></button><button class="mp-cbtn" onclick="event.stopPropagation();mpNext()" title="Next"><i class="fa-solid fa-forward-step"></i></button><button class="mp-cbtn" id="mpLoopBtn" onclick="event.stopPropagation();toggleLoop()" title="Loop"><i class="fa-solid fa-repeat"></i></button></div><div class="mp-prog-wrap"><span class="mp-time" id="mpCur">0:00</span><div class="mp-prog" id="mpProg" onclick="seekMp(event)"><div class="mp-prog-fill" id="mpFill"></div></div><span class="mp-time" id="mpDur">0:00</span></div></div></div><audio id="mpAudio" src="${E(s.audioUrl)}" preload="metadata"></audio></div>`}

function initPlayerAudio(){const a=document.getElementById('mpAudio');if(!a)return;
a.addEventListener('loadedmetadata',function(){document.getElementById('mpDur').textContent=fmtTime(a.duration)});
a.addEventListener('ended',function(){if(!mpLoop){mpNext()}else{document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-play"></i>';stopMpTick();a.currentTime=0;a.play().catch(()=>{document.getElementById('mpPlayBtn').innerHTML='<i class="fa-solid fa-play"></i>'})}});
a.addEventListener('error',function(){toast('Could not load audio','er')});
document.addEventListener('click',function(e){const sl=document.getElementById('mpSList');if(sl&&sl.classList.contains('open')){const info=document.querySelector('.mp-info');if(info&&!info.contains(e.target))sl.classList.remove('open')}})}

/* Audio Manager Modal */
let amSongs=[];

function openAudioMgr(){amSongs=JSON.parse(JSON.stringify(CU.songs||[]));renderAM()}
function closeAudioMgr(){document.getElementById('mbox').innerHTML=''}

function renderAM(){const en=CU.musicEnabled||false;
document.getElementById('mbox').innerHTML=`<div class="mbg" onclick="if(event.target===this)closeAudioMgr()"><div class="mbox"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h3 class="font-display" style="font-size:17px;font-weight:700">Audio Manager</h3><button onclick="closeAudioMgr()" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px"><i class="fa-solid fa-xmark"></i></button></div><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)"><span style="font-size:13px">Enable Music Player</span><button class="btoggle ${en?'on':''}" id="amEn" onclick="this.classList.toggle('on')"></button></div><div id="amList">${amSongs.length?amSongs.map((s,i)=>`<div class="am-item"><div style="width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--card2)">${s.coverUrl?`<img src="${s.coverUrl}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-music" style="color:var(--muted);font-size:14px"></i></div>`}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(s.title||'Untitled')}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(s.artist||'Unknown Artist')}</div></div><button onclick="amRemove(${i})" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:none;color:var(--muted);cursor:pointer;flex-shrink:0;transition:color .2s" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--muted)'"><i class="fa-solid fa-trash" style="font-size:11px"></i></button></div>`).join(''):`<div class="am-empty"><i class="fa-solid fa-music"></i><p>You have no audios uploaded.</p></div>`}</div><div id="amForm" style="display:none;margin-top:16px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:12px"><div style="display:flex;flex-direction:column;gap:12px"><input id="amT" class="ifield" placeholder="Song Title"><input id="amA" class="ifield" placeholder="Artist"><input id="amAU" class="ifield" type="url" placeholder="Audio URL (direct mp3/ogg/wav link)"><input id="amCU" class="ifield" type="url" placeholder="Cover Art URL (optional)"><div style="display:flex;gap:10px;justify-content:flex-end"><button class="bs" onclick="amToggleForm()">Cancel</button><button class="bp" onclick="amAdd()"><i class="fa-solid fa-plus"></i> Add</button></div></div></div><button class="bp" id="amAddBtn" style="width:100%;justify-content:center;margin-top:16px;padding:11px" onclick="amToggleForm()"><i class="fa-solid fa-plus"></i> Add Audio</button></div></div>`}

function amToggleForm(){const f=document.getElementById('amForm'),b=document.getElementById('amAddBtn');if(!f)return;if(f.style.display==='none'){f.style.display='block';b.style.display='none';document.getElementById('amT').value='';document.getElementById('amA').value='';document.getElementById('amAU').value='';document.getElementById('amCU').value='';document.getElementById('amT').focus()}else{f.style.display='none';b.style.display='flex'}}

function amAdd(){const t=document.getElementById('amT').value.trim(),a=document.getElementById('amA').value.trim(),au=document.getElementById('amAU').value.trim(),cu=document.getElementById('amCU').value.trim();
if(!t){toast('Song title required','er');return}if(!au){toast('Audio URL required','er');return}
amSongs.push({title:t,artist:a,audioUrl:au,coverUrl:cu});renderAM()}

function amRemove(i){amSongs.splice(i,1);renderAM()}

async function amSave(){const en=document.getElementById('amEn').classList.contains('on');await D.uU(CU.uid,{musicEnabled:en,songs:amSongs});CU=await D.gU(CU.uid);toast('Audio saved!','ok');closeAudioMgr();rDT()}

return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:6px">Badges</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">Toggle badges on or off for your profile.</p><div style="display:flex;flex-direction:column;gap:8px">${owned.map(k=>{const b=BG[k];if(!b)return'';const isOn=active.length?active.includes(k):true;return`<div class="card" style="padding:14px 18px;display:flex;align-items:center;gap:14px"><div style="width:36px;height:36px;border-radius:9px;background:${b.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:${isOn?1:0.4}"><span style="width:22px;height:22px;display:flex">${b.s}</span></div><div style="flex:1"><div style="font-weight:600;font-size:13px;${isOn?'':'color:var(--muted)'}">${b.n}</div><div style="font-size:11px;color:var(--muted)">${b.d}</div></div><button class="btoggle ${isOn?'on':''}" onclick="tBadge('${k}')"></button></div>`}).join('')}</div>`}

async function tBadge(k){if(!CU)return;let active=[...(CU.activeBadges||[])];if(active.includes(k))active=active.filter(x=>x!==k);else active.push(k);if(!active.length)active=[];await D.uU(CU.uid,{activeBadges:active});CU=await D.gU(CU.uid);rDT();toast(active.includes(k)?'Badge enabled':'Badge disabled','in')}

function dSt(u){return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Settings</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Profile Information</h3><div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="sN" class="ifield" type="text" placeholder="Your display name" value="${E(u.displayName||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Bio</label><textarea id="sB" class="ifield" placeholder="Tell us about yourself..." style="min-height:80px;resize:vertical">${E(u.bio||'')}</textarea></div><button class="bp" onclick="sPr()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button></div></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Username</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current</label><input class="ifield" type="text" value="@${E(u.username)}" disabled></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Username</label><div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px">seashell.lol/</span><input id="nUn" class="ifield" type="text" placeholder="newusername" style="padding-left:112px"></div></div><button class="bp" onclick="chUsername()"><i class="fa-solid fa-pen"></i> Change Username</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Password</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current Password</label><input id="cPw" class="ifield" type="password" placeholder="Enter current password"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Password</label><input id="nPw" class="ifield" type="password" placeholder="Min 6 characters"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Confirm New Password</label><input id="nPw2" class="ifield" type="password" placeholder="Confirm new password"></div><button class="bp" onclick="chPassword()"><i class="fa-solid fa-lock"></i> Change Password</button></div></div>`}

async function sPr(){const n=document.getElementById('sN').value.trim(),b=document.getElementById('sB').value.trim();if(!n){toast('Name required','er');return}await D.uU(CU.uid,{displayName:n,bio:b});CU=await D.gU(CU.uid);toast('Profile saved!','ok')}
async function chUsername(){const nu=document.getElementById('nUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return}if(nu===CU.username){toast('Same as current','er');return}const ex=await D.gUN(nu);if(ex){toast('Username taken','er');return}const ue=await D.gUE(nu);if(ue&&ue.uid!==CU.uid){toast('Username taken','er');return}const ue2=await D.gUE(CU.username);await D.chUn(CU.username,nu,CU.uid,ue2?ue2.email:null);await D.uU(CU.uid,{username:nu});CU=await D.gU(CU.uid);toast('Username changed to @'+nu,'ok');rDT();document.querySelector('.duinfo').innerHTML=`<span>@${E(CU.username)}</span><br>UID ${CU.uidNumber||'--'}`}
async function chPassword(){const cp=document.getElementById('cPw').value,np=document.getElementById('nPw').value,np2=document.getElementById('nPw2').value;if(!cp||!np){toast('Fill in all fields','er');return}if(np.length<6){toast('Min 6 chars','er');return}if(np!==np2){toast('Passwords do not match','er');return}try{const cred=firebase.auth.EmailAuthProvider.credential(auth.currentUser.email,cp);await auth.currentUser.reauthenticateWithCredential(cred);await auth.currentUser.updatePassword(np);toast('Password changed!','ok');document.getElementById('cPw').value='';document.getElementById('nPw').value='';document.getElementById('nPw2').value=''}catch(e){if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')toast('Wrong password','er');else toast(e.message,'er')}}

function dCu(u){const sc=(u.songs||[]).length;const en=u.musicEnabled||false;
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Customise</h2>
<div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Avatar</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL.</p><div style="display:flex;align-items:center;gap:16px;margin-bottom:14px"><div style="width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:700;font-size:24px;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div style="flex:1"><input id="cAv" class="ifield" type="url" placeholder="https://example.com/avatar.png" value="${E(u.avatar||'')}"></div></div></div>
<div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Background</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL for your profile background.</p>${u.backgroundUrl?`<div style="width:100%;height:120px;border-radius:10px;overflow:hidden;margin-bottom:14px;background:var(--bg);border:1px solid var(--border)"><img src="${u.backgroundUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`:''}<input id="cBg" class="ifield" type="url" placeholder="https://example.com/background.jpg" value="${E(u.backgroundUrl||'')}"></div>
<div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Theme Color</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">${['#f472b6','#fb7185','#f43f5e','#f97316','#fbbf24','#22c55e','#14b8a6','#06b6d4','#3b82f6','#a855f7'].map(c=>`<button onclick="pTC('${c}')" style="width:38px;height:38px;border-radius:10px;background:${c};border:2px solid ${u.themeColor===c?'#fff':'transparent'};cursor:pointer" title="${c}"></button>`).join('')}</div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:7px">Custom Color</label><div style="display:flex;gap:10px;align-items:center"><input type="color" id="ccI" value="${u.themeColor||'#f472b6'}" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none"><span id="ccV" style="font-size:13px;color:var(--fg2)">${u.themeColor||'#f472b6'}</span></div></div></div>
<div class="card" style="margin-bottom:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div><h3 class="font-display" style="font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px"><i class="fa-solid fa-music" style="color:var(--accent);font-size:13px"></i>Music Player</h3><p style="color:var(--fg2);font-size:13px;margin-top:4px">${sc?sc+' track'+(sc>1?'s':'')+' added':'No tracks added'}</p></div><button class="bp" onclick="openAudioMgr()"><i class="fa-solid fa-sliders"></i> Audio Manager</button></div></div>
<button class="bp" onclick="saveVisual()" style="width:100%;justify-content:center;padding:12px"><i class="fa-solid fa-floppy-disk"></i> Save Visual Customisation</button>`}

function pTC(c){document.getElementById('ccI').value=c;document.getElementById('ccV').textContent=c;document.querySelectorAll('.card button[onclick^="pTC"]').forEach(b=>{b.style.borderColor=b.onclick.toString().includes(c)?'#fff':'transparent'})}

async function saveVisual(){const a=document.getElementById('cAv').value.trim(),b=document.getElementById('cBg').value.trim(),c=document.getElementById('ccI').value;await D.uU(CU.uid,{avatar:a,backgroundUrl:b,themeColor:c});CU=await D.gU(CU.uid);toast('Visual customisation saved!','ok')}

function dLn(u){const lHt=u.links.map((l,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.title)}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.url)}</div></div><button onclick="eLink(${i})" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:none;color:var(--muted);cursor:pointer;flex-shrink:0" title="Delete"><i class="fa-solid fa-trash" style="font-size:11px"></i></button></div>`).join('');
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Links</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Add New Link</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Title</label><input id="lT" class="ifield" type="text" placeholder="My Website"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">URL</label><input id="lU" class="ifield" type="url" placeholder="https://example.com"></div><button class="bp" onclick="aLink()"><i class="fa-solid fa-plus"></i> Add Link</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:14px">Your Links (${u.links.length})</h3>${lHt||`<p style="color:var(--muted);font-size:13px">No links added yet.</p>`}</div>`}

async function aLink(){const t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();if(!t||!u){toast('Fill in all fields','er');return}const links=[...(CU.links||[]),{title:t,url:u}];await D.uU(CU.uid,{links});CU=await D.gU(CU.uid);toast('Link added!','ok');rDT()}
async function eLink(i){const links=[...(CU.links||[])];links.splice(i,1);await D.uU(CU.uid,{links});CU=await D.gU(CU.uid);toast('Link removed','in');rDT()}

function pAdmin(){return`<div class="dash-wrap"><div class="aside"><div class="anav on" onclick="sAT('users')" id="an-users"><i class="fa-solid fa-users"></i>Users</div></div><div class="abody" id="aC"></div></div>`}
async function rAC(){document.getElementById('aC').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>';const users=await D.aU();users.sort((a,b)=>(b.views||0)-(a.views||0));const tH=`<table class="utbl"><thead><tr><th>User</th><th>Username</th><th>UID</th><th>Role</th><th>Views</th><th>Links</th><th>Actions</th></tr></thead><tbody>${users.map(u=>`<tr><td style="font-weight:500">${E(u.displayName||'-')}</td><td style="color:var(--accent)">@${E(u.username)}</td><td style="color:var(--muted)">${u.uidNumber||'--'}</td><td>${rT(u.role)}</td><td>${u.views||0}</td><td>${(u.links||[]).length}</td><td><div style="display:flex;gap:6px"><button class="bs bsm" onclick="eUser('${u.uid}')">Edit</button>${u.banned?`<button class="bs bsm" onclick="uBan('${u.uid}',false)" style="color:var(--success);border-color:rgba(34,197,94,0.3)">Unban</button>`:`<button class="bd bsm" onclick="uBan('${u.uid}',true)">Ban</button>`}</div></td></tr>`).join('')}</tbody></table>`;
document.getElementById('aC').innerHTML=`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Admin Panel</h2><div class="card">${tH}</div>`}

function eUser(uid){showModal('Edit User',`<div id="eUF">Loading...</div>`,[{l:'Save',c:'bp',a:'sEU(\''+uid+'\')'},{l:'Cancel',c:'bs',a:'clM()'}]);loadEU(uid)}
async function loadEU(uid){const u=await D.gU(uid);if(!u){document.getElementById('eUF').innerHTML='<p style="color:var(--danger)">User not found</p>';return}
const rO=Object.keys(RL).filter(r=>canEdit(r,CU.role));const bO=u.badges||[];
document.getElementById('eUF').innerHTML=`<div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="eN" class="ifield" type="text" value="${E(u.displayName||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Role</label><select id="eR" class="ifield">${rO.map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}</select></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Badges</label><div style="display:flex;flex-wrap:wrap;gap:6px">${Object.keys(BG).map(k=>`<label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="${k}" ${bO.includes(k)?'checked':''} style="accent-color:var(--accent)"> ${BG[k].n}</label>`).join('')}</div></div>${canEditUID(CU.role)?`<div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">UID Number</label><input id="eUID" class="ifield" type="number" value="${u.uidNumber||''}"></div>`:''}</div>`}

async function sEU(uid){const n=document.getElementById('eN').value.trim();const r=document.getElementById('eR').value;const bgs=Array.from(document.querySelectorAll('#eUF input[type=checkbox]:checked')).map(c=>c.value);const up={displayName:n,role:r,badges:bgs};if(canEditUID(CU.role)){const uidNum=parseInt(document.getElementById('eUID')?.value);if(!isNaN(uidNum))up.uidNumber=uidNum}await D.uU(uid,up);toast('User updated!','ok');clM();await rAC()}

async function uBan(uid,b){await D.uU(uid,{banned:b});toast(b?'User banned':'User unbanned','in');await rAC()}

window.addEventListener('popstate',router);
restoreSess().then(()=>router());
</script>
</body>
</html>
