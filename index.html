<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seashell.lol — Beautiful Link-in-Bio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
/* ============================
   Firebase Initialization
   ============================ */
var firebaseConfig = {
  apiKey: "AIzaSyDbvpzYvPDxzYBXr7-WLFWabmeIRkJlTnw",
  authDomain: "seashell-27f34.firebaseapp.com",
  projectId: "seashell-27f34",
  storageBucket: "seashell-27f34.firebasestorage.app",
  messagingSenderId: "225540891149",
  appId: "1:225540891149:web:a2dd3060fe7ab6d975ab44"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

db.enablePersistence({ synchronizeTabs: true }).catch(function(err) {
  if (err.code !== 'failed-precondition' && err.code !== 'unimplemented') {
    console.warn('Persistence error:', err);
  }
});

/* ============================
   App State
   ============================ */
var appState = {
  currentUser: null,
  currentUserData: null,
  authMode: 'login',
  currentPage: 'landing',
  currentProfileUser: null,
  currentBgEffect: 'aurora',
  currentNameEffect: 'neon',
  currentCardStyle: 'glass',
  currentAdminTab: 'dashboard',
  currentCustomTab: 'info'
};

// THIS FLAG PREVENTS THE OBSERVER FROM INTERFERING DURING REGISTRATION
var isRegistering = false;

var ROLE_LEVELS = { owner: 5, manager: 4, admin: 3, mod: 2, user: 1 };

/* ============================
   Utility Functions
   ============================ */
function showToast(message, type) {
  type = type || 'info';
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  document.getElementById('toast-container').appendChild(toast);
  setTimeout(function() { toast.classList.add('show'); }, 10);
  setTimeout(function() {
    toast.classList.remove('show');
    setTimeout(function() { toast.remove(); }, 400);
  }, 3500);
}

function showAuthError(msg) {
  var el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function hideAuthError() {
  document.getElementById('auth-error').classList.add('hidden');
}

function setLoading(btn, loading) {
  if (loading) {
    btn.disabled = true;
    btn.dataset.originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading-spinner"></span>';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
  }
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return (num || 0).toString();
}

function validateUsername(username) {
  if (!username || username.length < 3) return 'Username must be at least 3 characters';
  if (username.length > 20) return 'Username must be 20 characters or less';
  if (!/^[a-zA-Z0-9_]+$/.test(username)) return 'Only letters, numbers, and underscores';
  return null;
}

function validateEmail(email) {
  if (!email) return 'Email is required';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return 'Invalid email format';
  return null;
}

function validatePassword(password) {
  if (!password) return 'Password is required';
  if (password.length < 6) return 'Password must be at least 6 characters';
  return null;
}

/* ============================
   UID Counter
   ============================ */
async function getNextUid() {
  var counterRef = db.collection('meta').doc('uidCounter');
  return db.runTransaction(async function(transaction) {
    var doc = await transaction.get(counterRef);
    if (!doc.exists) {
      transaction.set(counterRef, { count: 1 });
      return 1;
    }
    var newCount = doc.data().count + 1;
    transaction.update(counterRef, { count: newCount });
    return newCount;
  });
}

/* ============================
   Authentication
   ============================ */
function openAuth(mode) {
  appState.authMode = mode || 'login';
  hideAuthError();
  document.getElementById('auth-modal').classList.add('open');

  if (appState.authMode === 'register') {
    document.getElementById('auth-title').textContent = 'Create Account';
    document.getElementById('auth-subtitle').textContent = 'Join seashell.lol';
    document.getElementById('auth-username-field').style.display = 'block';
    document.getElementById('auth-name-field').style.display = 'block';
    document.getElementById('auth-submit').textContent = 'Create Account';
    document.getElementById('auth-toggle-text').textContent = 'Already have an account?';
    document.getElementById('auth-toggle-btn').textContent = 'Sign In';
  } else {
    document.getElementById('auth-title').textContent = 'Welcome Back';
    document.getElementById('auth-subtitle').textContent = 'Sign in to your seashell account';
    document.getElementById('auth-username-field').style.display = 'none';
    document.getElementById('auth-name-field').style.display = 'none';
    document.getElementById('auth-submit').textContent = 'Sign In';
    document.getElementById('auth-toggle-text').textContent = "Don't have an account?";
    document.getElementById('auth-toggle-btn').textContent = 'Sign Up';
  }
}

function closeAuth() {
  document.getElementById('auth-modal').classList.remove('open');
  hideAuthError();
}

function toggleAuthMode() {
  openAuth(appState.authMode === 'login' ? 'register' : 'login');
}

async function handleAuth() {
  hideAuthError();
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;
  var btn = document.getElementById('auth-submit');

  var emailErr = validateEmail(email);
  if (emailErr) { showAuthError(emailErr); return; }
  var passErr = validatePassword(password);
  if (passErr) { showAuthError(passErr); return; }

  setLoading(btn, true);

  try {
    if (appState.authMode === 'register') {
      var username = document.getElementById('auth-username').value.trim().toLowerCase();
      var displayName = document.getElementById('auth-name').value.trim();

      var userErr = validateUsername(username);
      if (userErr) { showAuthError(userErr); setLoading(btn, false); return; }
      if (!displayName) { showAuthError('Display name is required'); setLoading(btn, false); return; }

      // Check username taken BEFORE creating auth account
      var usernameDoc = await db.collection('usernames').doc(username).get();
      if (usernameDoc.exists) {
        showAuthError('Username is already taken');
        setLoading(btn, false);
        return;
      }

      // FLAG: tell the observer to stand down
      isRegistering = true;

      // Create the auth account
      var credential = await auth.createUserWithEmailAndPassword(email, password);

      // Get sequential UID
      var uid = await getNextUid();

      // Build user document
      var userData = {
        uid: uid,
        username: username,
        displayName: displayName,
        email: email,
        role: 'user',
        avatar: '',
        banner: '',
        description: '',
        location: '',
        bgEffect: 'aurora',
        cardStyle: 'glass',
        nameEffect: 'neon',
        accentColor: '#FF1493',
        badges: [],
        links: [],
        music: null,
        discord: null,
        views: 0,
        clicks: 0,
        plan: 'free',
        status: 'active',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      // Write to Firestore (auth user is still signed in here)
      await db.collection('users').doc(credential.user.uid).set(userData);
      await db.collection('usernames').doc(username).set({ uid: credential.user.uid });

      // Audit
      await db.collection('audit').add({
        action: 'User registered',
        userId: credential.user.uid,
        username: username,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      // MANUALLY set state — do NOT rely on the observer for this
      appState.currentUserData = userData;
      isRegistering = false;

      closeAuth();
      showToast('Account created successfully!', 'success');
      updateNav();
      navigate('/u/' + username);

    } else {
      // LOGIN — observer will handle loading user data
      await auth.signInWithEmailAndPassword(email, password);
      closeAuth();
      showToast('Welcome back!', 'success');
    }
  } catch (error) {
    isRegistering = false;
    var msg = 'Authentication failed';
    if (error.code === 'auth/user-not-found') msg = 'No account found with this email';
    else if (error.code === 'auth/wrong-password') msg = 'Incorrect password';
    else if (error.code === 'auth/email-already-in-use') msg = 'Email is already registered';
    else if (error.code === 'auth/weak-password') msg = 'Password is too weak';
    else if (error.code === 'auth/invalid-email') msg = 'Invalid email address';
    else if (error.code === 'auth/too-many-requests') msg = 'Too many attempts, try again later';
    else if (error.code === 'auth/network-request-failed') msg = 'Network error — check your connection';
    else if (error.message) msg = error.message;
    showAuthError(msg);
  }

  setLoading(btn, false);
}

async function socialAuth(provider) {
  hideAuthError();
  var providerObj;

  if (provider === 'google') {
    providerObj = new firebase.auth.GoogleAuthProvider();
  } else if (provider === 'discord') {
    providerObj = new firebase.auth.OAuthProvider('discord.com');
  } else {
    return;
  }

  try {
    var result = await auth.signInWithPopup(providerObj);

    var userDoc = await db.collection('users').doc(result.user.uid).get();

    if (!userDoc.exists) {
      // New social user — need to create Firestore doc
      isRegistering = true;

      var email = result.user.email || '';
      var baseUsername = email.split('@')[0].replace(/[^a-zA-Z0-9_]/g, '_').toLowerCase();
      if (!baseUsername) baseUsername = 'user';

      // Find an available username
      var username = baseUsername;
      var attempts = 0;
      var available = false;
      while (!available && attempts < 200) {
        var snap = await db.collection('usernames').doc(username).get();
        if (!snap.exists) {
          available = true;
        } else {
          attempts++;
          username = baseUsername + attempts;
        }
      }
      if (!available) username = 'u' + Date.now();

      var uid = await getNextUid();
      var displayName = result.user.displayName || username;

      var userData = {
        uid: uid,
        username: username,
        displayName: displayName,
        email: email,
        role: 'user',
        avatar: result.user.photoURL || '',
        banner: '',
        description: '',
        location: '',
        bgEffect: 'aurora',
        cardStyle: 'glass',
        nameEffect: 'neon',
        accentColor: '#FF1493',
        badges: [],
        links: [],
        music: null,
        discord: null,
        views: 0,
        clicks: 0,
        plan: 'free',
        status: 'active',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      await db.collection('users').doc(result.user.uid).set(userData);
      await db.collection('usernames').doc(username).set({ uid: result.user.uid });

      appState.currentUserData = userData;
      isRegistering = false;

      closeAuth();
      showToast('Account created with ' + provider + '!', 'success');
      updateNav();
      navigate('/u/' + username);
    } else {
      // Returning social user — observer handles it
      closeAuth();
      showToast('Welcome back!', 'success');
    }
  } catch (error) {
    isRegistering = false;
    if (error.code === 'auth/popup-closed-by-user') return;
    if (error.code === 'auth/cancelled-popup-request') return;
    var msg = provider.charAt(0).toUpperCase() + provider.slice(1) + ' sign-in failed';
    if (error.code === 'auth/account-exists-with-different-credential') {
      msg = 'An account already exists with this email using a different sign-in method';
    } else if (error.code === 'auth/network-request-failed') {
      msg = 'Network error — check your connection';
    } else if (error.message) {
      msg = error.message;
    }
    showAuthError(msg);
  }
}

async function signOut() {
  try {
    await auth.signOut();
    appState.currentUser = null;
    appState.currentUserData = null;
    fxStop();
    navigate('/');
    showToast('Signed out', 'info');
  } catch (error) {
    showToast('Failed to sign out', 'error');
  }
}

/* ============================
   Auth State Observer
   ============================ */
auth.onAuthStateChanged(function(user) {
  appState.currentUser = user;

  if (!user) {
    appState.currentUserData = null;
    updateNav();
    return;
  }

  // If we're in the middle of registration, handleAuth will set
  // currentUserData manually — do NOT interfere here.
  if (isRegistering) return;

  // Otherwise (login / page reload / returning social user), load from Firestore
  loadCurrentUserData();
});

async function loadCurrentUserData() {
  if (!appState.currentUser) return;
  try {
    var doc = await db.collection('users').doc(appState.currentUser.uid).get();
    if (doc.exists) {
      appState.currentUserData = doc.data();
      updateNav();
      // Redirect from landing to own profile
      if (appState.currentPage === 'landing') {
        navigate('/u/' + appState.currentUserData.username);
      }
    } else {
      // No Firestore doc and not registering — edge case, just clear state
      appState.currentUserData = null;
      updateNav();
    }
  } catch (error) {
    console.error('Error loading user data:', error);
    appState.currentUserData = null;
    updateNav();
  }
}

/* ============================
   Navigation
   ============================ */
function updateNav() {
  var navLinks = document.getElementById('nav-links');
  var navActions = document.getElementById('nav-actions');

  if (appState.currentUserData) {
    var u = appState.currentUserData;
    navLinks.innerHTML = '<a href="#/u/' + u.username + '" class="text-ss-muted hover:text-ss-text transition-colors text-sm no-underline">Profile</a>' +
      '<a href="#/customize" class="text-ss-muted hover:text-ss-text transition-colors text-sm no-underline">Customize</a>' +
      (ROLE_LEVELS[u.role] >= ROLE_LEVELS.mod ? '<a href="#/admin" class="text-ss-muted hover:text-ss-text transition-colors text-sm no-underline">Admin</a>' : '');

    navActions.innerHTML = '<div class="flex items-center gap-2 cursor-pointer" onclick="navigate(\'/u/' + u.username + '\')">' +
      (u.avatar ? '<img src="' + u.avatar + '" class="w-8 h-8 rounded-lg object-cover" alt="Avatar">' : '<div class="w-8 h-8 rounded-lg bg-ss-pink/20 flex items-center justify-center"><i class="fa-solid fa-user text-ss-pink text-xs"></i></div>') +
      '<span class="text-sm font-medium hidden sm:inline">' + u.displayName + '</span></div>' +
      '<button class="btn-ghost text-xs" onclick="signOut()">Sign Out</button>';
  } else {
    navLinks.innerHTML = '<a href="#/" class="text-ss-muted hover:text-ss-text transition-colors text-sm no-underline">Home</a>';
    navActions.innerHTML = '<button class="btn-ghost text-sm" onclick="openAuth(\'login\')">Sign In</button>' +
      '<button class="btn-pink !py-2 !px-4 text-sm" onclick="openAuth(\'register\')">Sign Up</button>';
  }
}

function navigate(path) {
  window.location.hash = path;
}

function handleRoute() {
  var hash = window.location.hash.slice(1) || '/';
  var parts = hash.split('/').filter(Boolean);

  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });

  if (parts.length === 0 || hash === '/') {
    if (appState.currentUserData) {
      navigate('/u/' + appState.currentUserData.username);
      return;
    }
    showPage('landing');
    fxStop();
  } else if (parts[0] === 'u' && parts[1]) {
    loadProfile(parts[1]);
  } else if (parts[0] === 'customize') {
    if (!appState.currentUserData) {
      showPage('unauthorized');
      document.getElementById('unauth-msg').textContent = 'You need to sign in to customize your profile.';
      return;
    }
    showPage('customize');
    fxStop();
    loadCustomizePage();
  } else if (parts[0] === 'admin') {
    if (!appState.currentUserData || ROLE_LEVELS[appState.currentUserData.role] < ROLE_LEVELS.mod) {
      showPage('unauthorized');
      document.getElementById('unauth-msg').textContent = 'You do not have permission to access the admin panel.';
      return;
    }
    showPage('admin');
    fxStop();
    loadAdminPage();
  } else {
    showPage('landing');
    fxStop();
  }

  updateNav();
}

function showPage(pageId) {
  appState.currentPage = pageId;
  document.getElementById('page-' + pageId).classList.add('active');
  if (pageId === 'landing') {
    setTimeout(initFadeUp, 100);
  }
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('load', handleRoute);

/* ============================
   Profile Page
   ============================ */
async function loadProfile(username) {
  var wrapper = document.getElementById('profile-wrapper');
  wrapper.innerHTML = '<div class="text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-ss-muted">Loading profile...</p></div>';
  showPage('profile');

  try {
    var usernameDoc = await db.collection('usernames').doc(username).get();

    if (!usernameDoc.exists) {
      wrapper.innerHTML = '<div class="text-center glass rounded-2xl p-12 max-w-md"><i class="fa-solid fa-user-slash text-ss-muted text-4xl mb-4 block"></i><h2 class="font-display text-2xl font-bold mb-2">User Not Found</h2><p class="text-ss-muted">This profile doesn\'t exist.</p><button class="btn-pink mt-6" onclick="navigate(\'/\')">Go Home</button></div>';
      fxStop();
      return;
    }

    var userId = usernameDoc.data().uid;
    var userDoc = await db.collection('users').doc(userId).get();

    if (!userDoc.exists || userDoc.data().status === 'banned') {
      wrapper.innerHTML = '<div class="text-center glass rounded-2xl p-12 max-w-md"><i class="fa-solid fa-ban text-red-400 text-4xl mb-4 block"></i><h2 class="font-display text-2xl font-bold mb-2">Profile Unavailable</h2><p class="text-ss-muted">This profile is not available.</p><button class="btn-pink mt-6" onclick="navigate(\'/\')">Go Home</button></div>';
      fxStop();
      return;
    }

    var userData = userDoc.data();
    appState.currentProfileUser = userData;

    // Increment views (fire and forget)
    db.collection('users').doc(userId).update({
      views: firebase.firestore.FieldValue.increment(1)
    }).catch(function() {});

    // Apply user's effects
    if (userData.bgEffect) {
      fxSetEffect(userData.bgEffect);
      appState.currentBgEffect = userData.bgEffect;
    } else {
      fxStop();
    }
    appState.currentNameEffect = userData.nameEffect || 'neon';
    appState.currentCardStyle = userData.cardStyle || 'glass';

    // FX switcher only on own profile
    var fxSwitcher = document.getElementById('fx-switcher');
    if (appState.currentUserData && appState.currentUserData.username === username) {
      fxSwitcher.style.display = 'block';
      updateFxPanel();
    } else {
      fxSwitcher.style.display = 'none';
    }

    renderProfile(userData);
  } catch (error) {
    console.error('Error loading profile:', error);
    wrapper.innerHTML = '<div class="text-center glass rounded-2xl p-12 max-w-md"><i class="fa-solid fa-exclamation-triangle text-yellow-400 text-4xl mb-4 block"></i><h2 class="font-display text-2xl font-bold mb-2">Error Loading Profile</h2><p class="text-ss-muted">' + error.message + '</p><button class="btn-pink mt-6" onclick="loadProfile(\'' + username + '\')">Retry</button></div>';
  }
}

function renderProfile(user) {
  var wrapper = document.getElementById('profile-wrapper');
  var isOwn = appState.currentUserData && appState.currentUserData.username === user.username;
  var cardClass = 'profile-card-' + (user.cardStyle || 'glass');
  var nameClass = 'name-' + (user.nameEffect || 'neon');

  var badgesHtml = '';
  if (user.badges && user.badges.length > 0) {
    user.badges.forEach(function(b) {
      var bc = 'badge-' + (b.id || 'pearl');
      badgesHtml += '<span class="badge ' + bc + '">' +
        (b.icon ? '<i class="' + b.icon + ' text-[9px]"></i> ' : '') +
        (b.name || '') +
        '<span class="badge-tip">' + (b.tooltip || b.name || '') + '</span></span>';
    });
  }

  var linksHtml = '';
  if (user.links && user.links.length > 0) {
    user.links.forEach(function(link) {
      if (!link.url) return;
      linksHtml += '<a href="' + link.url + '" target="_blank" rel="noopener" class="link-btn">' +
        '<i class="' + (link.icon || 'fa-solid fa-link') + '"></i>' +
        '<span>' + (link.title || 'Link') + '</span>' +
        '<i class="fa-solid fa-arrow-up-right-from-square text-ss-dim text-xs ml-auto"></i></a>';
    });
  }

  var musicHtml = '';
  if (user.music && user.music.url) {
    musicHtml = '<div class="mt-5 p-3 rounded-xl" style="background:rgba(255,20,147,0.06);border:1px solid rgba(255,20,147,0.1)">' +
      '<div class="flex items-center gap-3">' +
      (user.music.cover ? '<img src="' + user.music.cover + '" class="w-10 h-10 rounded-lg object-cover" alt="Cover">' : '<div class="w-10 h-10 rounded-lg bg-ss-pink/20 flex items-center justify-center"><i class="fa-solid fa-music text-ss-pink text-sm"></i></div>') +
      '<div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">' + (user.music.title || 'Unknown') + '</p><p class="text-xs text-ss-muted truncate">' + (user.music.artist || '') + '</p></div>' +
      '<audio controls class="h-8 opacity-70 hover:opacity-100 transition-opacity" style="max-width:100px"><source src="' + user.music.url + '" type="audio/mpeg"></audio>' +
      '</div></div>';
  }

  var bannerHtml = user.banner ? '<div class="h-32 sm:h-40 rounded-t-[23px] bg-cover bg-center relative" style="background-image:url(\'' + user.banner + '\')"><div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent rounded-t-[23px]"></div></div>' : '';

  var avatarHtml = user.avatar
    ? '<img src="' + user.avatar + '" class="w-20 h-20 rounded-2xl object-cover" style="border:3px solid #0A0A0F" alt="">'
    : '<div class="w-20 h-20 rounded-2xl flex items-center justify-center text-2xl font-bold" style="border:3px solid #0A0A0F;background:linear-gradient(135deg,#FF1493,#DB2777)"><span class="text-white">' + (user.displayName || '?').charAt(0).toUpperCase() + '</span></div>';

  var ndAttr = user.nameEffect === 'glitch' ? ' data-text="' + (user.displayName || '') + '"' : '';

  wrapper.innerHTML = '<div class="w-full max-w-md mx-auto"><div class="' + cardClass + ' overflow-hidden">' +
    bannerHtml +
    '<div class="px-6 pb-6' + (user.banner ? ' -mt-10 relative' : ' pt-6') + '">' +
    avatarHtml +
    '<div class="mt-3 flex items-start justify-between"><div class="uid-trigger relative">' +
    '<h2 class="font-display text-2xl font-bold ' + nameClass + '"' + ndAttr + '>' + (user.displayName || 'User') + '</h2>' +
    '<span class="uid-hover">#' + String(user.uid || 0).padStart(7, '0') + '</span></div>' +
    (isOwn ? '<button class="btn-ghost text-xs" onclick="navigate(\'/customize\')"><i class="fa-solid fa-pen mr-1"></i>Edit</button>' : '') +
    '</div>' +
    '<p class="text-ss-muted text-sm" style="font-family:\'JetBrains Mono\',monospace">@' + (user.username || '') + '</p>' +
    (user.description ? '<p class="text-ss-text/80 text-sm mt-3 leading-relaxed">' + user.description + '</p>' : '') +
    (user.location ? '<p class="text-ss-muted text-xs mt-2"><i class="fa-solid fa-location-dot mr-1"></i>' + user.location + '</p>' : '') +

/* ============================
   FX Engine
   ============================ */
var fxCanvas = document.getElementById('fx-canvas');
var fxCtx = fxCanvas.getContext('2d');
var fxParticles = [];
var fxEffect = 'aurora';
var fxTime = 0;
var fxRunning = false;
var fxReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function fxResize() {
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
fxResize();
window.addEventListener('resize', fxResize);

function fxSetEffect(name) {
  fxEffect = name;
  fxParticles = [];
  fxTime = 0;
  if (!fxRunning && !fxReducedMotion) {
    fxRunning = true;
    fxAnimate();
  }
}

function fxStop() {
  fxRunning = false;
  fxParticles = [];
  fxTime = 0;
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
}

function fxAnimate() {
  if (!fxRunning) return;
  fxTime += 0.016;
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  var w = fxCanvas.width, h = fxCanvas.height;

  if (fxEffect === 'aurora') {
    for (var layer = 0; layer < 4; layer++) {
      fxCtx.beginPath();
      var baseY = h * 0.3 + layer * 60;
      var amp = 80 + layer * 20;
      var freq = 0.002 - layer * 0.0003;
      var spd = 0.3 + layer * 0.15;
      var alpha = 0.06 - layer * 0.01;
      fxCtx.moveTo(0, h);
      for (var x = 0; x <= w; x += 3) {
        var y = baseY + Math.sin(x * freq + fxTime * spd) * amp + Math.sin(x * freq * 2.3 + fxTime * spd * 0.7) * amp * 0.4 + Math.cos(x * freq * 0.5 + fxTime * spd * 0.3) * amp * 0.3;
        fxCtx.lineTo(x, y);
      }
      fxCtx.lineTo(w, h);
      fxCtx.closePath();
      var grad = fxCtx.createLinearGradient(0, baseY - amp, 0, h);
      var hue = 330 + layer * 15;
      grad.addColorStop(0, 'hsla(' + hue + ', 100%, 60%, ' + alpha + ')');
      grad.addColorStop(0.5, 'hsla(' + (hue + 20) + ', 80%, 40%, ' + (alpha * 0.6) + ')');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      fxCtx.fillStyle = grad;
      fxCtx.fill();
    }
  } else if (fxEffect === 'petals') {
    while (fxParticles.length < 50) {
      fxParticles.push({ x: Math.random() * w, y: -20 - Math.random() * 100, size: 4 + Math.random() * 8, speedY: 0.5 + Math.random() * 1.5, speedX: -0.3 + Math.random() * 0.6, rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.03, alpha: 0.3 + Math.random() * 0.5, hue: 330 + Math.random() * 30, wobble: Math.random() * Math.PI * 2 });
    }
    for (var i = 0; i < fxParticles.length; i++) {
      var p = fxParticles[i];
      p.y += p.speedY; p.x += p.speedX + Math.sin(fxTime * 1.5 + p.wobble) * 0.3; p.rotation += p.rotSpeed;
      if (p.y > h + 20) { p.y = -20; p.x = Math.random() * w; }
      fxCtx.save(); fxCtx.translate(p.x, p.y); fxCtx.rotate(p.rotation); fxCtx.globalAlpha = p.alpha;
      fxCtx.beginPath(); fxCtx.ellipse(0, 0, p.size * 0.4, p.size, 0, 0, Math.PI * 2);
      fxCtx.fillStyle = 'hsla(' + p.hue + ', 80%, 70%, 1)'; fxCtx.fill(); fxCtx.restore();
    }
    fxCtx.globalAlpha = 1;
  } else if (fxEffect === 'sparkles') {
    while (fxParticles.length < 60) {
      fxParticles.push({ x: Math.random() * w, y: Math.random() * h, size: 1 + Math.random() * 3, ts: 1 + Math.random() * 3, to: Math.random() * Math.PI * 2, alpha: 0, color: Math.random() > 0.7 ? '#FCD34D' : (Math.random() > 0.5 ? '#FF69B4' : '#FFFFFF'), drift: (Math.random() - 0.5) * 0.1 });
    }
    for (var i = 0; i < fxParticles.length; i++) {
      var p = fxParticles[i]; p.x += p.drift; p.alpha = Math.max(0, Math.sin(fxTime * p.ts + p.to));
      if (p.x < -10 || p.x > w + 10) { p.x = Math.random() * w; p.y = Math.random() * h; }
      if (p.alpha > 0.1) {
        fxCtx.save(); fxCtx.globalAlpha = p.alpha; fxCtx.fillStyle = p.color; var s = p.size;
        fxCtx.beginPath(); fxCtx.moveTo(p.x, p.y - s * 2); fxCtx.lineTo(p.x + s * 0.4, p.y - s * 0.4); fxCtx.lineTo(p.x + s * 2, p.y); fxCtx.lineTo(p.x + s * 0.4, p.y + s * 0.4); fxCtx.lineTo(p.x, p.y + s * 2); fxCtx.lineTo(p.x - s * 0.4, p.y + s * 0.4); fxCtx.lineTo(p.x - s * 2, p.y); fxCtx.lineTo(p.x - s * 0.4, p.y - s * 0.4); fxCtx.closePath(); fxCtx.fill(); fxCtx.restore();
      }
    }
    fxCtx.globalAlpha = 1;
  } else if (fxEffect === 'rain') {
    while (fxParticles.length < 150) {
      fxParticles.push({ x: Math.random() * (w + 200) - 100, y: Math.random() * h - h, length: 15 + Math.random() * 25, speed: 12 + Math.random() * 8, alpha: 0.1 + Math.random() * 0.2, width: 0.5 + Math.random() * 1 });
    }
    fxCtx.strokeStyle = 'rgba(255, 105, 180, 0.25)';
    for (var i = 0; i < fxParticles.length; i++) {
      var p = fxParticles[i]; p.y += p.speed; p.x -= 1.5;
      if (p.y > h + 30) { p.y = -30; p.x = Math.random() * (w + 200) - 100; }
      fxCtx.globalAlpha = p.alpha; fxCtx.lineWidth = p.width;
      fxCtx.beginPath(); fxCtx.moveTo(p.x, p.y); fxCtx.lineTo(p.x + 1.5, p.y - p.length); fxCtx.stroke();
    }
    fxCtx.globalAlpha = 1;
  } else if (fxEffect === 'snow') {
    while (fxParticles.length < 80) {
      fxParticles.push({ x: Math.random() * w, y: -10 - Math.random() * h, size: 1 + Math.random() * 3, speed: 0.5 + Math.random() * 1.5, wobble: Math.random() * Math.PI * 2, ws: 0.5 + Math.random() * 1, alpha: 0.3 + Math.random() * 0.5 });
    }
    for (var i = 0; i < fxParticles.length; i++) {
      var p = fxParticles[i]; p.y += p.speed; p.x += Math.sin(fxTime * p.ws + p.wobble) * 0.5;
      if (p.y > h + 10) { p.y = -10; p.x = Math.random() * w; }
      fxCtx.globalAlpha = p.alpha; fxCtx.fillStyle = '#FDE2F3';
      fxCtx.beginPath(); fxCtx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI * 2); fxCtx.fill();
    }
    fxCtx.globalAlpha = 1;
  } else if (fxEffect === 'orbs') {
    if (fxParticles.length === 0) {
      for (var i = 0; i < 8; i++) {
        fxParticles.push({ x: Math.random() * w, y: Math.random() * h, radius: 80 + Math.random() * 180, speedX: (Math.random() - 0.5) * 0.3, speedY: (Math.random() - 0.5) * 0.3, hue: 320 + Math.random() * 40, alpha: 0.04 + Math.random() * 0.04, phaseX: Math.random() * Math.PI * 2, phaseY: Math.random() * Math.PI * 2 });
      }
    }
    for (var i = 0; i < fxParticles.length; i++) {
      var p = fxParticles[i];
      p.x += p.speedX + Math.sin(fxTime * 0.2 + p.phaseX) * 0.3;
      p.y += p.speedY + Math.cos(fxTime * 0.15 + p.phaseY) * 0.3;
      if (p.x < -p.radius) p.x = w + p.radius; if (p.x > w + p.radius) p.x = -p.radius;
      if (p.y < -p.radius) p.y = h + p.radius; if (p.y > h + p.radius) p.y = -p.radius;
      var grad = fxCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, Math.max(1, p.radius));
      grad.addColorStop(0, 'hsla(' + p.hue + ', 80%, 60%, ' + p.alpha + ')');
      grad.addColorStop(0.5, 'hsla(' + (p.hue + 20) + ', 60%, 40%, ' + (p.alpha * 0.5) + ')');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      fxCtx.fillStyle = grad;
      fxCtx.fillRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2);
    }
  }

  requestAnimationFrame(fxAnimate);
}

function addLink() {
  if (!appState.currentUserData.links) appState.currentUserData.links = [];
  appState.currentUserData.links.push({ title: '', url: '', icon: 'fa-solid fa-link' });
  switchCustomTab('links');
}

function removeLink(idx) {
  appState.currentUserData.links.splice(idx, 1);
  saveLinks();
  switchCustomTab('links');
}

function moveLink(idx, dir) {
  var links = appState.currentUserData.links;
  var ni = idx + dir;
  if (ni < 0 || ni >= links.length) return;
  var tmp = links[idx]; links[idx] = links[ni]; links[ni] = tmp;
  saveLinks();
  switchCustomTab('links');
}

async function saveLinks() {
  if (!appState.currentUserData) return;
  try {
    await db.collection('users').doc(appState.currentUser.uid).update({ links: appState.currentUserData.links || [], updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('Links updated', 'success');
  } catch (e) { showToast('Failed to save links', 'error'); }
  updatePreview();
}

async function saveInfo() {
  var dn = document.getElementById('cust-displayName').value.trim();
  if (!dn) { showToast('Display name is required', 'error'); return; }
  try {
    var updates = { displayName: dn, description: document.getElementById('cust-description').value.trim(), location: document.getElementById('cust-location').value.trim(), avatar: document.getElementById('cust-avatar').value.trim(), banner: document.getElementById('cust-banner').value.trim(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    await db.collection('users').doc(appState.currentUser.uid).update(updates);
    Object.assign(appState.currentUserData, updates);
    updateNav(); updatePreview();
    showToast('Profile updated', 'success');
  } catch (e) { showToast('Failed to save', 'error'); }
}

}

async function removeMusic() {
  try { await db.collection('users').doc(appState.currentUser.uid).update({ music: null, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }); appState.currentUserData.music = null; showToast('Music removed', 'success'); switchCustomTab('music'); updatePreview(); } catch(e) { showToast('Failed', 'error'); }
}

function updatePreview() {
  var el = document.getElementById('customize-preview');
  if (!el || !appState.currentUserData) return;
  var u = appState.currentUserData;
  var cc = 'profile-card-' + (u.cardStyle || 'glass');
  var nc = 'name-' + (u.nameEffect || 'neon');
  var lh = '';
  if (u.links && u.links.length > 0) {
    u.links.slice(0, 3).forEach(function(l) { lh += '<div class="link-btn !py-2 !text-xs !rounded-lg"><i class="' + (l.icon || 'fa-solid fa-link') + '"></i><span>' + (l.title || 'Untitled') + '</span></div>'; });
    if (u.links.length > 3) lh += '<p class="text-xs text-ss-muted text-center">+' + (u.links.length - 3) + ' more</p>';
  }
  var bh = u.banner ? '<div class="h-16 rounded-t-[11px] bg-cover bg-center" style="background-image:url(\'' + u.banner + '\')"></div>' : '';
  var ah = u.avatar ? '<img src="' + u.avatar + '" class="w-12 h-12 rounded-xl object-cover" style="border:2px solid #0A0A0F" alt="">' : '<div class="w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold" style="border:2px solid #0A0A0F;background:linear-gradient(135deg,#FF1493,#DB2777)"><span class="text-white">' + (u.displayName || '?').charAt(0).toUpperCase() + '</span></div>';
  el.innerHTML = '<div class="' + cc + ' overflow-hidden">' + bh + '<div class="px-4 pb-4 ' + (u.banner ? '-mt-6 relative' : 'pt-4') + '">' + ah + '<h3 class="font-display font-bold text-sm mt-2 ' + nc + '"' + (u.nameEffect === 'glitch' ? ' data-text="' + (u.displayName || '') + '"' : '') + '>' + (u.displayName || 'User') + '</h3><p class="text-ss-muted text-xs" style="font-family:\'JetBrains Mono\',monospace">@' + (u.username || '') + '</p>' + (u.description ? '<p class="text-ss-text/70 text-xs mt-2 line-clamp-2">' + u.description + '</p>' : '') + (lh ? '<div class="mt-3 space-y-1.5">' + lh + '</div>' : '') + '</div></div>';
}

/* ============================
   Admin Panel
   ============================ */
function loadAdminPage() { switchAdminTab(appState.currentAdminTab); }

async function switchAdminTab(tab) {
  appState.currentAdminTab = tab;
  document.querySelectorAll('.admin-nav-item').forEach(function(t) { t.classList.toggle('active', t.dataset.atab === tab); });
  var c = document.getElementById('admin-content');

  if (tab === 'dashboard') {
    c.innerHTML = '<div class="loading-spinner mx-auto my-8"></div>';
    try {
      var snap = await db.collection('users').get();
      var total = snap.size, views = 0, prem = 0, staff = 0;
      var recent = [];
      snap.forEach(function(d) { var u = d.data(); views += u.views || 0; if (u.plan === 'premium') prem++; if (ROLE_LEVELS[u.role] >= ROLE_LEVELS.mod) staff++; recent.push(u); });
      recent.sort(function(a, b) { return (b.createdAt ? b.createdAt.toMillis() : 0) - (a.createdAt ? a.createdAt.toMillis() : 0); });
      recent = recent.slice(0, 10);
      c.innerHTML = '<h2 class="font-display text-2xl font-bold mb-6">Dashboard</h2>' +
        '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">' +
        '<div class="stat-card"><p class="text-ss-muted text-xs font-medium uppercase">Total Users</p><p class="text-2xl font-bold mt-1">' + formatNumber(total) + '</p></div>' +
        '<div class="stat-card"><p class="text-ss-muted text-xs font-medium uppercase">Total Views</p><p class="text-2xl font-bold mt-1">' + formatNumber(views) + '</p></div>' +
        '<div class="stat-card"><p class="text-ss-muted text-xs font-medium uppercase">Premium</p><p class="text-2xl font-bold mt-1">' + prem + '</p></div>' +
        '<div class="stat-card"><p class="text-ss-muted text-xs font-medium uppercase">Staff</p><p class="text-2xl font-bold mt-1">' + staff + '</p></div></div>' +
        '<h3 class="font-semibold text-lg mb-4">Recent Users</h3><div class="glass rounded-xl overflow-x-auto"><table class="data-table"><thead><tr><th>UID</th><th>Username</th><th>Role</th><th>Views</th><th>Status</th><th>Joined</th></tr></thead><tbody>' +
        recent.map(function(u) { return '<tr><td class="font-mono text-xs">#' + String(u.uid || 0).padStart(7, '0') + '</td><td><a href="#/u/' + u.username + '" class="text-ss-pink hover:underline">' + u.username + '</a></td><td><span class="role-tag role-' + u.role + '">' + u.role + '</span></td><td>' + formatNumber(u.views) + '</td><td class="text-' + ((u.status || 'active') === 'active' ? 'green-400' : (u.status || '') === 'suspended' ? 'yellow-400' : 'red-400') + '">' + (u.status || 'active') + '</td><td class="text-ss-muted">' + (u.createdAt ? u.createdAt.toDate().toLocaleDateString() : 'N/A') + '</td></tr>'; }).join('') +
        '</tbody></table></div>';
    } catch (e) { c.innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>'; }
  } else if (tab === 'users') {
    c.innerHTML = '<div class="loading-spinner mx-auto my-8"></div>';
    try {
      var snap = await db.collection('users').orderBy('uid').get();
      var users = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
      c.innerHTML = '<div class="flex items-center justify-between mb-6"><h2 class="font-display text-2xl font-bold">Users</h2><input type="text" class="input-field !w-64" placeholder="Search..." id="user-search" oninput="filterUsers()"></div>' +
        '<div class="glass rounded-xl overflow-x-auto"><table class="data-table" id="users-table"><thead><tr><th>UID</th><th>Username</th><th>Display</th><th>Role</th><th>Views</th><th>Status</th><th>Actions</th></tr></thead><tbody>' +
        users.map(function(u) {
          var st = u.status || 'active';
          return '<tr data-search="' + (u.username + ' ' + (u.displayName || '')).toLowerCase() + '"><td class="font-mono text-xs">#' + String(u.uid || 0).padStart(7, '0') + '</td><td><a href="#/u/' + u.username + '" class="text-ss-pink hover:underline">' + u.username + '</a></td><td>' + (u.displayName || '-') + '</td><td><span class="role-tag role-' + u.role + '">' + u.role + '</span></td><td>' + formatNumber(u.views) + '</td><td class="text-' + (st === 'active' ? 'green-400' : st === 'suspended' ? 'yellow-400' : 'red-400') + '">' + st + '</td>' +
            '<td class="space-x-1"><button class="btn-ghost !px-2 !py-1 text-xs" onclick="openRoleModal(\'' + u.id + '\',\'' + u.role + '\')" title="Change role"><i class="fa-solid fa-user-shield"></i></button>' +
            '<button class="btn-ghost !px-2 !py-1 text-xs text-yellow-400" onclick="toggleUserStatus(\'' + u.id + '\',\'' + st + '\')" title="Suspend/unsuspend"><i class="fa-solid fa-' + (st === 'suspended' ? 'play' : 'pause') + '"></i></button>' +
            (ROLE_LEVELS[appState.currentUserData.role] >= ROLE_LEVELS.admin ? '<button class="btn-ghost !px-2 !py-1 text-xs text-red-400" onclick="banUser(\'' + u.id + '\')" title="Ban"><i class="fa-solid fa-ban"></i></button>' : '') +
            '</td></tr>';
        }).join('') + '</tbody></table></div>';
    } catch (e) { c.innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>'; }
  } else if (tab === 'badges') {
    c.innerHTML = '<h2 class="font-display text-2xl font-bold mb-6">Badge Management</h2>' +
      '<div class="glass rounded-xl p-6 mb-6"><h3 class="font-semibold mb-4">Official Badges</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-3">' +
      [{id:'verified',icon:'check'},{id:'premium',icon:'crown'},{id:'staff',icon:'shield'},{id:'early',icon:'heart'},{id:'pearl',icon:'gem'}].map(function(b) {
        return '<div class="p-3 rounded-xl text-center" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,20,147,0.08)"><span class="badge badge-' + b.id + '"><i class="fa-solid fa-' + b.icon + ' text-[9px]"></i> ' + b.id.charAt(0).toUpperCase() + b.id.slice(1) + '</span></div>';
      }).join('') + '</div></div>' +
      '<div class="glass rounded-xl p-6"><h3 class="font-semibold mb-4">Grant Badge</h3><div class="flex flex-wrap gap-3"><input type="text" class="input-field flex-1 min-w-[200px]" id="badge-username" placeholder="Username">' +
      '<select class="input-field !w-40" id="badge-type"><option value="verified">Verified</option><option value="premium">Premium</option><option value="early">Early</option><option value="pearl">Pearl</option><option value="staff">Staff</option></select>' +
      '<button class="btn-pink" onclick="grantBadge()">Grant</button></div></div>';
  } else if (tab === 'roles') {
    c.innerHTML = '<h2 class="font-display text-2xl font-bold mb-6">Role Management</h2>' +
      '<div class="glass rounded-xl p-6 mb-6"><h3 class="font-semibold mb-4">Hierarchy</h3><div class="space-y-3">' +
      ['owner','manager','admin','mod','user'].map(function(r, i) {
        return '<div class="flex items-center gap-4 p-3 rounded-xl" style="background:rgba(255,255,255,0.03)"><span class="role-tag role-' + r + ' w-24 text-center">' + r.toUpperCase() + '</span><div class="flex-1"><div class="h-2 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.1)"><div class="h-full rounded-full bg-ss-pink" style="width:' + ((i + 1) * 20) + '%"></div></div></div><span class="text-xs text-ss-muted">Level ' + (i + 1) + '</span></div>';
      }).join('') + '</div></div>' +
      '<div class="glass rounded-xl p-6"><h3 class="font-semibold mb-4">Change User Role</h3><div class="flex flex-wrap gap-3"><input type="text" class="input-field flex-1 min-w-[200px]" id="role-username" placeholder="Username">' +
      '<select class="input-field !w-40" id="new-role"><option value="user">User</option><option value="mod">Mod</option><option value="admin">Admin</option><option value="manager">Manager</option></select>' +
      '<button class="btn-pink" onclick="changeUserRole()">Update</button></div><p class="text-xs text-ss-muted mt-2">Cannot promote above your own level.</p></div>';
  } else if (tab === 'audit') {
    c.innerHTML = '<div class="loading-spinner mx-auto my-8"></div>';
    try {
      var snap = await db.collection('audit').orderBy('timestamp', 'desc').limit(50).get();
      var logs = snap.docs.map(function(d) { var e = d.data(); return { action: e.action, user: e.username || e.userId || '-', time: e.timestamp ? e.timestamp.toDate().toLocaleString() : 'N/A' }; });
      c.innerHTML = '<h2 class="font-display text-2xl font-bold mb-6">Audit Log</h2><div class="glass rounded-xl overflow-hidden"><table class="data-table"><thead><tr><th>Time</th><th>Action</th><th>User</th></tr></thead><tbody>' +
        (logs.length ? logs.map(function(l) { return '<tr><td class="text-ss-muted text-xs whitespace-nowrap">' + l.time + '</td><td>' + l.action + '</td><td class="text-ss-pink">' + l.user + '</td></tr>'; }).join('') : '<tr><td colspan="3" class="text-center text-ss-muted py-8">No logs yet</td></tr>') +
        '</tbody></table></div>';
    } catch (e) { c.innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>'; }
  }
}

function filterUsers() {
  var q = (document.getElementById('user-search').value || '').toLowerCase();
  document.querySelectorAll('#users-table tbody tr').forEach(function(r) {
    r.style.display = (r.dataset.search || '').includes(q) ? '' : 'none';
  });
}

async function openRoleModal(userId, currentRole) {
  var nr = prompt('New role (user, mod, admin, manager):', currentRole);
  if (!nr || !ROLE_LEVELS[nr]) { if (nr !== null) showToast('Invalid role', 'error'); return; }
  if (ROLE_LEVELS[nr] >= ROLE_LEVELS[appState.currentUserData.role]) { showToast('Cannot assign at or above your level', 'error'); return; }
  try {
    await db.collection('users').doc(userId).update({ role: nr, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('audit').add({ action: 'Role changed to ' + nr, userId: userId, adminId: appState.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('Role updated', 'success'); switchAdminTab('users');
  } catch (e) { showToast('Failed', 'error'); }
}

async function toggleUserStatus(userId, cur) {
  var ns = cur === 'suspended' ? 'active' : 'suspended';
  try {
    await db.collection('users').doc(userId).update({ status: ns, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('audit').add({ action: 'User ' + ns, userId: userId, adminId: appState.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('User ' + ns, 'success'); switchAdminTab('users');
  } catch (e) { showToast('Failed', 'error'); }
}

async function banUser(userId) {
  if (!confirm('Ban this user?')) return;
  try {
    await db.collection('users').doc(userId).update({ status: 'banned', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('audit').add({ action: 'User banned', userId: userId, adminId: appState.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('User banned', 'success'); switchAdminTab('users');
  } catch (e) { showToast('Failed', 'error'); }
}

async function grantBadge() {
  var un = (document.getElementById('badge-username').value || '').trim().toLowerCase();
  var bt = document.getElementById('badge-type').value;
  if (!un) { showToast('Username required', 'error'); return; }
  try {
    var ud = await db.collection('usernames').doc(un).get();
    if (!ud.exists) { showToast('User not found', 'error'); return; }
    var uid = ud.data().uid;
    var doc = await db.collection('users').doc(uid).get();
    var badges = doc.data().badges || [];
    if (badges.find(function(b) { return b.id === bt; })) { showToast('Already has this badge', 'error'); return; }
    var names = { verified: 'Verified', premium: 'Premium', staff: 'Staff', early: 'Early Supporter', pearl: 'Pink Pearl' };
    var icons = { verified: 'fa-solid fa-check', premium: 'fa-solid fa-crown', staff: 'fa-solid fa-shield', early: 'fa-solid fa-heart', pearl: 'fa-solid fa-gem' };
    badges.push({ id: bt, name: names[bt], icon: icons[bt], tooltip: names[bt] });
    await db.collection('users').doc(uid).update({ badges: badges, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('audit').add({ action: 'Badge granted: ' + bt, username: un, userId: uid, adminId: appState.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('Badge granted to ' + un, 'success');
    document.getElementById('badge-username').value = '';
  } catch (e) { showToast('Failed: ' + e.message, 'error'); }
}

async function changeUserRole() {
  var un = (document.getElementById('role-username').value || '').trim().toLowerCase();
  var nr = document.getElementById('new-role').value;
  if (!un) { showToast('Username required', 'error'); return; }
  if (ROLE_LEVELS[nr] >= ROLE_LEVELS[appState.currentUserData.role]) { showToast('Cannot assign at or above your level', 'error'); return; }
  try {
    var ud = await db.collection('usernames').doc(un).get();
    if (!ud.exists) { showToast('User not found', 'error'); return; }
    var uid = ud.data().uid;
    await db.collection('users').doc(uid).update({ role: nr, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection('audit').add({ action: 'Role changed to ' + nr, username: un, userId: uid, adminId: appState.currentUser.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    showToast(un + ' is now ' + nr, 'success');
    document.getElementById('role-username').value = '';
  } catch (e) { showToast('Failed: ' + e.message, 'error'); }
}

/* ============================
   Fade-up Animations
   ============================ */
function initFadeUp() {
  var els = document.querySelectorAll('.fade-up');
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        setTimeout(function() { entry.target.classList.add('visible'); }, parseInt(entry.target.dataset.delay) || 0);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  els.forEach(function(el) { obs.observe(el); });
}

/* ============================
   Global Listeners
   ============================ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeAuth();
    var fp = document.getElementById('fx-panel');
    if (fp) fp.classList.remove('open');
  }
});

document.getElementById('auth-modal').addEventListener('click', function(e) {
  if (e.target === this) closeAuth();
});

document.getElementById('auth-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleAuth();
});

updateNav();
initFadeUp();
</script>
