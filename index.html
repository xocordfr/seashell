function lI(u){if(!u)return'fa-solid fa-link';const l=u.toLowerCase();if(l.includes('github'))return'fa-brands fa-github';if(l.includes('twitter')||l.includes('x.com'))return'fa-brands fa-x-twitter';if(l.includes('discord'))return'fa-brands fa-discord';if(l.includes('youtube'))return'fa-brands fa-youtube';if(l.includes('twitch'))return'fa-brands fa-twitch';if(l.includes('spotify'))return'fa-brands fa-spotify';if(l.includes('instagram'))return'fa-brands fa-instagram';if(l.includes('tiktok'))return'fa-brands fa-tiktok';if(l.includes('reddit'))return'fa-brands fa-reddit';if(l.includes('steam'))return'fa-brands fa-steam';if(l.includes('telegram'))return'fa-brands fa-telegram';return'fa-solid fa-arrow-up-right-from-square'}

const D={
  async gU(uid){try{const d=await db.collection('users').doc(uid).get();return d.exists?d.data():null}catch(e){return null}},
  async gUN(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();return s.empty?null:s.docs[0].data()}catch(e){return null}},
  async gUE(un){try{const d=await db.collection('usernames').doc(un).get();return d.exists?d.data():null}catch(e){return null}},
  async getNextUid(){const ref=db.collection('config').doc('counter');return db.runTransaction(async t=>{const d=await t.get(ref);let n=1;if(d.exists)n=(d.data().nextUid||0)+1;t.set(ref,{nextUid:n},{merge:true});return n})},
  async cU(uid,d){const num=await this.getNextUid();const u={uid,uidNumber:num,displayName:d.displayName||'',username:d.username||'',bio:'',avatar:'',backgroundUrl:'',links:[],badges:[],activeBadges:[],role:'user',banned:false,createdAt:Date.now(),views:0,themeColor:'#f472b6'};await db.collection('users').doc(uid).set(u);if(d.username&&d.email)await db.collection('usernames').doc(d.username).set({uid:uid,email:d.email});return u},
  async uU(uid,d){await db.collection('users').doc(uid).update(d);return this.gU(uid)},
  async dU(uid){const u=await this.gU(uid);if(u&&u.username){try{await db.collection('usernames').doc(u.username).delete()}catch(e){}}await db.collection('users').doc(uid).delete()},
  async aU(){try{const s=await db.collection('users').get();return s.docs.map(d=>d.data())}catch(e){return[]}},
  async iV(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();if(!s.empty){const r=s.docs[0].ref;await db.runTransaction(async t=>{const d=await t.get(r);if(d.exists)t.update(r,{views:(d.data().views||0)+1})})}}catch(e){}},
  async chUn(o,n,uid,email){if(o){try{await db.collection('usernames').doc(o).delete()}catch(e){}}if(n&&email)await db.collection('usernames').doc(n).set({uid:uid,email:email})},
  async gByUidNum(num){try{const s=await db.collection('users').where('uidNumber','==',num).limit(1).get();return s.empty?null:s.docs[0].data()}catch(e){return null}}
};

async function doSignup(email,pw,name,un){if(!FB){toast('Auth not configured','er');return}if(await D.gUN(un)){toast('Username taken','er');return}try{const cr=await auth.createUserWithEmailAndPassword(email,pw);await D.cU(cr.user.uid,{displayName:name,username:un,email});CU=await D.gU(cr.user.uid);toast('Account created!','ok');nav('/dashboard')}catch(e){if(e.code==='auth/configuration-not-found'){toast('Email/Password not enabled in Firebase Console','er');return}toast(e.message,'er')}}
async function doLogin(username,pw){if(!FB){toast('Auth not configured','er');return}const ud=await D.gUE(username);if(!ud){toast('Username not found','er');return}try{const cr=await auth.signInWithEmailAndPassword(ud.email,pw);const u=await D.gU(cr.user.uid);if(u&&u.banned){auth.signOut();toast('Account banned','er');return}CU=u;toast('Welcome back!','ok');nav('/dashboard')}catch(e){if(e.code==='auth/configuration-not-found'){toast('Email/Password not enabled','er');return}if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){toast('Incorrect password','er');return}toast(e.message,'er')}}
async function doLogout(){try{await auth.signOut()}catch(e){}CU=null;toast('Logged out','in');nav('/')}
async function restoreSess(){if(!FB)return;return new Promise(r=>{const u=auth.onAuthStateChanged(async us=>{u();if(us){CU=await D.gU(us.uid);if(CU&&CU.banned){await auth.signOut();CU=null}}r()})})})}

async function rDT(){const el=document.getElementById('dC');if(!el||!CU)return;const u=CU;if(dTab==='overview')el.innerHTML=dOv(u);else if(dTab==='analytics')el.innerHTML=dAn(u);else if(dTab==='badges')el.innerHTML=dBg(u);else if(dTab==='settings')el.innerHTML=dSt(u);else if(dTab==='customise')el.innerHTML=dCu(u);else if(dTab==='links')el.innerHTML=dLn(u)}

function dOv(u){const ab=(u.activeBadges&&u.activeBadges.length?u.activeBadges:u.badges||[]);const bHt=ab.map(b=>bH(b,true)).join(' ')||'<span style="color:var(--muted);font-size:13px">No badges</span>';
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Overview</h2><div class="sg" style="margin-bottom:28px"><div class="sc"><div class="sn">${u.views||0}</div><div class="sl">Profile Views</div></div><div class="sc"><div class="sn">${(u.links||[]).length}</div><div class="sl">Total Links</div></div><div class="sc"><div class="sn">${(u.badges||[]).length}</div><div class="sl">Badges Earned</div></div><div class="sc"><div class="sn">${rT(u.role)}</div><div class="sl">Role</div></div></div><div class="card"><div style="display:flex;align-items:center;gap:16px;margin-bottom:18px"><div style="width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:700;font-size:26px;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div><h3 class="font-display" style="font-size:18px;font-weight:700">${E(u.displayName||'No name')}</h3><p style="color:var(--accent);font-size:13px;margin-top:2px">@${E(u.username)} · UID ${u.uidNumber||'--'}</p><p style="color:var(--fg2);font-size:13px;margin-top:4px;max-width:400px;line-height:1.5">${E(u.bio||'No bio set')}</p></div></div><div style="display:flex;flex-wrap:wrap;gap:8px">${bHt}</div></div>`}

function dAn(u){const v=u.views||0;const bars=Array.from({length:7},()=>Math.max(5,Math.floor(Math.random()*Math.max(1,v)/3)));const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];const mx=Math.max(...bars);
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Analytics</h2><div class="sg" style="margin-bottom:28px"><div class="sc"><div class="sn">${v}</div><div class="sl">Total Views</div></div><div class="sc"><div class="sn">${v>0?Math.floor(v/7):0}</div><div class="sl">Avg Daily</div></div><div class="sc"><div class="sn">${(u.links||[]).length}</div><div class="sl">Links</div></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:20px">Views This Week</h3><div style="display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:10px">${bars.map((b,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:100%;background:linear-gradient(180deg,var(--accent),rgba(244,114,182,0.3));border-radius:6px 6px 2px 2px;height:${Math.max(8,(b/mx)*120)}px"></div><span style="font-size:10px;color:var(--muted)">${days[i]}</span></div>`).join('')}</div></div>`}

function dBg(u){const owned=u.badges||[];const active=u.activeBadges||[];if(!owned.length)return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Badges</h2><div class="card"><p style="color:var(--muted);font-size:13px">No badges earned yet.</p></div>`;
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:6px">Badges</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">Toggle badges on or off for your profile.</p><div style="display:flex;flex-direction:column;gap:8px">${owned.map(k=>{const b=BG[k];if(!b)return'';const isOn=active.length?active.includes(k):true;return`<div class="card" style="padding:14px 18px;display:flex;align-items:center;gap:14px"><div style="width:36px;height:36px;border-radius:9px;background:${b.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:${isOn?1:0.4}"><span style="width:22px;height:22px;display:flex">${b.s}</span></div><div style="flex:1"><div style="font-weight:600;font-size:13px;${isOn?'':'color:var(--muted)'}">${b.n}</div><div style="font-size:11px;color:var(--muted)">${b.d}</div></div><button class="btoggle ${isOn?'on':''}" onclick="tBadge('${k}')"></button></div>`}).join('')}</div>`}

async function tBadge(k){if(!CU)return;const owned=CU.badges||[];let active=[...(CU.activeBadges||[])];if(active.includes(k))active=active.filter(x=>x!==k);else active.push(k);if(!active.length)active=[];await D.uU(CU.uid,{activeBadges:active});CU=await D.gU(CU.uid);rDT();toast(active.includes(k)?'Badge enabled':'Badge disabled','in')}

function dSt(u){return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Settings</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Profile Information</h3><div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="sN" class="ifield" type="text" placeholder="Your display name" value="${E(u.displayName||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Bio</label><textarea id="sB" class="ifield" placeholder="Tell us about yourself..." style="min-height:80px;resize:vertical">${E(u.bio||'')}</textarea></div><button class="bp" onclick="sPr()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button></div></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Username</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current</label><input class="ifield" type="text" value="@${E(u.username)}" disabled></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Username</label><div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px">seashell.lol/</span><input id="nUn" class="ifield" type="text" placeholder="newusername" style="padding-left:112px"></div></div><button class="bp" onclick="chUsername()"><i class="fa-solid fa-pen"></i> Change Username</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Password</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current Password</label><input id="cPw" class="ifield" type="password" placeholder="Enter current password"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Password</label><input id="nPw" class="ifield" type="password" placeholder="Min 6 characters"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Confirm New Password</label><input id="nPw2" class="ifield" type="password" placeholder="Confirm new password"></div><button class="bp" onclick="chPassword()"><i class="fa-solid fa-lock"></i> Change Password</button></div></div></div>`}

async function sPr(){const n=document.getElementById('sN').value.trim(),b=document.getElementById('sB').value.trim();if(!n){toast('Name required','er');return}await D.uU(CU.uid,{displayName:n,bio:b});CU=await D.gU(CU.uid);toast('Profile saved!','ok');rDT()}
async function chUsername(){const nu=document.getElementById('nUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return}if(nu===CU.username){toast('Same as current','er');return}const ex=await D.gUN(nu);if(ex){toast('Username taken','er');return}const ue=await D.gUE(nu);if(ue&&ue.uid!==CU.uid){toast('Username taken','er');return}const ue2=await D.gUE(CU.username);await D.chUn(CU.username,nu,CU.uid,ue2?ue2.email:null);await D.uU(CU.uid,{username:nu});CU=await D.gU(CU.uid);toast('Username changed to @'+nu,'ok');rDT();document.querySelector('.duinfo').innerHTML=`<span>@${E(CU.username)}</span><br>UID ${CU.uidNumber||'--'}`}
async function chPassword(){const cp=document.getElementById('cPw').value,np=document.getElementById('nPw').value,np2=document.getElementById('nPw2').value;if(!cp||!np){toast('Fill in all fields','er');return}if(np.length<6){toast('Min 6 chars','er');return}if(np!==np2){toast('Passwords do not match','er');return}try{const cred=firebase.auth.EmailAuthProvider.credential(auth.currentUser.email,cp);await auth.currentUser.reauthenticateWithCredential(cred);await auth.currentUser.updatePassword(np);toast('Password changed!','ok');document.getElementById('cPw').value='';document.getElementById('nPw').value='';document.getElementById('nPw2').value=''}catch(e){if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')toast('Wrong password','er');else toast(e.message,'er')}}

function dCu(u){return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Customise</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Avatar</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL.</p><div style="display:flex;align-items:center;gap:16px;margin-bottom:14px"><div style="width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:700;font-size:24px;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div style="flex:1"><input id="cAv" class="ifield" type="url" placeholder="https://example.com/avatar.png" value="${E(u.avatar||'')}"></div></div></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Background</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL for your profile background.</p>${u.backgroundUrl?`<div style="width:100%;height:140px;border-radius:12px;overflow:hidden;margin-bottom:14px;background:var(--bg);border:1px solid var(--border)"><img src="${u.backgroundUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`:''}<input id="cBg" class="ifield" type="url" placeholder="https://example.com/background.jpg" value="${E(u.backgroundUrl||'')}"></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Theme Color</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">${['#f472b6','#fb7185','#f43f5e','#f97316','#fbbf24','#22c55e','#14b8a6','#06b6d4','#3b82f6','#a855f7'].map(c=>`<button onclick="pTC('${c}')" style="width:38px;height:38px;border-radius:10px;background:${c};border:2px solid ${u.themeColor===c?'#fff':'transparent'};cursor:pointer" title="${c}"></button>`).join('')}</div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:7px">Custom Color</label><div style="display:flex;gap:10px;align-items:center"><input type="color" id="ccI" value="${u.themeColor||'#f472b6'}" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none"><span id="ccV" style="font-size:13px;color:var(--fg2)">${u.themeColor||'#f472b6'}</span></div></div></div></div><button class="bp" onclick="saveAllCustom()" style="width:100%;justify-content:center;padding:12px"><i class="fa-solid fa-floppy-disk"></i> Save All Customisation</button></div>`}

function pTC(c){document.getElementById('ccI').value=c;document.getElementById('ccV').textContent=c;document.querySelectorAll('.card:last-of-type button[onclick^="pTC"]').forEach(b=>{b.style.borderColor=b.onclick.toString().includes(c)?'#fff':'transparent'})})}

async function saveAllCustom(){const a=document.getElementById('cAv').value.trim(),b=document.getElementById('cBg').value.trim(),c=document.getElementById('ccI').value;await D.uU(CU.uid,{avatar:a,backgroundUrl:b,themeColor:c});CU=await D.gU(CU.uid);toast('All customisation saved!','ok');rDT()}

function dLn(u){const lHt=u.links.map((l,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px"><i class="${lI(l.url)}" style="color:var(--accent);width:20px;text-align:center;font-size:15px"></i><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.title)}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.url)}</div></div><button onclick="eL(${i})" style="background:none;border:none;color:var(--fg2);cursor:pointer;padding:4px"><i class="fa-solid fa-pen" style="font-size:11px"></i></button><button onclick="rL(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;padding:4px"><i class="fa-solid fa-trash" style="font-size:11px"></i></button></div>`).join('')}
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:6px">Links</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">Manage links on your public profile.</p><div style="margin-bottom:16px"><button class="bp" onclick="aLM()"><i class="fa-solid fa-plus"></i> Add Link</button></div><div style="display:flex;flex-direction:column;gap:8px">${lHt||'<div class="card" style="text-align:center;padding:30px"><p style="color:var(--muted);font-size:13px">No links yet.</p></div>'}</div></div>`}

function aLM(idx){const i=typeof idx==='number'?idx:-1;const l=i>=0?CU.links[i]:null;showModal(l?'Edit Link':'Add Link',`<div style="display:flex;flex-direction:column;gap:14px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Title</label><input id="lT" class="ifield" type="text" placeholder="My Website" value="${l?E(l.title):''}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">URL</label><input id="lU" class="ifield" type="url" placeholder="https://example.com" value="${l?E(l.url):''}"></div></div>`,[{l:'Cancel',c:'bs',a:'clM()'},{l:l?'Save':'Add',c:'bp',a:`sLk(${i})`}]})`)}
async function sLk(idx){const t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();if(!t||!u){toast('Fill in all fields','er');return}const ls=[...CU.links];if(idx>=0)ls[idx]={title:t,url:u};else ls.push({title:t,url:u});await D.uU(CU.uid,{links:ls});CU=await D.gU(CU.uid);clM();toast(idx>=0?'Link updated':'Link added','ok');rDT()}
function eL(i){aLM(i)}
async function rL(i){const ls=CU.links.filter((_,x)=>x!==i);await D.uU(CU.uid,{links:ls});CU=await D.gU(CU.uid);toast('Link removed','ok');rDT()}

/* Bio Page — no nav, no particles, theme color gradient bg */
async function pBio(un){const a=document.getElementById('app');await D.iV(un);const u=await D.gUN(un);if(!u||u.banned){a.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="text-align:center"><i class="fa-solid fa-ghost" style="font-size:44px;color:var(--muted);margin-bottom:14px"></i><h2 class="font-display" style="font-size:20px;font-weight:700">User not found</h2><span class="bp" style="margin-top:18px;display:inline-flex;cursor:pointer" onclick="nav('/')">Go Home</span></div></div></div>`;return}
const tc=u.themeColor||'#f472b6';const ab=(u.activeBadges&&u.activeBadges.length?u.activeBadges:u.badges||[]);const bHt=ab.map(b=>bH(b)).join(' ');const lHt=u.links.map(l=>`<a href="${E(l.url)}" target="_blank" rel="noopener" class="blink" style="--accent:${tc}"><i class="${lI(l.url)}" style="color:${tc}"></i><span style="flex:1;font-size:13px;font-weight:500">${E(l.title)}</span><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;color:var(--muted)"></i></a>`).join('')}
a.innerHTML=`<div class="bwrap" style="--accent:${tc}"><div class="bbg"><div style="position:absolute;inset:0;background:var(--bg)"></div>${u.backgroundUrl?`<img src="${u.backgroundUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.2" onerror="this.style.display='none'">`:`<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,${tc}15 0%,transparent 60%)"></div><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 70% 80%,${tc}08 0%,transparent 40%)"></div>`}</div><div class="bcard" style="position:relative;z-index:2"><div style="display:flex;flex-direction:column;align-items:center;text-align:center"><div style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,${tc},#3b82f6,#a855f7);display:flex;align-items:center;justify-content:center;font-family:outfit;font-weight:700;font-size:34px;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div style="margin-top:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center"><h1 class="font-display uid-tip" data-uid="UID ${u.uidNumber||'--'}" style="font-size:22px;font-weight:800;">${E(u.displayName||u.username)}</h1>${bHt}</div><p style="color:var(--accent);font-size:12px;margin-top:2px">@${E(u.username)}</p>${u.bio?`<p style="color:var(--fg2);font-size:13px;line-height:1.6;margin-top:8px;max-width:360px">${E(u.bio)}</p>`:''}<div style="width:44px;height:1.5px;background:linear-gradient(90deg,transparent,${tc},transparent);margin:22px 0;border-radius:2px"></div>${lHt?`<div style="width:100%;display:flex;flex-direction:column;gap:9px">${lHt}`:'<p style="color:var(--muted);font-size:12px;margin-top:6px">No links yet.</p>'}</div><div style="margin-top:24px;display:flex;align-items:center;gap:5px;color:var(--muted);font-size:11px"><i class="fa-solid fa-eye" style="font-size:10px"></i> ${u.views||0} views<span style="margin:0 7px">·</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2C8 2 4 6 4 10c0 4 3 7.5 7 9-4-1.5-7-5-9V4l7-3z" fill="${tc}30" stroke="${tc}" stroke-width="1.5"/></svg>seashell.lol</div></div></div></div></div></div>`}

/* Admin — Users & Stats only */
let aT='users',aS='';
function pAdmin(){return`<div class="aside"><div style="padding:0 18px 16px;border-bottom:1px solid var(--border);margin-bottom:8px"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Admin Panel</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">${rT(CU.role)} ${E(CU.displayName)}</div></div><div class="anav ${aT==='users'?'on':''}" onclick="sAT('users')"><i class="fa-solid fa-users" style="width:16px;font-size:13px"></i>Users</div><div class="anav ${aT==='stats'?'on':''}" onclick="sAT('stats')"><i class="fa-solid fa-chart-bar" style="width:16px;font-size:13px"></i>Statistics</div></div><div class="abody" id="aC"></div></div>`

async function sAT(t){aT=t;document.querySelectorAll('.anav').forEach(n=>n.classList.remove('on'));document.querySelector(`.anav[onclick*="'${t}'"]`)?.classList.add('on');await rAC()}

async function rAC(){
  const el=document.getElementById('aC');if(!el)return;
  if(aT==='users'){let us=await D.aU();if(aS){const q=aS.toLowerCase();us=us.filter(u=>(u.displayName||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q)||String(u.uidNumber||'').includes(q))}us.sort((a,b)=>(RL[b.role]||0)-(RL[a.role]||0));
  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px"><h2 class="font-display" style="font-size:20px;font-weight:700">User Management</h2><div style="display:flex;gap:9px;align-items:center"><input id="aSI" class="ifield" type="text" placeholder="Search..." style="width:200px" value="${E(aS)}" oninput="aS=this.value;rAC()"><span style="font-size:12px;color:var(--muted)">${us.length} users</span></div></div><div style="overflow-x:auto;border:1px solid var(--border);border-radius:11px"><table class="utbl"><thead><tr><th>User</th><th>UID</th><th>Username</th><th>Role</th><th>Badges</th><th>Views</th><th>Status</th><th>Actions</th></tr></thead><tbody>${us.map(u=>`<tr><td><div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--border)">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div></div><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px">${E(u.displayName||'—')}</span></div></td><td style="font-size:11px;color:var(--fg2)">${u.uidNumber||'—'}</td><td style="color:var(--accent);font-size:11px">@${E(u.username||'—'}</td><td>${rT(u.role)}</td><td style="max-width:80px">${u.badges&&u.badges.length?u.badges.slice(0,2).map(b=>bH(b)).join(' ')+(u.badges.length>2?`<span style="font-size:10px;color:var(--muted)">+${u.badges.length-2}</span>`:''):'<span style="color:var(--muted);font-size:11px">None</span>'}</td><td style="font-size:11px">${u.banned?'<span style="color:var(--danger);font-size:11px;font-weight:600">BANNED</span>':'<span style="color:var(--success);font-size:11px">Active</span>'}</td><td><button onclick="aUA('${u.uid}')" class="bs bsm" style="padding:4px 10px;font-size:10px">Manage</button></td></tr>`).join('')}</tbody></table></div>`}
  else if(aT==='stats'){const us=await D.aU();const tv=us.reduce((s,u)=>s+(u.views||0),0);const tl=us.reduce((s,u)=>s+(u.links||[]).length,0);const rc={};us.forEach(u=>{rc[u.role]=(rc[u.role]||0)+1});const bc={};us.forEach(u=>(u.badges||[]).forEach(b=>{bc[b]=(bc[b]||0)+1});});
  el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:20px">Statistics</h2><div class="sg" style="margin-bottom:26px"><div class="sc"><div class="sn">${us.length}</div><div class="sl">Users</div></div><div class="sc"><div class="sn">${tv}</div><div class="sl">Views</div></div><div class="sc"><div class="sn">${tl}</div><div class="sl">Links</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><h3 class="font-display" style="font-size:14px;font-weight:600;margin-bottom:14px">By Role</h3>${Object.entries(rc).sort((a,b)=>RL[b[0]]-RL[a[0]]).map(([r,c])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:7px">${rT(r)}</div><span style="font-size:13px;font-weight:600">${c}</span></div></div></div><div class="card"><h3 class="font-display" style="font-size:14px;font-weight:600;margin-bottom:14px">Badges</h3>${Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([b,c])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:7px">${bH(b)}</div><span style="font-size:13px;font-weight:600">${c}</span></div></div>`).join('')||'<p style="color:var(--muted);font-size:12px">None assigned.</p>'}</div></div></div>`}

/* Admin User Actions */
async function aUA(uid){const t=await D.gU(uid);if(!t){toast('User not found','er');return}const ce=canEdit(t.role,CU.role);const cei=canEditUID(CU.role);const aks=Object.keys(BG);const ubH=aks.map(k=>{const h=(t.badges||[]).includes(k);const b=BG[k];return`<label style="display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;cursor:pointer;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='${h?b.bg:'transparent'" ><input type="checkbox" value="${k}" ${h?'checked':''} style="accent-color:var(--accent)"><span style="width:18px;height:18px;display:flex">${b.s}</span><span style="font-size:12px">${b.n}</span></label></div>`}).join('');const rO=Object.keys(RL).map(r=>`<option value="${r}" ${t.role===r?'selected':''} ${!ce&&RL[r]>RL[CU.role]?'disabled':''}>${r.charAt(0).toUpperCase()+r.slice(1)}${!ce&&RL[r]>RL[CU.role]?' (no perm)':''}</option>`).join('')}
showModal(`Manage @${t.username}`,`${!ce?`<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.18);border-radius:9px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--danger)"><i class="fa-solid fa-triangle-exclamation" style="margin-right:5px"></i>You cannot modify this user.</div>`:''}<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px;background:var(--bg2);border-radius:10px"><div style="width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0">${t.avatar?`<img src="${t.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:16px">${(t.displayName||'?')[0].toUpperCase()}</div>`}</div><div><div><div style="font-weight:600;font-size:14px">${E(t.displayName||'—')}</div><div style="font-size:11px;color:var(--accent);">"@${E(t.username)} · ${rT(t.role)} · UID ${t.uidNumber||'--'}</div></div></div></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Username</label><div style="display:flex;gap:7px"><input id="aNU" class="ifield" type="text" placeholder="New username" value="${E(t.username)}" style="flex:1"><button class="bs bsm" onclick="aCU('${uid}')" ${!ce?'disabled style="opacity:.35;cursor:not-allowed"':''}>Update</button></div></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change UID</label><div style="display:flex;gap:7px"><input id="aNUid" class="ifield" type="number" placeholder="New UID" value="${t.uidNumber||''}" style="flex:1" ${!cei?'disabled style="opacity:.35"':''}><button class="bs bsm" onclick="aCUID('${uid}')" ${!cei?'disabled style="opacity:.35;cursor:not-allowed"':''}>Set UID</button></div></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Role</label><select id="aNR" class="ifield" ${!ce?'disabled style="opacity:.35"':''}>${rO}</select></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Manage Badges</label><div id="aBL" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;max-height:200px;overflow-y:auto;padding:3px">${ubH}</div></div></div><div style="border-top:1px solid var(--border);padding-top:16px"><label style="font-size:11px;font-weight:600;color:var(--danger);display:block;margin-bottom:9px">Danger Zone</label><div style="display:flex;gap:9px;flex-wrap:wrap"><button class="bd" onclick="aTB('${uid}',${!t.banned})" ${!ce?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-${t.banned?'unlock':'ban'}" style="margin-right:3px"></i>${t.banned?'Unban':'Ban'}</button><button class="bd" onclick="aCD('${uid}','${E(t.displayName||t.username)}')" ${!ce?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-trash" style="margin-right:3px"></i></button></div></div>`,[{l:'Cancel',c:'bs',a:'clM()'},{l:'Save',c:'bp',a:`aSU('${uid}')`,id:'aSB'}]);if(!ce){const b=document.getElementById('aSB');if(b){b.disabled=true;b.style.opacity='.35';b.style.cursor='not-allowed'}}
async function aSU(uid){const t=await D.gU(uid);if(!t||!canEdit(t.role,CU.role)){toast('Permission denied','er');return}const nr=document.getElementById('aNR').value;if(!canEdit(nr,CU.role)){toast('Cannot assign higher role','er');return}const cbs=document.querySelectorAll('#aBL input[type="checkbox"]:checked');const nb=Array.from(cbs).map(c=>c.value);await D.uU(uid,{role:nr,badges:nb});toast('User updated','ok');clM();await rAC()}
async function aCU(uid){const t=await D.gU(uid);if(!t||!canEdit(t.role,CU.role)){toast('Permission denied','er');return}const nu=document.getElementById('aNU').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return}if(nu===t.username){clM();return}const ex=await D.gUN(nu);if(ex&&ex.uid!==uid){toast('Username taken','er');return}const ue=await D.gUE(nu);if(ue&&ue.uid!==uid){toast('Username taken','er');return}const ue2=await D.gUE(t.username);await D.chUn(t.username,nu,uid,ue2?ue2.email:null);await D.uU(uid,{username:nu});toast('Username changed to @'+nu,'ok');clM();await rAC()}
async function aCUID(uid){const t=await D.gU(uid);if(!t){toast('User not found','er');return}const newNum=parseInt(document.getElementById('aNUid').value);if(!newNum||newNum<1){toast('UID must be positive','er');return}const existing=await D.gByUidNum(newNum);if(existing&&existing.uid!==uid){toast(`UID ${newNum} taken by @${existing.username}`,'er');return}await D.uU(uid,{uidNumber:newNum});toast(`UID set to ${newNum}`,'ok');clM();await rAC()}
async function aTB(uid,ban){const t=await D.gU(uid);if(!t||!canEdit(t.role,CU.role)){toast('Permission denied','er');return}await D.uU(uid,{banned:ban});toast(ban?'User banned':'User unbanned',ban?'er':'ok');if(ban&&CU.uid===uid){doLogout();return}clM();await rAC()}
function aCD(uid,name){showModal('Confirm Deletion',`<div style="text-align:center;padding:8px 0"><i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:var(--danger);margin-bottom:14px"></i><p style="font-size:14px;margin-bottom:6px">Delete <strong>${name}</strong>?</p><p style="font-size:12px;color:var(--muted)">Cannot be undone.</p></div>`,[{l:'Cancel',c:'bs',a:'clM()'},{l:'Delete Forever',c:'bd',a:`aDU('${uid}')`}])}]}
async function aDU(uid){const t=await D.gU(uid);if(!t||!canEdit(t.role,CU.role)){toast('Permission denied','er');return}await D.dU(uid);toast('Deleted','er');if(uid===CU.uid){doLogout();return}clM();await rAC()}

/* Boot */
(async function(){try{await restoreSess()}catch(e){console.error(e);CU=null}router();window.addEventListener('popstate',router);document.addEventListener('click',function(e){const a=e.target.closest('a');if(a&&a.getAttribute('href')&&a.getAttribute('href')&&a.getAttribute('href').startsWith('/')&&!a.getAttribute('target')&&!a.getAttribute('rel')){e.preventDefault();nav(a.getAttribute('href'))}})})();
</script>
</body>
</html>
