var userCache={};var allUsersCache=null;var cacheValid=false;

function snapToUser(doc){if(!doc.exists)return null;var d=doc.data();return{id:doc.id,uid:d.uid||'',username:d.username||'',displayName:d.displayName||'',email:d.email||'',bio:d.bio||'',avatar:d.avatar||'',bgImage:d.bgImage||'',background:d.background||'void',accentColor:d.accentColor||'#7dd3fc',links:d.links||[],badges:d.badges||[],banned:d.banned||false,banReason:d.banReason||'',role:d.role||'user',permissions:d.permissions||null,createdAt:d.createdAt||Date.now(),views:d.views||0,password:d.password||''};}
function getAllUsers(){if(allUsersCache&&cacheValid)return Promise.resolve(allUsersCache);return db.collection("users").get().then(function(s){allUsersCache=[];s.forEach(function(d){var u=snapToUser(d);if(u)allUsersCache.push(u);});cacheValid=true;return allUsersCache;});}

// ==================== ROUTER ====================
function router(){
  var path=window.location.pathname;
  var parts=path.replace(/^\/|\/$/g,'').split('/');
  var route=parts[0]||'';
  var param=parts.slice(1).join('/');

  var app=document.getElementById('app');
  if(!app)return;

  curUser().then(function(user){
    if(route===''||route==='home'){
      app.innerHTML=renderHome(user);
    } else if(route==='dashboard'){
      if(!user){navigateTo('/');showModal(loginHTML());return;}
      app.innerHTML=renderDashboard(user,param);
    } else if(route==='admin'){
      needAdmin().then(function(admin){
        if(!admin)return;
        if(param==='roles'){
          getAllUsers().then(function(users){app.innerHTML=renderRolesPage(admin,users);});
        } else {
          getAllUsers().then(function(users){app.innerHTML=renderAdminTable(admin,users);});
        }
      });
    } else if(route==='s'){
      findByUsername('s').then(function(profileUser){
        if(profileUser){app.innerHTML=renderProfile(profileUser);}
        else{app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><p class="text-void-100">Example profile not found.</p></div>';}
      });
    } else {
      findByUsername(route).then(function(profileUser){
        if(profileUser){
          updateUser(profileUser.id,{views:firebase.firestore.FieldValue.increment(1)}).catch(function(){});
          app.innerHTML=renderProfile(profileUser);
        } else {
          P.start();
          app.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px"><h1 class="font-display font-bold text-6xl text-accent mb-4">404</h1><p class="text-void-100 text-lg mb-6">User <strong>@'+esc(route)+'</strong> not found</p><a href="/" class="vl-btn vl-btn-primary"><i class="fa-solid fa-house"></i> Go Home</a></div>';
        }
      });
    }
    window.scrollTo(0,0);
    bindEvents();
  });
}

// ==================== EVENT DELEGATION ====================
function bindEvents(){
  var app=document.getElementById('app');
  if(!app)return;

  // Open login/signup modals
  app.addEventListener('click',function(e){
    var el=e.target.closest('.open-login');
    if(el){e.preventDefault();showModal(loginHTML());return;}
    el=e.target.closest('.open-signup');
    if(el){e.preventDefault();showModal(signupHTML());return;}
  });

  // Modal delegate
  document.addEventListener('click',function(e){
    var el=e.target.closest('.open-login');
    if(el){e.preventDefault();showModal(loginHTML());return;}
    el=e.target.closest('.open-signup');
    if(el){e.preventDefault();showModal(signupHTML());return;}
  });

  // Form submissions via delegation on document
  document.addEventListener('submit',function(e){
    var frm=e.target;

    // Login
    if(frm.id==='frm-login'){
      e.preventDefault();
      var loginId=frm.querySelector('[name=loginId]').value.trim();
      var password=frm.querySelector('[name=password]').value;
      var errEl=frm.querySelector('#login-err');
      if(!loginId||!password){errEl.textContent='Please fill in all fields.';errEl.classList.remove('hidden');return;}
      errEl.classList.add('hidden');
      var lookup=loginId.indexOf('@')>-1?findByEmail(loginId):findByUsername(loginId);
      lookup.then(function(u){
        if(!u){errEl.textContent='No account found with that email/username.';errEl.classList.remove('hidden');return;}
        if(u.password!==hashPw(password)){errEl.textContent='Incorrect password.';errEl.classList.remove('hidden');return;}
        if(u.banned){errEl.textContent='This account has been banned.';errEl.classList.remove('hidden');return;}
        setSession(u.id);
        closeModal();
        toast('Welcome back, '+esc(u.displayName||u.username)+'!','success');
        router();
      }).catch(function(err){errEl.textContent='Login failed. Try again.';errEl.classList.remove('hidden');});
      return;
    }

    // Signup
    if(frm.id==='frm-signup'){
      e.preventDefault();
      var username=frm.querySelector('[name=username]').value.trim().toLowerCase();
      var displayName=frm.querySelector('[name=displayName]').value.trim()||username;
      var email=frm.querySelector('[name=email]').value.trim();
      var password=frm.querySelector('[name=password]').value;
      var errEl=frm.querySelector('#signup-err');
      if(!username||!email||!password){errEl.textContent='Please fill in all required fields.';errEl.classList.remove('hidden');return;}
      if(!/^[a-z0-9_]{3,20}$/.test(username)){errEl.textContent='Username must be 3-20 chars, lowercase letters, numbers, underscores.';errEl.classList.remove('hidden');return;}
      errEl.classList.add('hidden');
      findByUsername(username).then(function(existing){
        if(existing){errEl.textContent='Username is already taken.';errEl.classList.remove('hidden');return;}
        findByEmail(email).then(function(existing2){
          if(existing2){errEl.textContent='Email is already registered.';errEl.classList.remove('hidden');return;}
          createUser({username:username,displayName:displayName,email:email,password:password}).then(function(u){
            setSession(u.id);
            closeModal();
            toast('Account created! Welcome, '+esc(displayName)+'!','success');
            navigateTo('/dashboard');
          }).catch(function(err){errEl.textContent='Signup failed. Try again.';errEl.classList.remove('hidden');});
        });
      });
      return;
    }

    // Profile edit
    if(frm.id==='frm-profile'){
      e.preventDefault();
      var ses=getSession();if(!ses)return;
      var displayName=frm.querySelector('[name=displayName]').value.trim();
      var username=frm.querySelector('[name=username]').value.trim().toLowerCase();
      var bio=frm.querySelector('[name=bio]').value.trim();
      var avatar=frm.querySelector('[name=avatar]').value.trim();
      if(!/^[a-z0-9_]{3,20}$/.test(username)){toast('Invalid username format.','error');return;}
      findById(ses.userId).then(function(u){
        if(!u)return;
        if(username!==u.username){
          findByUsername(username).then(function(existing){
            if(existing&&existing.id!==u.id){toast('Username already taken.','error');return;}
            updateUser(u.id,{displayName:displayName,username:username,bio:bio,avatar:avatar}).then(function(){toast('Profile saved!','success');router();});
          });
        } else {
          updateUser(u.id,{displayName:displayName,username:username,bio:bio,avatar:avatar}).then(function(){toast('Profile saved!','success');router();});
        }
      });
      return;
    }

    // Change password
    if(frm.id==='frm-pw'){
      e.preventDefault();
      var ses=getSession();if(!ses)return;
      var curPw=frm.querySelector('[name=curPw]').value;
      var newPw=frm.querySelector('[name=newPw]').value;
      if(newPw.length<6){toast('New password must be at least 6 characters.','error');return;}
      findById(ses.userId).then(function(u){
        if(!u)return;
        if(u.password!==hashPw(curPw)){toast('Current password is incorrect.','error');return;}
        updateUser(u.id,{password:hashPw(newPw)}).then(function(){toast('Password updated!','success');frm.reset();});
      });
      return;
    }
  });

  // Click delegation for all buttons
  document.addEventListener('click',function(e){
    var el;

    // Logout
    el=e.target.closest('.do-logout');
    if(el){e.preventDefault();clearSession();toast('Logged out.','info');navigateTo('/');return;}

    // Add link
    el=e.target.closest('.do-add-link');
    if(el){
      var ses=getSession();if(!ses)return;
      showModal('<h3 class="font-display font-bold text-xl mb-1">Add Link</h3><p class="text-void-100 text-sm mb-6">Add a new link to your profile</p><form id="frm-add-link"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Title</label><input class="vl-input mb-4" name="title" placeholder="My Website" required><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">URL</label><input class="vl-input mb-4" name="url" type="url" placeholder="https://example.com" required><div id="link-add-err" class="text-red-400 text-xs mb-4 hidden"></div><button type="submit" class="vl-btn vl-btn-primary w-full justify-center">Add Link</button></form>');
      setTimeout(function(){
        var f=document.getElementById('frm-add-link');
        if(f)f.addEventListener('submit',function(ev){
          ev.preventDefault();
          var title=f.querySelector('[name=title]').value.trim();
          var url=f.querySelector('[name=url]').value.trim();
          if(!title||!url)return;
          var errEl=f.querySelector('#link-add-err');
          findById(ses.userId).then(function(u){
            if(!u)return;
            var links=u.links||[];
            if(!hasPerm(u,'bypass_link_limit')&&links.length>=10){errEl.textContent='Maximum 10 links allowed.';errEl.classList.remove('hidden');return;}
            links.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:title,url:url});
            updateUser(u.id,{links:links}).then(function(){closeModal();toast('Link added!','success');router();});
          });
        });
      },50);
      return;
    }

    // Edit link
    el=e.target.closest('.do-edit-link');
    if(el){
      var lid=el.getAttribute('data-lid');
      var ses=getSession();if(!ses)return;
      findById(ses.userId).then(function(u){
        if(!u)return;
        var lk=null;for(var i=0;i<(u.links||[]).length;i++){if(u.links[i].id===lid){lk=u.links[i];break;}}
        if(!lk)return;
        showModal('<h3 class="font-display font-bold text-xl mb-1">Edit Link</h3><p class="text-void-100 text-sm mb-6">Modify this link</p><form id="frm-edit-link"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Title</label><input class="vl-input mb-4" name="title" value="'+esc(lk.title)+'" required><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">URL</label><input class="vl-input mb-4" name="url" type="url" value="'+esc(lk.url)+'" required><input type="hidden" name="lid" value="'+lid+'"><button type="submit" class="vl-btn vl-btn-primary w-full justify-center">Save Changes</button></form>');
        setTimeout(function(){
          var f=document.getElementById('frm-edit-link');
          if(f)f.addEventListener('submit',function(ev){
            ev.preventDefault();
            var title=f.querySelector('[name=title]').value.trim();
            var url=f.querySelector('[name=url]').value.trim();
            var editLid=f.querySelector('[name=lid]').value;
            if(!title||!url)return;
            findById(ses.userId).then(function(u2){
              if(!u2)return;
              var links=u2.links||[];
              for(var i=0;i<links.length;i++){if(links[i].id===editLid){links[i].title=title;links[i].url=url;break;}}
              updateUser(u2.id,{links:links}).then(function(){closeModal();toast('Link updated!','success');router();});
            });
          });
        },50);
      });
      return;
    }

    // Delete link
    el=e.target.closest('.do-del-link');
    if(el){
      var lid=el.getAttribute('data-lid');
      var ses=getSession();if(!ses)return;
      findById(ses.userId).then(function(u){
        if(!u)return;
        var links=(u.links||[]).filter(function(l){return l.id!==lid;});
        updateUser(u.id,{links:links}).then(function(){toast('Link removed.','info');router();});
      });
      return;
    }

    // Set background
    el=e.target.closest('.do-set-bg');
    if(el){
      var bg=el.getAttribute('data-bg');
      var ses=getSession();if(!ses)return;
      updateUser(ses.userId,{background:bg}).then(function(){toast('Background updated!','success');router();});
      return;
    }

    // Save appearance
    el=e.target.closest('.do-save-app');
    if(el){
      var ses=getSession();if(!ses)return;
      var bgImg=document.getElementById('inp-bgimg');
      var accent=document.getElementById('inp-accent');
      var data={};
      if(bgImg)data.bgImage=bgImg.value.trim();
      if(accent)data.accentColor=accent.value;
      updateUser(ses.userId,data).then(function(){toast('Appearance saved!','success');router();});
      return;
    }

    // Delete account
    el=e.target.closest('.do-del-acct');
    if(el){
      var ses=getSession();if(!ses)return;
      showModal('<h3 class="font-display font-bold text-xl mb-1 text-red-400">Delete Account</h3><p class="text-void-100 text-sm mb-6">This action is permanent and cannot be undone.</p><div class="flex gap-3"><button class="do-confirm-del vl-btn vl-btn-danger flex-1 justify-center" data-uid="'+ses.userId+'"><i class="fa-solid fa-trash"></i> Delete Forever</button><button class="vl-btn vl-btn-secondary flex-1 justify-center" onclick="closeModal()">Cancel</button></div>');
      return;
    }

    // Confirm delete account
    el=e.target.closest('.do-confirm-del');
    if(el){
      var uid=el.getAttribute('data-uid');
      deleteUser(uid).then(function(){clearSession();closeModal();toast('Account deleted.','info');navigateTo('/');});
      return;
    }

    // Admin: ban/unban
    el=e.target.closest('.do-ban');
    if(el){
      var uid=el.getAttribute('data-uid');
      var ses=getSession();if(!ses)return;
      findById(ses.userId).then(function(admin){
        if(!admin||!hasPerm(admin,'ban_users'))return;
        findById(uid).then(function(target){
          if(!target)return;
          if(hasPerm(target,'bypass_ban')){toast('Cannot ban this user.','error');return;}
          var newBanned=!target.banned;
          updateUser(uid,{banned:newBanned,banReason:newBanned?'Banned by admin':''}).then(function(){toast(newBanned?'User banned.':'User unbanned.',newBanned?'error':'success');router();});
        });
      });
      return;
    }

    // Admin: change UID
    el=e.target.closest('.do-uid');
    if(el){
      var uid=el.getAttribute('data-uid');
      findById(uid).then(function(target){
        if(!target)return;
        showModal('<h3 class="font-display font-bold text-xl mb-1">Change UID</h3><p class="text-void-100 text-sm mb-4">Current UID: <code class="text-accent">'+target.uid+'</code></p><form id="frm-uid"><input class="vl-input mb-4" name="newUid" placeholder="#123" required><div id="uid-err" class="text-red-400 text-xs mb-4 hidden"></div><button type="submit" class="vl-btn vl-btn-primary w-full justify-center">Update UID</button></form>');
        setTimeout(function(){
          var f=document.getElementById('frm-uid');
          if(f)f.addEventListener('submit',function(ev){
            ev.preventDefault();
            var newUid=f.querySelector('[name=newUid]').value.trim();
            var errEl=f.querySelector('#uid-err');
            if(!/^#\d+$/.test(newUid)){errEl.textContent='UID must be in format #123';errEl.classList.remove('hidden');return;}
            findByUID(newUid).then(function(existing){
              if(existing){errEl.textContent='UID already in use.';errEl.classList.remove('hidden');return;}
              updateUser(uid,{uid:newUid}).then(function(){closeModal();toast('UID updated!','success');router();});
            });
          });
        },50);
      });
      return;
    }

    // Admin: manage badges
    el=e.target.closest('.do-badges');
    if(el){
      var uid=el.getAttribute('data-uid');
      findById(uid).then(function(target){
        if(!target)return;
        var html='<h3 class="font-display font-bold text-xl mb-1">Manage Badges</h3><p class="text-void-100 text-sm mb-6">@'+esc(target.username)+'</p><div class="space-y-2" id="badge-list">';
        for(var k in BADGES){
          var b=BADGES[k];
          var has=(target.badges||[]).indexOf(k)>-1;
          html+='<label class="flex items-center justify-between p-3 rounded-lg bg-white/5 cursor-pointer hover:bg-white/8 transition-colors"><div class="flex items-center gap-3"><i class="'+b.i+'" style="color:'+b.c+'"></i><span class="text-sm font-medium">'+b.l+'</span></div><div class="perm-toggle '+(has?'on':'')+'" data-badge="'+k+'"></div></label>';
        }
        html+='</div><button class="do-save-badges vl-btn vl-btn-primary w-full justify-center mt-6" data-uid="'+uid+'">Save Badges</button>';
        showModal(html);
      });
      return;
    }

    // Save badges (toggle)
    el=e.target.closest('.do-save-badges');
    if(el){
      var uid=el.getAttribute('data-uid');
      var toggles=document.querySelectorAll('#badge-list .perm-toggle');
      var badges=[];
      toggles.forEach(function(t){if(t.classList.contains('on'))badges.push(t.getAttribute('data-badge'));});
      updateUser(uid,{badges:badges}).then(function(){closeModal();toast('Badges updated!','success');router();});
      return;
    }

    // Toggle badge in modal
    el=e.target.closest('#badge-list .perm-toggle');
    if(el){el.classList.toggle('on');return;}

    // Admin: manage roles
    el=e.target.closest('.do-roles');
    if(el){
      var uid=el.getAttribute('data-uid');
      findById(uid).then(function(target){
        if(!target)return;
        var perms=target.permissions?JSON.parse(JSON.stringify(target.permissions)):JSON.parse(JSON.stringify(ROLE_PERMS[target.role]||ROLE_PERMS.user));
        var html='<h3 class="font-display font-bold text-xl mb-1">Edit Role & Permissions</h3><p class="text-void-100 text-sm mb-4">@'+esc(target.username)+' ('+target.role+')</p>';
        html+='<label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Role</label><select class="vl-input mb-6" id="role-sel"><option value="user"'+(target.role==='user'?' selected':'')+'>User</option><option value="moderator"'+(target.role==='moderator'?' selected':'')+'>Moderator</option><option value="admin"'+(target.role==='admin'?' selected':'')+'>Admin</option></select>';
        html+='<label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Permissions</label><div class="space-y-1" id="perm-list">';
        for(var k in PERM_LABELS){
          var on=!!perms[k];
          html+='<div class="perm-row"><div><div class="text-sm font-medium flex items-center gap-2"><i class="fa-solid '+PERM_ICONS[k]+' text-void-200 text-xs"></i>'+PERM_LABELS[k]+'</div><div class="text-xs text-void-200 mt-0.5">'+PERM_DESC[k]+'</div></div><div class="perm-toggle '+(on?'on':'')+'" data-perm="'+k+'"></div></div>';
        }
        html+='</div><button class="do-save-roles vl-btn vl-btn-primary w-full justify-center mt-6" data-uid="'+uid+'">Save Role & Permissions</button>';
        showModal(html);
      });
      return;
    }

    // Save roles
    el=e.target.closest('.do-save-roles');
    if(el){
      var uid=el.getAttribute('data-uid');
      var roleSel=document.getElementById('role-sel');
      var toggles=document.querySelectorAll('#perm-list .perm-toggle');
      var role=roleSel?roleSel.value:'user';
      var perms=JSON.parse(JSON.stringify(ROLE_PERMS[role]||ROLE_PERMS.user));
      toggles.forEach(function(t){var p=t.getAttribute('data-perm');if(p)perms[p]=t.classList.contains('on');});
      updateUser(uid,{role:role,permissions:perms}).then(function(){closeModal();toast('Role updated!','success');router();});
      return;
    }

    // Toggle perm in modal
    el=e.target.closest('#perm-list .perm-toggle');
    if(el){el.classList.toggle('on');return;}

    // Admin: delete user
    el=e.target.closest('.do-adm-del');
    if(el){
      var uid=el.getAttribute('data-uid');
      showModal('<h3 class="font-display font-bold text-xl mb-1 text-red-400">Delete User</h3><p class="text-void-100 text-sm mb-6">Permanently delete this user and all their data?</p><div class="flex gap-3"><button class="do-confirm-adm-del vl-btn vl-btn-danger flex-1 justify-center" data-uid="'+uid+'"><i class="fa-solid fa-trash"></i> Delete</button><button class="vl-btn vl-btn-secondary flex-1 justify-center" onclick="closeModal()">Cancel</button></div>');
      return;
    }

    // Confirm admin delete
    el=e.target.closest('.do-confirm-adm-del');
    if(el){
      var uid=el.getAttribute('data-uid');
      deleteUser(uid).then(function(){closeModal();toast('User deleted.','info');router();});
      return;
    }

    // Admin search
    el=e.target.closest('#admin-search');
    // handled via input event below
  });

  // Admin search input
  var searchInput=document.getElementById('admin-search');
  if(searchInput){
    searchInput.addEventListener('input',function(){
      var q=this.value.toLowerCase();
      var rows=document.querySelectorAll('#adm-tbl tbody tr, #roles-tbl tbody tr');
      rows.forEach(function(row){
        var search=row.getAttribute('data-search')||'';
        row.style.display=search.indexOf(q)>-1?'':'none';
      });
    });
  }
}

// ==================== INIT ====================
initFirebase().then(function(){
  P.init();
  window.addEventListener('popstate',router);
  router();
}).catch(function(err){
  console.error('Firebase init error:',err);
  document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center"><h2 style="color:#ff5555;font-family:Space Grotesk,sans-serif;font-size:22px;margin-bottom:12px">Connection Error</h2><p style="color:#888;font-size:13px;max-width:500px">Unable to connect to the server. Please check your internet connection and try again.</p></div>';
});
</script>
</body>
</html>
