let mpAudio=null,mpLooping=false,mpLyricsOpen=false,mpLyricData=[],mpUpdateInterval=null,mpHasTimestamps=false;

function stopProfileAudio(){if(mpAudio){mpAudio.pause();mpAudio.currentTime=0;mpAudio=null}stopMpUpdate();mpLyricData=[];mpLyricsOpen=false;mpLooping=false;mpHasTimestamps=false}

function parseLyrics(raw,duration){if(!raw||!raw.trim())return[];const lines=raw.trim().split('\n').filter(l=>l.trim());const result=[];const tsRe=/^\[(\d+):(\d+)\]\s*(.*)/;
for(const line of lines){const m=line.match(tsRe);if(m){result.push({time:parseInt(m[1])*60+parseInt(m[2]),text:m[3]||''})}}
if(result.length>0){mpHasTimestamps=true;return result}
mpHasTimestamps=false;if(duration>0){const iv=duration/Math.max(1,lines.length);lines.forEach((l,i)=>{result.push({time:i*iv,text:l.trim()})})}return result}

function fmtTime(s){if(isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}

function startMpUpdate(){if(mpUpdateInterval)return;mpUpdateInterval=setInterval(updateMp,200)}
function stopMpUpdate(){if(mpUpdateInterval){clearInterval(mpUpdateInterval);mpUpdateInterval=null}}

function updateMp(){const a=document.getElementById('mpAudio');if(!a){stopMpUpdate();return}
const cur=a.currentTime,dur=a.duration||0;
const cE=document.getElementById('mpCur'),dE=document.getElementById('mpDur'),fE=document.getElementById('mpFill');
if(cE)cE.textContent=fmtTime(cur);if(dE)dE.textContent=fmtTime(dur);if(fE)fE.style.width=dur?(cur/dur*100)+'%':'0%';
if(mpLyricsOpen&&mpLyricData.length){let ai=0;for(let i=mpLyricData.length-1;i>=0;i--){if(cur>=mpLyricData[i].time){ai=i;break}}
document.querySelectorAll('#mpLyrScroll .mp-lr').forEach((el,i)=>{el.classList.remove('active','past');if(i===ai)el.classList.add('active');else if(i<ai)el.classList.add('past')});
const aEl=document.querySelector('#mpLyrScroll .mp-lr.active');const sc=document.getElementById('mpLyrScroll');
if(aEl&&sc){const off=aEl.offsetTop-sc.offsetTop-sc.clientHeight/2+aEl.clientHeight/2;sc.scrollTo({top:Math.max(0,off),behavior:'smooth'})}}
if(a.paused)stopMpUpdate()}

function togglePlay(){const a=document.getElementById('mpAudio');if(!a)return;mpAudio=a;
if(a.paused){a.play().catch(()=>toast('Could not play audio','er'));const b=document.getElementById('mpPlayBtn');if(b)b.innerHTML='<i class="fa-solid fa-pause"></i>';startMpUpdate()}else{a.pause();const b=document.getElementById('mpPlayBtn');if(b)b.innerHTML='<i class="fa-solid fa-play"></i>';stopMpUpdate()}}

function toggleLoop(){mpLooping=!mpLooping;const a=document.getElementById('mpAudio');if(a)a.loop=mpLooping;const b=document.getElementById('mpLoopBtn');if(b)b.classList.toggle('active',mpLooping)}

function toggleLyrics(){mpLyricsOpen=!mpLyricsOpen;const p=document.getElementById('mpLyrPanel');const b=document.getElementById('mpLyrBtn');if(p)p.classList.toggle('open',mpLyricsOpen);if(b)b.classList.toggle('active',mpLyricsOpen)}

function seekMp(e){const a=document.getElementById('mpAudio');if(!a||!a.duration)return;const r=e.currentTarget.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));a.currentTime=pct*a.duration}

function buildPlayer(m,tc){const lyr=parseLyrics(m.lyrics||'',0);mpLyricData=lyr;mpLooping=false;mpLyricsOpen=false;
const hasLyr=lyr.length>0;
return`<div class="mplayer"><div class="mp-bg" style="background-image:url('${E(m.coverUrl||'')}')"></div><div class="mp-inner"><div class="mp-bar"><div class="mp-cover">${m.coverUrl?`<img src="${E(m.coverUrl)}">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${tc||'var(--accent)'},${tc||'var(--accent)'}88);display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-music" style="color:var(--bg);font-size:18px"></i></div>`}</div><div class="mp-info"><div class="mp-title">${E(m.title||'Untitled')}</div><div class="mp-artist">${E(m.artist||'Unknown Artist')}</div></div><div class="mp-ctrls"><button class="mp-cbtn" id="mpLoopBtn" onclick="toggleLoop()" title="Loop"><i class="fa-solid fa-repeat"></i></button><button class="mp-play" id="mpPlayBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button></div><div class="mp-prog-wrap"><span class="mp-time" id="mpCur">0:00</span><div class="mp-prog" id="mpProg" onclick="seekMp(event)"><div class="mp-prog-fill" id="mpFill"></div></div><span class="mp-time" id="mpDur">0:00</span></div>${hasLyr?`<button class="mp-lyr-btn" id="mpLyrBtn" onclick="toggleLyrics()" title="Lyrics"><i class="fa-solid fa-align-left"></i></button>`:''}</div>${hasLyr?`<div class="mp-lyrics" id="mpLyrPanel"><div class="mp-lyr-head"><i class="fa-solid fa-music" style="margin-right:6px"></i>Lyrics</div><div class="mp-lyr-scroll" id="mpLyrScroll">${lyr.map((l,i)=>`<p class="mp-lr" data-idx="${i}">${E(l.text)}</p>`).join('')}</div></div>`:''}</div></div><audio id="mpAudio" src="${E(m.audioUrl)}" preload="metadata"></audio>`}

function initPlayerAudio(m){const a=document.getElementById('mpAudio');if(!a)return;

function dBg(u){const owned=u.badges||[];const active=u.activeBadges||[];if(!owned.length)return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Badges</h2><div class="card"><p style="color:var(--muted);font-size:13px">No badges earned yet.</p></div>`;

async function tBadge(k){if(!CU)return;const owned=CU.badges||[];let active=[...(CU.activeBadges||[])];if(active.includes(k))active=active.filter(x=>x!==k);else active.push(k);if(!active.length)active=[];await D.uU(CU.uid,{activeBadges:active});CU=await D.gU(CU.uid);rDT();toast(active.includes(k)?'Badge enabled':'Badge disabled','in')}

function dSt(u){return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Settings</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Profile Information</h3><div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="sN" class="ifield" type="text" placeholder="Your display name" value="${E(u.displayName||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Bio</label><textarea id="sB" class="ifield" placeholder="Tell us about yourself..." style="min-height:80px;resize:vertical">${E(u.bio||'')}</textarea></div><button class="bp" onclick="sPr()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button></div></div><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Username</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current</label><input class="ifield" type="text" value="@${E(u.username)}" disabled></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Username</label><div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px">seashell.lol/</span><input id="nUn" class="ifield" type="text" placeholder="newusername" style="padding-left:112px"></div></div><button class="bp" onclick="chUsername()"><i class="fa-solid fa-pen"></i> Change Username</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Change Password</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Current Password</label><input id="cPw" class="ifield" type="password" placeholder="Enter current password"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">New Password</label><input id="nPw" class="ifield" type="password" placeholder="Min 6 characters"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Confirm New Password</label><input id="nPw2" class="ifield" type="password" placeholder="Confirm new password"></div><button class="bp" onclick="chPassword()"><i class="fa-solid fa-lock"></i> Change Password</button></div></div>`}

async function chUsername(){const nu=document.getElementById('nUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return}if(nu===CU.username){toast('Same as current','er');return}const ex=await D.gUN(nu);if(ex){toast('Username taken','er');return}const ue=await D.gUE(nu);if(ue&&ue.uid!==CU.uid){toast('Username taken','er');return}const ue2=await D.gUE(CU.username);await D.chUn(CU.username,nu,CU.uid,ue2?ue2.email:null);await D.uU(CU.uid,{username:nu});CU=await D.gU(CU.uid);toast('Username changed to @'+nu,'ok');rDT();document.querySelector('.duinfo').innerHTML=`<span>@${E(CU.username)}</span><br>UID ${CU.uidNumber||'--'}`}

<div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Background</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Paste a direct image URL for your profile background.</p>${u.backgroundUrl?`<div style="width:100%;height:120px;border-radius:10px;overflow:hidden;margin-bottom:14px;background:var(--bg);border:1px solid var(--border)"><img src="${u.backgroundUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`:''}<input id="cBg" class="ifield" type="url" placeholder="https://example.com/background.jpg" value="${E(u.backgroundUrl||'')}"></div>
<div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Theme Color</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">${['#f472b6','#fb7185','#f43f5e','#f97316','#fbbf24','#22c55e','#14b8a6','#06b6d4','#3b82f6','#a855f7'].map(c=>`<button onclick="pTC('${c}')" style="width:38px;height:38px;border-radius:10px;background:${c};border:2px solid ${u.themeColor===c?'#fff':'transparent'};cursor:pointer" title="${c}"></button>`).join('')}</div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:7px">Custom Color</label><div style="display:flex;gap:10px;align-items:center"><input type="color" id="ccI" value="${u.themeColor||'#f472b6'}" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none"><span id="ccV" style="font-size:13px;color:var(--fg2)">${u.themeColor||'#f472b6'}</span></div></div></div>
<div class="card" style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:6px"><h3 class="font-display" style="font-size:15px;font-weight:600">Music Player</h3><i class="fa-solid fa-music" style="color:var(--accent);font-size:13px"></i></div><p style="color:var(--fg2);font-size:13px;margin-bottom:4px">Your soundtrack, built in.</p><div style="display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap"><span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px"><i class="fa-solid fa-check" style="color:var(--accent);font-size:9px"></i>Synced lyrics</span><span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px"><i class="fa-solid fa-check" style="color:var(--accent);font-size:9px"></i>Cover-art backdrop</span><span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px"><i class="fa-solid fa-check" style="color:var(--accent);font-size:9px"></i>Shuffle & loop</span></div><div style="display:flex;flex-direction:column;gap:14px"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:13px;font-weight:500">Enable Music Player</span><button class="btoggle ${m.enabled?'on':''}" id="mEn" onclick="this.classList.toggle('on')"></button></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Song Title</label><input id="mT" class="ifield" type="text" placeholder="Song title" value="${E(m.title||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Artist</label><input id="mA" class="ifield" type="text" placeholder="Artist name" value="${E(m.artist||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Audio URL</label><input id="mAU" class="ifield" type="url" placeholder="https://example.com/song.mp3" value="${E(m.audioUrl||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Cover Art URL</label><input id="mCU" class="ifield" type="url" placeholder="https://example.com/cover.jpg" value="${E(m.coverUrl||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Lyrics <span style="font-weight:400;color:var(--muted)">(use [mm:ss] timestamps per line)</span></label><textarea id="mLy" class="ifield" placeholder="[0:00] First line&#10;[0:15] Second line&#10;[0:30] Third line" style="min-height:120px;resize:vertical">${E(m.lyrics||'')}</textarea></div></div></div>
<button class="bp" onclick="saveAllCustom()" style="width:100%;justify-content:center;padding:12px"><i class="fa-solid fa-floppy-disk"></i> Save All Customisation</button>`}

function pTC(c){document.getElementById('ccI').value=c;document.getElementById('ccV').textContent=c;document.querySelectorAll('.card button[onclick^="pTC"]').forEach(b=>{b.style.borderColor=b.onclick.toString().includes(c)?'#fff':'transparent'})}

async function saveAllCustom(){const a=document.getElementById('cAv').value.trim(),b=document.getElementById('cBg').value.trim(),c=document.getElementById('ccI').value;
const music={enabled:document.getElementById('mEn').classList.contains('on'),title:document.getElementById('mT').value.trim(),artist:document.getElementById('mA').value.trim(),audioUrl:document.getElementById('mAU').value.trim(),coverUrl:document.getElementById('mCU').value.trim(),lyrics:document.getElementById('mLy').value};
await D.uU(CU.uid,{avatar:a,backgroundUrl:b,themeColor:c,music});CU=await D.gU(CU.uid);toast('All customisation saved!','ok');rDT()}

function dLn(u){const lHt=u.links.map((l,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.title)}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(l.url)}</div></div><button onclick="eLink(${i})" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:none;color:var(--muted);cursor:pointer;flex-shrink:0" title="Delete"><i class="fa-solid fa-trash" style="font-size:11px"></i></button></div>`).join('');
return`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Links</h2><div class="card" style="margin-bottom:18px"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:18px">Add New Link</h3><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Title</label><input id="lT" class="ifield" type="text" placeholder="My Website"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">URL</label><input id="lU" class="ifield" type="url" placeholder="https://example.com"></div><button class="bp" onclick="aLink()"><i class="fa-solid fa-plus"></i> Add Link</button></div></div><div class="card"><h3 class="font-display" style="font-size:15px;font-weight:600;margin-bottom:14px">Your Links (${u.links.length})</h3>${lHt||`<p style="color:var(--muted);font-size:13px">No links added yet.</p>`}</div>`}

async function aLink(){const t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();if(!t||!u){toast('Fill in all fields','er');return}const links=[...(CU.links||[]),{title:t,url:u}];await D.uU(CU.uid,{links});CU=await D.gU(CU.uid);toast('Link added!','ok');rDT()}
async function eLink(i){const links=[...(CU.links||[])];links.splice(i,1);await D.uU(CU.uid,{links});CU=await D.gU(CU.uid);toast('Link removed','in');rDT()}

function pAdmin(){return`<div class="dash-wrap"><div class="aside"><div class="anav on" onclick="sAT('users')" id="an-users"><i class="fa-solid fa-users"></i>Users</div></div><div class="abody" id="aC"></div></div>`}
async function rAC(){document.getElementById('aC').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>';const users=await D.aU();users.sort((a,b)=>(b.views||0)-(a.views||0));const tH=`<table class="utbl"><thead><tr><th>User</th><th>Username</th><th>UID</th><th>Role</th><th>Views</th><th>Links</th><th>Actions</th></tr></thead><tbody>${users.map(u=>`<tr><td style="font-weight:500">${E(u.displayName||'-')}</td><td style="color:var(--accent)">@${E(u.username)}</td><td style="color:var(--muted)">${u.uidNumber||'--'}</td><td>${rT(u.role)}</td><td>${u.views||0}</td><td>${(u.links||[]).length}</td><td><div style="display:flex;gap:6px"><button class="bs bsm" onclick="eUser('${u.uid}')">Edit</button>${u.banned?`<button class="bs bsm" onclick="uBan('${u.uid}',false)" style="color:var(--success);border-color:rgba(34,197,94,0.3)">Unban</button>`:`<button class="bd bsm" onclick="uBan('${u.uid}',true)">Ban</button>`}</div></td></tr>`).join('')}</tbody></table>`;
document.getElementById('aC').innerHTML=`<h2 class="font-display" style="font-size:22px;font-weight:700;margin-bottom:24px">Admin Panel</h2><div class="card">${tH}</div>`}

function eUser(uid){showModal('Edit User',`<div id="eUF">Loading...</div>`,[{l:'Save',c:'bp',a:'sEU(\''+uid+'\')'},{l:'Cancel',c:'bs',a:'clM()'}]);loadEU(uid)}
async function loadEU(uid){const u=await D.gU(uid);if(!u){document.getElementById('eUF').innerHTML='<p style="color:var(--danger)">User not found</p>';return}
const rO=Object.keys(RL).filter(r=>canEdit(r,CU.role));const bO=u.badges||[];
document.getElementById('eUF').innerHTML=`<div style="display:flex;flex-direction:column;gap:16px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Display Name</label><input id="eN" class="ifield" type="text" value="${E(u.displayName||'')}"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Role</label><select id="eR" class="ifield">${rO.map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}</select></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Badges</label><div style="display:flex;flex-wrap:wrap;gap:6px">${Object.keys(BG).map(k=>`<label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="${k}" ${bO.includes(k)?'checked':''} style="accent-color:var(--accent)"> ${BG[k].n}</label>`).join('')}</div></div>${canEditUID(CU.role)?`<div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">UID Number</label><input id="eUID" class="ifield" type="number" value="${u.uidNumber||''}"></div>`:''}</div>`}

async function sEU(uid){const n=document.getElementById('eN').value.trim();const r=document.getElementById('eR').value;const bgs=Array.from(document.querySelectorAll('#eUF input[type=checkbox]:checked')).map(c=>c.value);const up={displayName:n,role:r,badges:bgs};if(canEditUID(CU.role)){const uidNum=parseInt(document.getElementById('eUID')?.value);if(!isNaN(uidNum))up.uidNumber=uidNum}await D.uU(uid,up);toast('User updated!','ok');clM();await rAC()}

async function uBan(uid,b){await D.uU(uid,{banned:b});toast(b?'User banned':'User unbanned','in');await rAC()}

window.addEventListener('popstate',router);
restoreSess().then(()=>router());
</script>
</body>
</html>
