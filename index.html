function detectMusicPlatform(url){if(!url)return null;var u=url.toLowerCase();if(u.indexOf('youtube.com')>-1||u.indexOf('youtu.be')>-1)return 'youtube';if(u.indexOf('soundcloud.com')>-1)return 'soundcloud';if(u.indexOf('spotify.com')>-1)return 'spotify';if(u.indexOf('music.apple.com')>-1||u.indexOf('itunes.apple.com')>-1)return 'apple';if(u.indexOf('tidal.com')>-1)return 'tidal';if(u.indexOf('deezer.com')>-1)return 'deezer';if(u.indexOf('bandcamp.com')>-1)return 'bandcamp';return null;}

function buildMusicEmbed(url){
  if(!url)return '';
  var u=url.toLowerCase();
  if(u.indexOf('youtube.com/watch')>-1){var m=url.match(/[?&]v=([^&]+)/);if(m)return '<iframe src="https://www.youtube.com/embed/'+m[1]+'?autoplay=1&loop=1&playlist='+m[1]+'&rel=0&modestbranding=1&disablekb=0&fs=0&playsinline=1" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;encrypted-media" allowfullscreen></iframe>';}
  if(u.indexOf('youtu.be/')>-1){var id=url.split('youtu.be/')[1].split('?')[0].split('#')[0];if(id)return '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&loop=1&playlist='+id+'&rel=0&modestbranding=1&disablekb=0&fs=0&playsinline=1" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;encrypted-media" allowfullscreen></iframe>';}
  if(u.indexOf('youtube.com/shorts/')>-1){var id=url.split('youtube.com/shorts/')[1].split('?')[0].split('#')[0];if(id)return '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&loop=1&playlist='+id+'&rel=0&modestbranding=1&disablekb=0&fs=0&playsinline=1" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;encrypted-media" allowfullscreen></iframe>';}
  if(u.indexOf('soundcloud.com')>-1){return '<iframe src="https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&color=%237dd3fc&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true&single_active=true" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay"></iframe>';}
  if(u.indexOf('open.spotify.com/')>-1){var parts=url.replace('https://open.spotify.com/','').replace('http://open.spotify.com/','').split('/');if(parts.length>=2){var type=parts[0];var id=parts[1].split('?')[0];if(['track','album','playlist','episode','show'].indexOf(type)>-1&&id){var spH=type==='track'?152:352;return '<iframe src="https://open.spotify.com/embed/'+type+'/'+id+'?utm_source=generator&theme=0" style="width:100%;height:'+spH+'px;border:none;border-radius:12px;" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>';}}}
  if(u.indexOf('music.apple.com/')>-1){var embedUrl=url.replace('https://music.apple.com/','https://embed.music.apple.com/');return '<iframe src="'+embedUrl+'?theme=dark" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;encrypted-media"></iframe>';}
  if(u.indexOf('tidal.com/')>-1){var m=url.match(/tidal\.com\/(?:browse\/)?(track|album|playlist)\/(\d+)/);if(m)return '<iframe src="https://tidal.com/embed/?id='+m[2]+'&type='+m[1]+'" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;encrypted-media"></iframe>';}
  if(u.indexOf('deezer.com/')>-1){var m=url.match(/deezer\.com\/(?:\w+\/)?(track|album|playlist)\/(\d+)/);if(m)return '<iframe src="https://widget.deezer.com/widget/dark/'+m[1]+'/'+m[2]+'" style="width:100%;height:152px;border:none;border-radius:12px;" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>';}

}

var userCache={};var allUsersCache=null;var cacheValid=false;

function snapToUser(doc){if(!doc.exists)return null;var d=doc.data();return{id:doc.id,uid:d.uid||'',username:d.username||'',displayName:d.displayName||'',email:d.email||'',bio:d.bio||'',avatar:d.avatar||'',bgImage:d.bgImage||'',background:d.background||'void',accentColor:d.accentColor||'#7dd3fc',links:d.links||[],badges:d.badges||[],hiddenBadges:d.hiddenBadges||[],customBadges:d.customBadges||[],banned:d.banned||false,banReason:d.banReason||'',role:d.role||'user',permissions:d.permissions||null,createdAt:d.createdAt||Date.now(),views:d.views||0,password:d.password||'',displayNameEffect:d.displayNameEffect||'none',musicUrl:d.musicUrl||'',profileStyle:d.profileStyle||'modern',cardOpacity:d.cardOpacity!=null?d.cardOpacity:100};}
function getAllUsers(){if(allUsersCache&&cacheValid)return Promise.resolve(allUsersCache);return db.collection("users").get().then(function(s){allUsersCache=[];s.forEach(function(d){var u=snapToUser(d);if(u)allUsersCache.push(u);});cacheValid=true;return allUsersCache;});}

function createUser(data){return getNextUID().then(function(uid){var perms=ROLE_PERMS[data.role||'user']?JSON.parse(JSON.stringify(ROLE_PERMS[data.role||'user'])):JSON.parse(JSON.stringify(ROLE_PERMS.user));var u={uid:uid,username:data.username,displayName:data.displayName||data.username,email:data.email,password:hashPw(data.password),bio:'',avatar:'',bgImage:'',background:'void',accentColor:'#7dd3fc',links:[],badges:[],hiddenBadges:[],customBadges:[],banned:false,banReason:'',role:data.role||'user',permissions:perms,createdAt:Date.now(),views:0,displayNameEffect:'none',musicUrl:'',profileStyle:'modern',cardOpacity:100};return db.collection("users").add(u).then(function(ref){u.id=ref.id;userCache[u.id]=u;invalidateCache();return u;});});}
function updateUser(id,data){var clean={};for(var k in data){if(data[k]!==undefined)clean[k]=data[k];}delete userCache[id];invalidateCache();return db.collection("users").doc(id).update(clean);}
function deleteUser(id){delete userCache[id];invalidateCache();return db.collection("users").doc(id).delete();}

function hasBadge(u,key){if(!u||!u.badges)return false;return u.badges.indexOf(key)>-1;}

function needAdmin(){return needAuth().then(function(u){if(!u)return null;if(!hasPerm(u,'admin_panel')){navigateTo('/');toast('Access denied.','error');return null;}return u;});}

/* Parallax: only active when hovering over the card itself */
var activeParallaxCard=null;
document.addEventListener('mousemove', function(e) {
  if (!activeParallaxCard) return;
  var rect = activeParallaxCard.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  if (x < 0 || y < 0 || x > rect.width || y > rect.height) return;
  var centerX = rect.width / 2;
  var centerY = rect.height / 2;
  var rotateX = (y - centerY) / 25;
  var rotateY = (centerX - x) / 25;
  activeParallaxCard.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale3d(1.02, 1.02, 1.02)';
  activeParallaxCard.classList.add('parallax-active');
});

function initParallaxOnCard(card) {
  card.addEventListener('mouseenter', function() {
    activeParallaxCard = card;
  });
  card.addEventListener('mouseleave', function() {
    if (activeParallaxCard === card) {
      activeParallaxCard = null;
      card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
      card.classList.remove('parallax-active');
    }
  });
}

/* Watch for profile renders to init parallax */
var _origRenderProfile = renderProfile;
renderProfile = function(user) {
  var html = _origRenderProfile(user);
  setTimeout(function() {
    var pCard = document.querySelector('.profile-style-parallax .profile-card');
    if (pCard) initParallaxOnCard(pCard);
  }, 100);
  return html;
};

function router(){var path=window.location.pathname.replace(/\/+$/,'');var parts=path.split('/').filter(function(p){return p;});var app=document.getElementById('app');if(!app)return;if(parts.length===0){curUser().then(function(u){app.innerHTML=renderHome(u);bindHome();});}else if(parts[0]==='dashboard'){needAuth().then(function(u){if(!u)return;var tab=parts[1]||'profile';app.innerHTML=renderDashboard(u,tab);bindDashboard(u,tab);});}else if(parts[0]==='s'){findByUsername('s').then(function(u){if(!u){app.innerHTML='<div class="min-h-screen flex items-center justify-center"><p class="text-void-200">Example profile not found</p></div>';return;}updateUser(u.id,{views:(u.views||0)+1});app.innerHTML=renderProfile(u);});}else{findByUsername(parts[0]).then(function(u){if(!u){app.innerHTML='<div class="min-h-screen flex items-center justify-center px-6 text-center"><div><h1 class="font-display font-bold text-4xl mb-4">404</h1><p class="text-void-100 mb-6">User @'+esc(parts[0])+' not found</p><a href="/" class="vl-btn vl-btn-primary">Go Home</a></div></div>';return;}updateUser(u.id,{views:(u.views||0)+1});app.innerHTML=renderProfile(u);});}}

function bindHome(){var app=document.getElementById('app');if(!app)return;app.querySelectorAll('.open-login').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();showModal(loginHTML());bindLogin();});});app.querySelectorAll('.open-signup').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();showModal(signupHTML());bindSignup();});});}

function bindLogin(){var form=document.getElementById('frm-login');if(!form)return;form.addEventListener('submit',function(e){e.preventDefault();var btn=form.querySelector('button[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';var loginId=form.loginId.value.trim();var pw=form.password.value;var errEl=document.getElementById('login-err');errEl.classList.add('hidden');var promise=loginId.indexOf('@')>-1?findByEmail(loginId):findByUsername(loginId);promise.then(function(u){if(!u){errEl.textContent='Account not found';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Sign In';return;}if(u.banned){errEl.textContent='Account banned: '+(u.banReason||'No reason specified');errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Sign In';return;}if(u.password!==hashPw(pw)){errEl.textContent='Incorrect password';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Sign In';return;}setSession(u.id);closeModal();toast('Welcome back, '+esc(u.displayName||u.username)+'!','success');navigateTo('/dashboard');}).catch(function(err){errEl.textContent='Login failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Sign In';});});form.querySelectorAll('.open-signup').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();showModal(signupHTML());bindSignup();});});}

function bindSignup(){var form=document.getElementById('frm-signup');if(!form)return;form.addEventListener('submit',function(e){e.preventDefault();var btn=form.querySelector('button[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Creating...';var username=form.username.value.trim().toLowerCase();var displayName=form.displayName.value.trim()||username;var email=form.email.value.trim().toLowerCase();var pw=form.password.value;var errEl=document.getElementById('signup-err');errEl.classList.add('hidden');if(!/^[a-z0-9_]{3,20}$/.test(username)){errEl.textContent='Username must be 3-20 characters (letters, numbers, underscores)';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Create Account';return;}findByUsername(username).then(function(existing){if(existing){errEl.textContent='Username already taken';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Create Account';return null;}return findByEmail(email);}).then(function(existing){if(existing){errEl.textContent='Email already registered';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Create Account';return;}return createUser({username:username,displayName:displayName,email:email,password:pw});}).then(function(u){if(!u)return;setSession(u.id);closeModal();toast('Account created! Welcome, '+esc(displayName)+'!','success');navigateTo('/dashboard');}).catch(function(err){errEl.textContent='Signup failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='Create Account';});});form.querySelectorAll('.open-login').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();showModal(loginHTML());bindLogin();});});}

function bindDashProfile(u){var form=document.getElementById('frm-profile');if(!form)return;form.addEventListener('submit',function(e){e.preventDefault();var btn=form.querySelector('button[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving...';var errEl=document.getElementById('profile-err');var okEl=document.getElementById('profile-ok');errEl.classList.add('hidden');okEl.classList.add('hidden');var displayName=form.displayName.value.trim();var username=form.username.value.trim().toLowerCase();var bio=form.bio.value.trim();var avatar=form.avatar.value.trim();var musicUrl=form.musicUrl.value.trim();if(!/^[a-z0-9_]{3,20}$/.test(username)){errEl.textContent='Username must be 3-20 characters (letters, numbers, underscores)';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';return;}var updateData={displayName:displayName,bio:bio,avatar:avatar,musicUrl:musicUrl};if(username!==u.username){findByUsername(username).then(function(existing){if(existing&&existing.id!==u.id){errEl.textContent='Username already taken';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';return;}updateData.username=username;return updateUser(u.id,updateData);}).then(function(){if(!errEl.classList.contains('hidden'))return;okEl.textContent='Profile updated!';okEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';setTimeout(function(){okEl.classList.add('hidden');},3000);}).catch(function(err){errEl.textContent='Save failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';});}else{updateUser(u.id,updateData).then(function(){okEl.textContent='Profile updated!';okEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';setTimeout(function(){okEl.classList.add('hidden');},3000);}).catch(function(err){errEl.textContent='Save failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Save Changes';});}});}

function bindDashLinks(u){var addBtn=document.querySelector('.add-link-btn');var listEl=document.getElementById('links-list');if(!addBtn||!listEl)return;function showLinkModal(idx){var isEdit=typeof idx==='number';var lk=isEdit?u.links[idx]:{title:'',url:''};var html='<h3 class="font-display font-bold text-xl mb-6">'+(isEdit?'Edit':'Add')+' Link</h3><form id="frm-link"><div class="space-y-4"><div><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Title</label><input class="vl-input" name="title" value="'+esc(lk.title)+'" placeholder="My Website" required maxlength="50"></div><div><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">URL</label><input class="vl-input" name="url" value="'+esc(lk.url)+'" placeholder="https://example.com" required></div><div id="link-err" class="text-red-400 text-xs hidden"></div><div class="flex gap-3"><button type="button" class="close-link-modal vl-btn vl-btn-secondary flex-1 justify-center">Cancel</button><button type="submit" class="vl-btn vl-btn-primary flex-1 justify-center" data-submitting="false"><i class="fa-solid fa-check"></i> '+(isEdit?'Update':'Add')+'</button></div></div></form>';showModal(html);var form=document.getElementById('frm-link');form.addEventListener('submit',function(e){e.preventDefault();var btn=form.querySelector('button[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;var errEl=document.getElementById('link-err');errEl.classList.add('hidden');var title=form.title.value.trim();var url=form.url.value.trim();if(!title||!url){errEl.textContent='Title and URL are required';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}var links=u.links||[];if(isEdit){links[idx]={title:title,url:url};}else{if(links.length>=10&&!hasPerm(u,'bypass_link_limit')){errEl.textContent='Maximum 10 links reached';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}links.push({title:title,url:url});}updateUser(u.id,{links:links}).then(function(){closeModal();toast('Link '+(isEdit?'updated':'added')+'!','success');navigateTo('/dashboard/links');}).catch(function(err){errEl.textContent='Save failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;});});form.querySelector('.close-link-modal').addEventListener('click',closeModal);}addBtn.addEventListener('click',function(){showLinkModal();});listEl.querySelectorAll('.edit-link-btn').forEach(function(btn){btn.addEventListener('click',function(){showLinkModal(parseInt(btn.dataset.idx));});});listEl.querySelectorAll('.del-link-btn').forEach(function(btn){btn.addEventListener('click',function(){var idx=parseInt(btn.dataset.idx);var links=u.links||[];links.splice(idx,1);updateUser(u.id,{links:links}).then(function(){toast('Link deleted','info');navigateTo('/dashboard/links');}).catch(function(err){toast('Delete failed: '+err.message,'error');});});});}

function bindDashBadges(u){document.querySelectorAll('.toggle-badge-vis').forEach(function(cb){cb.addEventListener('change',function(){var badge=cb.dataset.badge;var hidden=u.hiddenBadges||[];if(cb.checked){hidden=hidden.filter(function(b){return b!==badge;});}else{if(hidden.indexOf(badge)===-1)hidden.push(badge);}updateUser(u.id,{hiddenBadges:hidden}).then(function(){toast('Badge visibility updated','success');navigateTo('/dashboard/badges');}).catch(function(err){toast('Update failed: '+err.message,'error');});});});var addCustBtn=document.querySelector('.add-custom-badge');if(addCustBtn){addCustBtn.addEventListener('click',function(){var html='<h3 class="font-display font-bold text-xl mb-6">Add Custom Badge</h3><form id="frm-custom-badge"><div class="space-y-4"><div><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Label</label><input class="vl-input" name="label" placeholder="My Badge" required maxlength="20"></div><div><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Color</label><input type="color" name="color" value="#7dd3fc" class="w-12 h-10 rounded border-0 cursor-pointer bg-transparent"></div><div><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Image URL (optional)</label><input class="vl-input" name="img" placeholder="https://example.com/icon.png"></div><div id="cbadge-err" class="text-red-400 text-xs hidden"></div><div class="flex gap-3"><button type="button" class="close-cbadge-modal vl-btn vl-btn-secondary flex-1 justify-center">Cancel</button><button type="submit" class="vl-btn vl-btn-primary flex-1 justify-center" data-submitting="false"><i class="fa-solid fa-check"></i> Add</button></div></div></form>';showModal(html);var form=document.getElementById('frm-custom-badge');form.addEventListener('submit',function(e){e.preventDefault();var btn=form.querySelector('button[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;var errEl=document.getElementById('cbadge-err');errEl.classList.add('hidden');var label=form.label.value.trim();var color=form.color.value;var img=form.img.value.trim();if(!label){errEl.textContent='Label is required';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}var customs=u.customBadges||[];var id='custom_'+Date.now();customs.push({id:id,l:label,c:color,img:img||''});updateUser(u.id,{customBadges:customs}).then(function(){closeModal();toast('Custom badge added!','success');navigateTo('/dashboard/badges');}).catch(function(err){errEl.textContent='Save failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;});});form.querySelector('.close-cbadge-modal').addEventListener('click',closeModal);});}document.querySelectorAll('.del-custom-badge').forEach(function(btn){btn.addEventListener('click',function(){var idx=parseInt(btn.dataset.idx);var customs=u.customBadges||[];customs.splice(idx,1);updateUser(u.id,{customBadges:customs}).then(function(){toast('Custom badge removed','info');navigateTo('/dashboard/badges');}).catch(function(err){toast('Delete failed: '+err.message,'error');});});});}

function bindDashAppearance(u){
  /* Profile style selector */
  document.querySelectorAll('.style-option').forEach(function(opt){
    opt.addEventListener('click',function(){
      var style=opt.dataset.style;
      document.querySelectorAll('.style-option').forEach(function(o){
        o.classList.remove('selected');
        o.querySelector('.style-option-icon').style.background='rgba(255,255,255,.05)';
        o.querySelector('.style-option-icon').style.color='#888';
      });
      opt.classList.add('selected');
      opt.querySelector('.style-option-icon').style.background='rgba(125,211,252,.15)';
      opt.querySelector('.style-option-icon').style.color='#7dd3fc';
      updateUser(u.id,{profileStyle:style}).then(function(){
        toast('Profile style updated!','success');
      }).catch(function(err){toast('Update failed: '+err.message,'error');});
    });
  });

  /* Card opacity slider */
  var opacitySlider=document.getElementById('card-opacity-slider');
  var opacityValue=document.getElementById('opacity-value');
  var opacityPreview=document.getElementById('opacity-preview-box');
  if(opacitySlider){
    var opacityTimeout=null;
    opacitySlider.addEventListener('input',function(){
      var val=parseInt(opacitySlider.value);
      if(opacityValue)opacityValue.textContent=val+'%';
      if(opacityPreview)opacityPreview.style.opacity=(val/100);
      /* Debounce save */
      clearTimeout(opacityTimeout);
      opacityTimeout=setTimeout(function(){
        updateUser(u.id,{cardOpacity:val}).then(function(){
          /* saved silently, no toast spam */
        }).catch(function(err){toast('Opacity save failed: '+err.message,'error');});
      },400);
    });
  }

  /* Background presets */
  document.querySelectorAll('.profile-bg-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      var bg=btn.dataset.bg;
      document.querySelectorAll('.profile-bg-opt').forEach(function(b){b.classList.remove('border-accent','ring-2','ring-accent/30');b.classList.add('border-void-400');});
      btn.classList.remove('border-void-400');
      btn.classList.add('border-accent','ring-2','ring-accent/30');
      updateUser(u.id,{background:bg}).then(function(){toast('Background updated!','success');}).catch(function(err){toast('Update failed: '+err.message,'error');});
    });
  });

  /* Accent color presets */
  document.querySelectorAll('.accent-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      var color=btn.dataset.color;
      document.querySelectorAll('.accent-opt').forEach(function(b){b.classList.remove('ring-2','ring-offset-2','ring-offset-void-800','scale-110');});
      btn.classList.add('ring-2','ring-offset-2','ring-offset-void-800','scale-110');
      updateUser(u.id,{accentColor:color}).then(function(){toast('Accent color updated!','success');}).catch(function(err){toast('Update failed: '+err.message,'error');});
    });
  });

  /* Custom accent color */
  var applyCustomBtn=document.getElementById('apply-custom-accent');
  var customColorInput=document.getElementById('custom-accent-color');
  if(applyCustomBtn&&customColorInput){
    applyCustomBtn.addEventListener('click',function(){
      var color=customColorInput.value;
      document.querySelectorAll('.accent-opt').forEach(function(b){b.classList.remove('ring-2','ring-offset-2','ring-offset-void-800','scale-110');});
      updateUser(u.id,{accentColor:color}).then(function(){toast('Custom accent applied!','success');}).catch(function(err){toast('Update failed: '+err.message,'error');});
    });
  }

  /* Background image */
  var saveBgImg=document.getElementById('save-bg-image');
  var bgImgInput=document.getElementById('bg-image-input');
  var removeBgImg=document.getElementById('remove-bg-image');
  if(saveBgImg&&bgImgInput){
    saveBgImg.addEventListener('click',function(){
      var url=bgImgInput.value.trim();
      updateUser(u.id,{bgImage:url}).then(function(){toast('Background image saved!','success');navigateTo('/dashboard/appearance');}).catch(function(err){toast('Save failed: '+err.message,'error');});
    });
  }
  if(removeBgImg){
    removeBgImg.addEventListener('click',function(){
      updateUser(u.id,{bgImage:''}).then(function(){toast('Background image removed','info');navigateTo('/dashboard/appearance');}).catch(function(err){toast('Remove failed: '+err.message,'error');});
    });
  }

  /* Display name effects */
  document.querySelectorAll('.fx-opt').forEach(function(opt){
    opt.addEventListener('click',function(){
      var fx=opt.dataset.fx;
      document.querySelectorAll('.fx-opt').forEach(function(o){o.classList.remove('sel');o.querySelector('.fx-preview-box').style.color='#888';});
      opt.classList.add('sel');
      opt.querySelector('.fx-preview-box').style.color=u.accentColor||'#7dd3fc';
      updateUser(u.id,{displayNameEffect:fx}).then(function(){toast('Effect updated!','success');}).catch(function(err){toast('Update failed: '+err.message,'error');});
    });
  });
}

function bindDashSettings(u){
  var pwForm=document.getElementById('frm-changepw');
  if(pwForm){
    pwForm.addEventListener('submit',function(e){
      e.preventDefault();
      var btn=pwForm.querySelector('button[type="submit"]');
      if(btn.dataset.submitting==='true')return;
      btn.dataset.submitting='true';btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
      var errEl=document.getElementById('changepw-err');errEl.classList.add('hidden');
      var currentPw=pwForm.currentPw.value;var newPw=pwForm.newPw.value;var confirmPw=pwForm.confirmPw.value;
      if(u.password!==hashPw(currentPw)){errEl.textContent='Current password is incorrect';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-key"></i> Update Password';return;}
      if(newPw!==confirmPw){errEl.textContent='New passwords do not match';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-key"></i> Update Password';return;}
      updateUser(u.id,{password:hashPw(newPw)}).then(function(){toast('Password updated!','success');pwForm.reset();btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-key"></i> Update Password';}).catch(function(err){errEl.textContent='Update failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-key"></i> Update Password';});
    });
  }
  var uidForm=document.getElementById('frm-changeuid');
  if(uidForm){
    uidForm.addEventListener('submit',function(e){
      e.preventDefault();
      var btn=uidForm.querySelector('button[type="submit"]');
      if(btn.dataset.submitting==='true')return;
      btn.dataset.submitting='true';btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Changing...';
      var errEl=document.getElementById('changeuid-err');errEl.classList.add('hidden');
      var newUid=uidForm.newUid.value.trim();
      if(!/^#\d+$/.test(newUid)){errEl.textContent='UID must be in format #123';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-hashtag"></i> Change UID';return;}
      updateUser(u.id,{uid:newUid}).then(function(){toast('UID changed to '+newUid,'success');uidForm.reset();btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-hashtag"></i> Change UID';}).catch(function(err){errEl.textContent='Change failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-hashtag"></i> Change UID';});
    });
  }
  var delBtn=document.getElementById('btn-delete-account');
  if(delBtn){
    delBtn.addEventListener('click',function(){
      var html='<h3 class="font-display font-bold text-xl mb-2">Delete Account</h3><p class="text-void-100 text-sm mb-6">Are you sure? This action cannot be undone. Type <strong class="text-red-400">DELETE</strong> to confirm.</p><form id="frm-delete-acc"><input class="vl-input mb-4" name="confirm" placeholder="Type DELETE to confirm" required><div id="del-err" class="text-red-400 text-xs mb-4 hidden"></div><div class="flex gap-3"><button type="button" class="close-del-modal vl-btn vl-btn-secondary flex-1 justify-center">Cancel</button><button type="submit" class="vl-btn vl-btn-danger flex-1 justify-center" data-submitting="false"><i class="fa-solid fa-trash"></i> Delete Forever</button></div></form>';
      showModal(html);
      var form=document.getElementById('frm-delete-acc');
      form.querySelector('.close-del-modal').addEventListener('click',closeModal);
      form.addEventListener('submit',function(e){
        e.preventDefault();
        var btn=form.querySelector('button[type="submit"]');
        if(btn.dataset.submitting==='true')return;
        btn.dataset.submitting='true';btn.disabled=true;
        var errEl=document.getElementById('del-err');errEl.classList.add('hidden');
        if(form.confirm.value.trim()!=='DELETE'){errEl.textContent='Please type DELETE to confirm';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}
        deleteUser(u.id).then(function(){clearSession();closeModal();toast('Account deleted','info');navigateTo('/');}).catch(function(err){errEl.textContent='Delete failed: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;});
      });
    });
  }
}
