function router(){try{var hash=location.hash||'#home';var app=document.getElementById('app');var m=hash.match(/^#u\/(.+)$/);if(m){app.innerHTML=renderProfile(m[1]);return;}m=hash.match(/^#dashboard\/?(.+)?$/);if(m){app.innerHTML=renderDashboard(m[1]||'profile');return;}if(hash==='#admin'){app.innerHTML=renderAdmin();initAdminSearch();return;}app.innerHTML=renderHome();}catch(e){console.error('Router:',e);document.getElementById('app').innerHTML='<div class="p-10 text-red-400">Render error: '+e.message+'</div>';}}
function initAdminSearch(){setTimeout(function(){var s=document.getElementById('admin-search');if(!s)return;s.addEventListener('input',function(){var q=this.value.toLowerCase();var rows=document.querySelectorAll('#adm-tbl tbody tr');for(var i=0;i<rows.length;i++)rows[i].style.display=(rows[i].dataset.search||'').indexOf(q)>-1?'':'none';});},50);}

document.addEventListener('submit',function(e){
  try{var f=e.target;var id=f.id;
  if(id==='frm-login'){e.preventDefault();var li=f.loginId.value.trim();var pw=f.password.value;var er=document.getElementById('login-err');var u=findByEmail(li)||findByUsername(li);if(!u||u.password!==hashPw(pw)){er.textContent='Invalid credentials.';er.classList.remove('hidden');return;}if(u.banned){er.textContent='Account banned.';er.classList.remove('hidden');return;}setSession(u.id);closeModal();location.hash='#dashboard';toast('Welcome back, '+(u.displayName||u.username),'success');return;}
  if(id==='frm-signup'){e.preventDefault();var un=f.username.value.trim().toLowerCase();var dn=f.displayName.value.trim()||un;var em=f.email.value.trim().toLowerCase();var pw=f.password.value;var er=document.getElementById('signup-err');if(!/^[a-z0-9_]{3,20}$/.test(un)){er.textContent='Username: 3-20 chars, letters/numbers/_ only.';er.classList.remove('hidden');return;}if(findByUsername(un)){er.textContent='Username taken.';er.classList.remove('hidden');return;}if(findByEmail(em)){er.textContent='Email registered.';er.classList.remove('hidden');return;}var u=createUser({username:un,displayName:dn,email:em,password:pw});setSession(u.id);closeModal();location.hash='#dashboard';toast('Welcome to Seashell, '+dn+'. Your UID: '+u.uid,'success');return;}
  if(id==='frm-profile'){e.preventDefault();var u=curUser();if(!u)return;var dn=f.displayName.value.trim();var un=f.username.value.trim().toLowerCase();var bio=f.bio.value.trim();var av=f.avatar.value.trim();if(!/^[a-z0-9_]{3,20}$/.test(un)){toast('Invalid username','error');return;}var ex=findByUsername(un);if(ex&&ex.id!==u.id){toast('Username taken','error');return;}updateUser(u.id,{displayName:dn,username:un,bio:bio,avatar:av});toast('Profile saved','success');return;}
  if(id==='frm-newlink'){e.preventDefault();var u=curUser();if(!u)return;var links=u.links||[];links.push({id:'l_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),title:f.title.value.trim(),url:f.url.value.trim()});updateUser(u.id,{links:links});closeModal();toast('Link added','success');location.hash='#dashboard/links';return;}
  if(id==='frm-editlink'){e.preventDefault();var u=curUser();if(!u)return;var lid=f.dataset.lid;var links=u.links.map(function(l){return l.id===lid?{id:l.id,title:f.title.value.trim(),url:f.url.value.trim()}:l;});updateUser(u.id,{links:links});closeModal();toast('Link updated','success');location.hash='#dashboard/links';return;}
  if(id==='frm-pw'){e.preventDefault();var u=curUser();if(!u)return;if(u.password!==hashPw(f.curPw.value)){toast('Current password incorrect','error');return;}updateUser(u.id,{password:hashPw(f.newPw.value)});toast('Password updated','success');f.reset();return;}
  }catch(e){console.error('Form:',e);}
});
