<script>
// All the previous JavaScript code remains the same until we get to the dashAppearance function

// Display name effects configuration
var DISPLAY_EFFECTS = {
  none: { name: 'None', icon: 'fa-ban', class: '' },
  sparkle: { name: 'Sparkles', icon: 'fa-sparkles', class: 'effect-sparkle' },
  glitch: { name: 'Glitch', icon: 'fa-bug', class: 'effect-glitch' },
  glow: { name: 'Glow', icon: 'fa-sun', class: 'effect-glow' },
  neon: { name: 'Neon', icon: 'fa-lightbulb', class: 'effect-neon' },
  rainbow: { name: 'Rainbow', icon: 'fa-rainbow', class: 'effect-rainbow' },
  matrix: { name: 'Matrix', icon: 'fa-terminal', class: 'effect-matrix' },
  typewriter: { name: 'Typewriter', icon: 'fa-keyboard', class: 'effect-typewriter' },
  fire: { name: 'Fire', icon: 'fa-fire', class: 'effect-fire' }
};

// Modified dashAppearance function to include display name effects
function dashAppearance(u) {
  var currentEffect = u.displayNameEffect || 'none';
  var h = '<h2 class="font-display font-bold text-2xl mb-1">Appearance</h2>';
  h += '<p class="text-void-100 text-sm mb-8">Customize the look of your profile</p>';
  h += '<div class="max-w-lg space-y-8">';
  
  // Display Name Effects Section
  h += '<div>';
  h += '<label class="block text-xs font-semibold text-void-100 mb-3 uppercase tracking-wider">Display Name Effect</label>';
  h += '<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">';
  
  for (var key in DISPLAY_EFFECTS) {
    var effect = DISPLAY_EFFECTS[key];
    var isSelected = currentEffect === key;
    h += '<button class="effect-option glass rounded-xl p-3 flex flex-col items-center gap-2 ' + (isSelected ? 'selected' : '') + '" data-effect="' + key + '">';
    h += '<i class="fa-solid ' + effect.icon + ' text-lg ' + (isSelected ? 'text-accent' : 'text-void-100') + '"></i>';
    h += '<span class="text-xs font-medium">' + effect.name + '</span>';
    h += '</button>';
  }
  
  h += '</div>';
  h += '<div class="mt-4 p-4 glass rounded-xl">';
  h += '<p class="text-xs text-void-200 mb-2">Preview:</p>';
  h += '<div class="text-xl font-display font-bold ' + (DISPLAY_EFFECTS[currentEffect].class || '') + '">' + esc(u.displayName || u.username) + '</div>';
  h += '</div>';
  h += '</div>';
  
  // Background Section
  h += '<div>';
  h += '<label class="block text-xs font-semibold text-void-100 mb-3 uppercase tracking-wider">Background</label>';
  h += '<div class="grid grid-cols-3 gap-3">';
  
  var bgs = ['void', 'sunset', 'ocean', 'forest', 'midnight', 'neon'];
  for (var i = 0; i < bgs.length; i++) {
    var k = bgs[i];
    h += '<button class="do-set-bg relative rounded-xl overflow-hidden h-20 border-2 transition-all" data-bg="' + k + '" style="border-color:' + (u.background === k ? '#7dd3fc' : '#1e1e1e') + '">';
    h += '<div class="' + BGM[k] + ' absolute inset-0"></div>';
    h += '<span class="absolute bottom-1 left-0 right-0 text-center text-[10px] font-semibold text-white/80 drop-shadow">' + BGL[k] + '</span>';
    h += '</button>';
  }
  
  h += '</div></div>';
  
  // Background Image Section
  h += '<div>';
  h += '<label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Background Image URL</label>';
  h += '<input class="vl-input" id="inp-bgimg" value="' + esc(u.bgImage || '') + '" placeholder="https://example.com/bg.jpg">';
  h += '</div>';
  
  // Accent Color Section
  h += '<div>';
  h += '<label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Accent Color</label>';
  h += '<div class="flex items-center gap-3">';
  h += '<input type="color" id="inp-accent" value="' + (u.accentColor || '#7dd3fc') + '" class="w-12 h-10 rounded-lg cursor:pointer border-0 bg-transparent">';
  h += '<code class="text-sm font-mono text-void-100">' + (u.accentColor || '#7dd3fc') + '</code>';
  h += '</div></div>';
  
  h += '<button class="do-save-app vl-btn vl-btn-primary"><i class="fa-solid fa-check"></i> Save Appearance</button>';
  h += '</div>';
  
  return h;
}

// Modified renderProfile function to apply display name effects
function renderProfile(user) {
  P.stop();
  var bgCls = BGM[user.background] || 'bg-preset-void';
  var accent = user.accentColor || '#7dd3fc';
  var avatar = user.avatar || 'https://picsum.photos/seed/' + user.username + '/200/200.jpg';
  var visible = getVisibleBadges(user);
  var displayNameEffect = user.displayNameEffect || 'none';
  var effectClass = DISPLAY_EFFECTS[displayNameEffect] ? DISPLAY_EFFECTS[displayNameEffect].class : '';
  
  var badgesH = '';
  for (var i = 0; i < visible.length; i++) {
    badgesH += renderBadgePill(visible[i], user);
  }
  
  var linksH = '';
  var lks = user.links || [];
  for (var i = 0; i < lks.length; i++) {
    var lk = lks[i];
    linksH += '<a href="' + esc(lk.url) + '" target="_blank" rel="noopener" class="profile-link anim-fade" style="animation-delay:' + (0.3 + i * 0.07) + 's"><i class="' + linkIcon(lk.url) + ' text-lg" style="color:' + accent + ';width:24px;text-align:center"></i><span class="flex-1 font-medium text-sm">' + esc(lk.title) + '</span><i class="fa-solid fa-chevron-right text-xs text-void-200"></i></a>';
  }
  
  var bgStyle = user.bgImage ? 'background-image:url(\'' + esc(user.bgImage) + '\');background-size:cover;background-position:center;' : '';
  var overlay = user.bgImage ? '<div class="absolute inset-0 bg-black/60"></div>' : '';
  
  return '<div class="' + bgCls + ' min-h-screen flex flex-col items-center justify-center px-4 py-12 relative" style="' + bgStyle + '">' + overlay + '<div class="relative z-10 w-full max-w-md" style="animation:profile-in .6s ease both"><div class="glass-strong rounded-3xl p-8 text-center"><div class="relative inline-block mb-5"><div class="w-24 h-24 rounded-full p-[3px]" style="background:linear-gradient(135deg,' + accent + ',' + accent + '44)"><img src="' + esc(avatar) + '" class="w-full h-full rounded-full object-cover border-2 border-void-800" alt="" onerror="this.src=\'https://picsum.photos/seed/' + user.username + '/200/200.jpg\'"></div><span class="absolute bottom-1 right-1 w-5 h-5 rounded-full bg-success border-2 border-void-600"></span></div><h1 class="font-display font-bold text-2xl mb-1 flex items-center justify-center gap-2 flex-wrap"><span class="uid-wrap relative cursor-default inline-flex items-center gap-2"><span class="' + effectClass + '">' + esc(user.displayName || user.username) + '</span> ' + badgesH + '<span class="uid-tip">' + user.uid + '</span></span></h1><p class="text-void-100 text-sm mb-4">@' + esc(user.username) + '</p>' + (user.bio ? '<p class="text-sm text-void-50 leading-relaxed mb-6">' + esc(user.bio) + '</p>' : '<div class="mb-6"></div>') + '<div class="w-16 h-[2px] mx-auto mb-6 rounded-full" style="background:' + accent + '40"></div><div class="space-y-3 text-left">' + (linksH || '<p class="text-void-200 text-sm text-center py-4">No links yet</p>') + '</div><div class="mt-8 flex items-center justify-center gap-2 text-void-200 text-xs"><i class="fa-solid fa-eye"></i><span>' + ((user.views || 0) + 1).toLocaleString() + ' views</span></div></div></div><div class="relative z-10 mt-8 flex items-center gap-4 text-xs text-void-200"><span class="font-display font-semibold"><span style="color:' + accent + '">Seashell</span>.lol</span><span class="text-void-400">|</span><a href="/" class="hover:text-void-50 transition-colors">Create your own</a></div></div>';
}

// Event handler for display name effect selection
document.addEventListener('click', function(e) {
  var effectBtn = e.target.closest('.effect-option');
  if (effectBtn) {
    // Remove selected class from all effect options
    var allEffects = document.querySelectorAll('.effect-option');
    allEffects.forEach(function(btn) {
      btn.classList.remove('selected');
      var icon = btn.querySelector('i');
      if (icon) {
        icon.classList.remove('text-accent');
        icon.classList.add('text-void-100');
      }
    });
    
    // Add selected class to clicked effect
    effectBtn.classList.add('selected');
    var icon = effectBtn.querySelector('i');
    if (icon) {
      icon.classList.remove('text-void-100');
      icon.classList.add('text-accent');
    }
    
    // Update preview
    var effectKey = effectBtn.getAttribute('data-effect');
    var previewDiv = document.querySelector('.effect-option').parentElement.nextElementSibling.querySelector('div:last-child');
    if (previewDiv) {
      // Remove all effect classes
      for (var key in DISPLAY_EFFECTS) {
        if (DISPLAY_EFFECTS[key].class) {
          previewDiv.classList.remove(DISPLAY_EFFECTS[key].class);
        }
      }
      // Add new effect class if not "none"
      if (DISPLAY_EFFECTS[effectKey].class) {
        previewDiv.classList.add(DISPLAY_EFFECTS[effectKey].class);
      }
    }
  }
});

// Modified save appearance handler to include display name effect
var originalSaveApp = function() {
  // This will be overridden by the event listener
};

document.addEventListener('click', function(e) {
  if (e.target.closest('.do-save-app')) {
    needAuth().then(function(u) {
      if (!u) return;
      
      var bgImg = document.getElementById('inp-bgimg').value.trim();
      var accent = document.getElementById('inp-accent').value;
      var selectedEffect = document.querySelector('.effect-option.selected');
      var effect = selectedEffect ? selectedEffect.getAttribute('data-effect') : 'none';
      
      var updates = {
        bgImage: bgImg,
        accentColor: accent,
        displayNameEffect: effect
      };
      
      // Find selected background
      var bgBtn = document.querySelector('.do-set-bg[style*="border-color:#7dd3fc"]');
      if (bgBtn) {
        updates.background = bgBtn.getAttribute('data-bg');
      }
      
      updateUser(u.id, updates).then(function() {
        toast('Appearance updated!', 'success');
      }).catch(function(err) {
        toast('Failed to save: ' + err.message, 'error');
      });
    });
  }
});
