async function sPr(){var n=document.getElementById('sN').value.trim(),b=document.getElementById('sB').value.trim();if(!n){toast('Name required','er');return;}await D.uU(CU.uid,{displayName:n,bio:b});CU=await D.gU(CU.uid);toast('Profile saved!','ok');rDT();}
async function chUsername(){var nu=document.getElementById('nUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username min 3 chars','er');return;}if(nu===CU.username){toast('Same as current','er');return;}var ex=await D.gUN(nu);if(ex){toast('Username taken','er');return;}var ue=await D.gUE(nu);if(ue&&ue.uid!==CU.uid){toast('Username taken','er');return;}var ue2=await D.gUE(CU.username);await D.chUn(CU.username,nu,CU.uid,ue2?ue2.email:null);await D.uU(CU.uid,{username:nu});CU=await D.gU(CU.uid);toast('Username changed to @'+nu,'ok');rDT();}
async function chPassword(){var cp=document.getElementById('cPw').value,np=document.getElementById('nPw').value,np2=document.getElementById('nPw2').value;if(!cp||!np){toast('Fill in all fields','er');return;}if(np.length<6){toast('Min 6 chars','er');return;}if(np!==np2){toast('Passwords do not match','er');return;}try{var cred=firebase.auth.EmailAuthProvider.credential(auth.currentUser.email,cp);await auth.currentUser.reauthenticateWithCredential(cred);await auth.currentUser.updatePassword(np);toast('Password changed!','ok');document.getElementById('cPw').value='';document.getElementById('nPw').value='';document.getElementById('nPw2').value='';}catch(e){toast('Wrong password','er');}}
function pTC(c){document.getElementById('ccI').value=c;document.getElementById('ccV').textContent=c;var swatches=document.querySelectorAll('#colorSwatches button');for(var i=0;i<swatches.length;i++){swatches[i].style.borderColor=swatches[i].getAttribute('data-color')===c?'#fff':'transparent';}}
async function saveAllCustom(){var a=document.getElementById('cAv').value.trim(),b=document.getElementById('cBg').value.trim(),c=document.getElementById('ccI').value;await D.uU(CU.uid,{avatar:a,backgroundUrl:b,themeColor:c});CU=await D.gU(CU.uid);toast('All customisation saved!','ok');rDT();}
async function addLink(){var t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();if(!t||!u){toast('Fill in all fields','er');return;}if(u.indexOf('http://')!==0&&u.indexOf('https://')!==0){toast('URL must start with http:// or https://','er');return;}var links=(CU.links||[]).slice();links.push({title:t,url:u});await D.uU(CU.uid,{links:links});CU=await D.gU(CU.uid);toast('Link added!','ok');rDT();}
async function delLink(i){var links=(CU.links||[]).slice();links.splice(i,1);await D.uU(CU.uid,{links:links});CU=await D.gU(CU.uid);toast('Link removed','in');rDT();}
async function saveUserEdit(uid){var n=document.getElementById('eN').value.trim(),r=document.getElementById('eR').value,b=document.getElementById('eB').value.split(',').map(function(x){return x.trim().toLowerCase();}).filter(function(x){return BG[x];});await D.uU(uid,{displayName:n,role:r,badges:b});toast('User updated!','ok');clM();rAC();}
async function banUser(uid,banned){await D.uU(uid,{banned:banned});toast(banned?'User banned':'User unbanned','in');rAC();}
async function saveBadges(uid){var cbs=document.querySelectorAll('#mbox input[type=checkbox]:checked');var badges=[];for(var i=0;i<cbs.length;i++)badges.push(cbs[i].value);await D.uU(uid,{badges:badges});toast('Badges updated!','ok');clM();rAC();}
async function chRole(uid,role){await D.uU(uid,{role:role});toast('Role updated!','ok');rAC();}

window.addEventListener('popstate',function(){router();});

(function(){if(!FB){router();return;}var done=false;auth.onAuthStateChanged(function(us){if(done)return;done=true;if(us){D.gU(us.uid).then(function(u){CU=u;if(CU&&CU.banned){auth.signOut();CU=null;}router();}).catch(function(){router();});}else{router();}});setTimeout(function(){if(!done){done=true;router();}},3000);})();
</script>
