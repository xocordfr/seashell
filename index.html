    h+='<div style="margin-top:16px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:10px"><h4 style="font-size:12px;font-weight:600;margin-bottom:12px;color:var(--fg2)">Add New Track</h4><div style="display:flex;flex-direction:column;gap:10px"><input id="muTi" class="ifield" type="text" placeholder="Track Title"><input id="muAr" class="ifield" type="text" placeholder="Artist Name"><input id="muCv" class="ifield" type="text" placeholder="Cover Image URL (optional)"><input id="muAu" class="ifield" type="text" placeholder="Audio URL (direct mp3 link)"><button class="bs bsm" onclick="muAddTrack()" style="align-self:flex-start"><i class="fa-solid fa-plus"></i> Add to List</button></div></div>';

    /* Shuffle toggle */
    h+='<div style="margin-top:16px"><label style="font-size:12px;font-weight:500;color:var(--fg2);display:flex;align-items:center;gap:8px;cursor:pointer"><button class="btoggle '+(m.shuffle?'on':'')+'" onclick="muToggleShuffle()"></button>Shuffle by default</label></div>';
  }

  /* Save / Reset bar */
  h+='<div class="mu-save-bar"><button class="bs bsm" onclick="muReset()" style="margin-right:auto"><i class="fa-solid fa-rotate-left"></i> Discard</button><span style="font-size:11px;color:var(--muted)" id="muStatus"></span><button class="bp" onclick="muSave()"><i class="fa-solid fa-floppy-disk"></i> Save Music Settings</button></div>';

  h+='</div>';
  return h;
}

/* Music draft operations - modify tempMusic only, no DB writes */
function muToggleEnabled(){if(!tempMusic)return;tempMusic.enabled=!tempMusic.enabled;rDT()}
function muToggleShuffle(){if(!tempMusic)return;tempMusic.shuffle=!tempMusic.shuffle;rDT()}
function muAddTrack(){
  if(!tempMusic)return;
  var ti=document.getElementById('muTi').value.trim();
  var ar=document.getElementById('muAr').value.trim();
  var cv=document.getElementById('muCv').value.trim();
  var au=document.getElementById('muAu').value.trim();
  if(!ti||!au){toast('Title and audio URL are required','er');return}
  if(!au.startsWith('http')){toast('Audio URL must be a direct link','er');return}
  tempMusic.tracks.push({title:ti,artist:ar,coverUrl:cv,audioUrl:au});
  toast('Track added to list','in');
  rDT();
}
function muRemoveTrack(i){if(!tempMusic)return;tempMusic.tracks.splice(i,1);rDT()}

/* Save all music settings to DB at once */
function muSave(){
  if(!CU||!tempMusic)return;
  var btn=document.querySelector('.mu-save-bar .bp');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving...';btn.style.opacity='.6';btn.style.pointerEvents='none'}
  var st=document.getElementById('muStatus');if(st)st.textContent='Saving...';
  D.uU(CU.uid,{music:JSON.parse(JSON.stringify(tempMusic))}).then(function(u){
    CU=u;
    if(st)st.textContent='';
    toast('Music settings saved!','ok');
    /* Re-init temp from saved to sync */
    tempMusic=JSON.parse(JSON.stringify(u.music||{enabled:false,tracks:[],shuffle:false}));
    rDT();
  }).catch(function(e){
    if(st)st.textContent='';
    toast('Error saving: '+e.message,'er');
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save Music Settings';btn.style.opacity='1';btn.style.pointerEvents='auto'}
  });
}

/* Discard music changes, reset to last saved */
function muReset(){
  if(!CU)return;
  tempMusic=JSON.parse(JSON.stringify(CU.music||{enabled:false,tracks:[],shuffle:false}));
  toast('Music changes discarded','in');
  rDT();
}

/* Avatar/Background/Color still use instant save */
function svAv(){if(!CU)return;D.uU(CU.uid,{avatar:document.getElementById('cuAv').value.trim()}).then(function(u){CU=u;toast('Avatar saved!','ok');rDT()}).catch(function(){toast('Error saving','er')})}
function svBg(){if(!CU)return;D.uU(CU.uid,{backgroundUrl:document.getElementById('cuBg').value.trim()}).then(function(u){CU=u;toast('Background saved!','ok')}).catch(function(){toast('Error saving','er')})}
function svTc(){if(!CU)return;D.uU(CU.uid,{themeColor:document.getElementById('cuTc').value}).then(function(u){CU=u;toast('Theme color saved!','ok')}).catch(function(){toast('Error saving','er')})}

/* Links */
function dLn(u){var lks=u.links||[];var list=lks.map(function(l,i){return'<div class="am-item"><div style="width:32px;height:32px;border-radius:8px;background:var(--adim);display:flex;align-items:center;justify-content:center"><i class="'+lI(l.url)+'" style="color:var(--accent);font-size:14px"></i></div><div class="am-item-info"><div class="am-item-t">'+E(l.title)+'</div><div class="am-item-a">'+E(l.url)+'</div></div><div style="display:flex;gap:6px"><button class="bs bsm" onclick="edLink('+i+')"><i class="fa-solid fa-pen"></i></button><button class="bd bsm" onclick="rmLink('+i+')"><i class="fa-solid fa-trash"></i></button></div></div>'}).join('');return'<h2 style="font-size:22px;font-weight:700;margin-bottom:24px;font-family:Outfit,sans-serif">Links</h2><div class="card" style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:600;margin-bottom:16px">Add Link</h3><div style="display:flex;flex-direction:column;gap:10px"><input id="lnTi" class="ifield" type="text" placeholder="Link Title"><input id="lnUr" class="ifield" type="text" placeholder="https://example.com"><button class="bp" onclick="addLink()"><i class="fa-solid fa-plus"></i> Add Link</button></div></div><div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:16px">Your Links ('+lks.length+')</h3>'+(list||'<p style="color:var(--muted);font-size:13px">No links added yet.</p>')+'</div>'}
function addLink(){if(!CU)return;var ti=document.getElementById('lnTi').value.trim(),ur=document.getElementById('lnUr').value.trim();if(!ti||!ur){toast('Title and URL required','er');return}var lks=CU.links||[];lks.push({title:ti,url:ur});D.uU(CU.uid,{links:lks}).then(function(u){CU=u;toast('Link added!','ok');rDT()}).catch(function(){toast('Error adding link','er')})}
function rmLink(i){if(!CU)return;var lks=CU.links||[];lks.splice(i,1);D.uU(CU.uid,{links:lks}).then(function(u){CU=u;toast('Link removed','ok');rDT()}).catch(function(){toast('Error removing link','er')})}
function edLink(i){if(!CU)return;var l=CU.links[i];showModal('Edit Link','<div style="display:flex;flex-direction:column;gap:10px"><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Title</label><input id="edLnTi" class="ifield" type="text" value="'+E(l.title)+'"></div><div><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">URL</label><input id="edLnUr" class="ifield" type="text" value="'+E(l.url)+'"></div></div>',[{l:'Cancel',a:'clM()'},{l:'Save',c:'bp',a:'svLink('+i+')'}])}
function svLink(i){if(!CU)return;var ti=document.getElementById('edLnTi').value.trim(),ur=document.getElementById('edLnUr').value.trim();if(!ti||!ur){toast('Title and URL required','er');return}var lks=CU.links||[];lks[i]={title:ti,url:ur};D.uU(CU.uid,{links:lks}).then(function(u){CU=u;toast('Link updated!','ok');clM();rDT()}).catch(function(){toast('Error updating link','er')})}

/* Admin Panel */
function pAdmin(){return'<div class="dash-wrap"><div class="aside"><div class="anav '+(aTab==='users'?'on':'')+'" onclick="sAT(\'users\')"><i class="fa-solid fa-users"></i>Users</div><div class="anav '+(aTab==='config'?'on':'')+'" onclick="sAT(\'config\')"><i class="fa-solid fa-sliders"></i>Config</div><div class="dns" style="margin:10px 18px"></div><div class="anav" onclick="nav(\'/dashboard\')"><i class="fa-solid fa-arrow-left"></i>Back to Dashboard</div></div><div class="abody" id="aC"></div></div>'}
function sAT(t){aTab=t;document.querySelectorAll('.anav').forEach(function(e){e.classList.remove('on')});var el=document.querySelector('.anav[onclick*="'+t+'"]');if(el)el.classList.add('on');rAC()}
function rAC(){var el=document.getElementById('aC');if(!el||!CU)return;if(aTab==='users'){el.innerHTML=aUs();loadAdminUsers()}else if(aTab==='config')el.innerHTML=aCf()}
function aUs(){return'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px"><h2 style="font-size:22px;font-weight:700;font-family:Outfit,sans-serif">User Management</h2><div style="display:flex;gap:10px;align-items:center"><div class="a-search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input class="a-search" id="aSearch" type="text" placeholder="Search users..." oninput="filterAdminUsers()"></div><button class="bs bsm" onclick="loadAdminUsers()"><i class="fa-solid fa-rotate"></i> Refresh</button></div></div><div class="card" style="padding:16px"><div id="aUsList"><div class="a-empty"><i class="fa-solid fa-spinner fa-spin" style="font-size:20px;margin-bottom:8px;display:block"></i>Loading users...</div></div></div>'}
function aCf(){return'<h2 style="font-size:22px;font-weight:700;margin-bottom:24px;font-family:Outfit,sans-serif">Configuration</h2><div class="card"><p style="color:var(--fg2);font-size:14px">Admin configuration panel coming soon.</p></div>'}
function loadAdminUsers(){var el=document.getElementById('aUsList');if(!el)return;el.innerHTML='<div class="a-empty"><i class="fa-solid fa-spinner fa-spin" style="font-size:20px;margin-bottom:8px;display:block"></i>Loading users...</div>';D.aU().then(function(users){allUsers=users;renderAdminUsers(users)}).catch(function(err){console.error('Failed to load users:',err);el.innerHTML='<div class="a-empty"><i class="fa-solid fa-triangle-exclamation" style="font-size:20px;margin-bottom:8px;display:block;color:var(--danger)"></i>Failed to load users.</div>'})}
function filterAdminUsers(){var q=(document.getElementById('aSearch')||{}).value||'';q=q.trim().toLowerCase();if(!q){renderAdminUsers(allUsers);return}renderAdminUsers(allUsers.filter(function(u){return(u.displayName||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q)||(u.uid||'').toLowerCase().includes(q)||(u.role||'').toLowerCase().includes(q)}))}
function renderAdminUsers(users){var el=document.getElementById('aUsList');if(!el)return;if(!users||!users.length){el.innerHTML='<div class="a-empty"><i class="fa-solid fa-users-slash" style="font-size:24px;margin-bottom:8px;display:block"></i>No users found.</div>';return}var mr=CU?CU.role:'user';var html='<div style="font-size:11px;color:var(--muted);margin-bottom:12px">'+users.length+' user'+(users.length!==1?'s':'')+'</div>';for(var i=0;i<users.length;i++){var u=users[i],isSelf=CU&&u.uid===CU.uid,canMod=canEdit(u.role,mr);html+='<div class="a-user-row" style="'+(u.banned?'opacity:0.5;':'')+'"><div class="a-user-av">'+(u.avatar?'<img src="'+E(u.avatar)+'">':'<span>'+(u.displayName||u.username||'?')[0].toUpperCase()+'</span>')+'</div><div class="a-user-info"><div class="a-user-name">'+E(u.displayName||u.username||'Unknown')+(u.banned?' <span style="color:var(--danger);font-size:10px;font-weight:700">BANNED</span>':'')+'</div><div class="a-user-un">@'+E(u.username||'?')+' &middot; UID '+(u.uidNumber||'?')+'</div><div class="a-user-meta">'+rT(u.role)+' &middot; '+(u.views||0)+' views &middot; '+fmtDate(u.createdAt)+'</div></div><div class="a-user-actions">';if(canMod){html+='<button class="a-btn" onclick="aViewProfile(\''+E(u.username)+'\')" title="View"><i class="fa-solid fa-eye"></i></button><button class="a-btn" onclick="aEditRole(\''+u.uid+'\',\''+u.role+'\')" title="Role"><i class="fa-solid fa-shield-halved"></i></button><button class="a-btn" onclick="aEditBadges(\''+u.uid+'\')" title="Badges"><i class="fa-solid fa-award"></i></button>';if(!isSelf){html+='<button class="a-btn warn" onclick="aToggleBan(\''+u.uid+'\','+!!u.banned+')" title="'+(u.banned?'Unban':'Ban')+'"><i class="fa-solid fa-'+(u.banned?'lock-open':'ban')+'"></i></button><button class="a-btn danger" onclick="aDelUser(\''+u.uid+'\',\''+E(u.username||'')+'\')" title="Delete"><i class="fa-solid fa-trash"></i></button>'}}html+='</div></div>'}el.innerHTML=html}
function aViewProfile(un){window.open('/'+un,'_blank')}
function aEditRole(uid,curRole){if(!CU)return;var roles=['user','moderator','admin','manager','owner'];var mr=CU.role;var opts=roles.map(function(r){var dis=RL[r]>=RL[mr]&&r!=='owner'?'disabled':'';return'<option value="'+r+'" '+(r===curRole?'selected':'')+' '+dis+'>'+r.charAt(0).toUpperCase()+r.slice(1)+'</option>'}).join('');showModal('Change Role','<div><label style="font-size:12px;font-weight:600;color:var(--fg2);display:block;margin-bottom:6px">Select new role</label><select id="aRoleSel" class="ifield" style="cursor:pointer">'+opts+'</select></div>',[{l:'Cancel',a:'clM()'},{l:'Update Role',c:'bp',a:'aSaveRole(\''+uid+'\')'}])}
function aSaveRole(uid){var role=document.getElementById('aRoleSel').value;D.uU(uid,{role:role}).then(function(){toast('Role updated to '+role,'ok');clM();loadAdminUsers()}).catch(function(e){toast('Error: '+e.message,'er')})}
function aEditBadges(uid){D.gU(uid).then(function(u){if(!u){toast('User not found','er');return}var all=Object.keys(BG);var owned=u.badges||[];var checks=all.map(function(k){var b=BG[k];return'<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:13px;color:var(--fg2)"><input type="checkbox" class="aBadgeChk" value="'+k+'" '+(owned.includes(k)?'checked':'')+' style="accent-color:var(--accent)"> '+bH(k,true)+' <span style="margin-left:4px">'+b.d+'</span></label>'}).join('');showModal('Edit Badges for @'+u.username,'<div style="display:flex;flex-direction:column;gap:2px;max-height:400px;overflow-y:auto">'+checks+'</div>',[{l:'Cancel',a:'clM()'},{l:'Save Badges',c:'bp',a:'aSaveBadges(\''+uid+'\')'}])}).catch(function(){toast('Error loading user','er')})}
function aSaveBadges(uid){var badges=[];document.querySelectorAll('.aBadgeChk:checked').forEach(function(c){badges.push(c.value)});D.uU(uid,{badges:badges,activeBadges:badges}).then(function(){toast('Badges updated','ok');clM();loadAdminUsers()}).catch(function(e){toast('Error: '+e.message,'er')})}
function aToggleBan(uid,isBanned){var action=isBanned?'Unban':'Ban';showModal(action+' User','<p style="color:var(--fg2);font-size:14px">Are you sure you want to '+action.toLowerCase()+' this user?</p>',[{l:'Cancel',a:'clM()'},{l:action,c:isBanned?'bs':'bd',a:'aDoBan(\''+uid+'\','+!isBanned+')'}])}
function aDoBan(uid,banned){D.uU(uid,{banned:banned}).then(function(){toast(banned?'User banned':'User unbanned','ok');clM();loadAdminUsers()}).catch(function(e){toast('Error: '+e.message,'er')})}

function aDoDel(uid){D.dU(uid).then(function(){toast('User deleted','ok');clM();loadAdminUsers()}).catch(function(e){toast('Error: '+e.message,'er')})}

/* Expose */
window.nav=nav;window.router=router;window.hL=hL;window.hS=hS;window.doLogout=doLogout;

router();

})();
