function saveCustomise(){var av=document.getElementById('dAv').value.trim(),bg=document.getElementById('dBg').value.trim(),tc=document.getElementById('dTc').value,bio=document.getElementById('dBio').value.trim();if(tc&&!/^#[0-9a-fA-F]{6}$/.test(tc)){toast('Invalid color format','er');return}var upd={avatar:av,backgroundUrl:bg,themeColor:tc,bio:bio};D.uU(CU.uid,upd).then(function(u){if(u){CU=u;toast('Saved!','ok');iDash()}}).catch(function(e){toast('Save failed','er')})}

function addLink(){var t=document.getElementById('nLkT').value.trim(),u=document.getElementById('nLkU').value.trim();if(!t||!u){toast('Fill in both fields','er');return}if(!u.match(/^https?:\/\//))u='https://'+u;var links=CU.links||[];links.push({title:t,url:u});D.uU(CU.uid,{links:links}).then(function(r){if(r){CU=r;toast('Link added!','ok');rDashLinks(document.getElementById('dCont'))}}).catch(function(){toast('Failed to add link','er')})}

function saveLinkEdit(i){var t=document.getElementById('eLkT').value.trim(),u=document.getElementById('eLkU').value.trim();if(!t||!u){toast('Fill in both fields','er');return}var links=(CU.links||[]).slice();links[i]={title:t,url:u};D.uU(CU.uid,{links:links}).then(function(r){if(r){CU=r;toast('Link updated!','ok');clM();rDashLinks(document.getElementById('dCont'))}}).catch(function(){toast('Failed to update','er')})}

function rDashBadges(c){var badges=CU.badges||[];var active=CU.activeBadges||[];var h='<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Badges</h2>';if(!badges.length){h+='<div class="a-empty"><i class="fa-solid fa-award" style="font-size:24px;margin-bottom:10px;display:block"></i>No badges yet. Contact staff on Discord to get awarded badges.</div>'}else{badges.forEach(function(bk){var b=BG[bk];if(!b)return;var on=active.indexOf(bk)!==-1;h+='<div class="am-item"><div style="width:36px;height:36px;border-radius:8px;background:'+b.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+b.s+'</div><div class="am-item-info"><div class="am-item-t">'+b.n+'</div><div class="am-item-a">'+b.d+'</div></div><button class="btoggle'+(on?' on':'')+'" onclick="toggleBadge(\''+bk+'\')"></button></div>'});h+='<div class="mu-save-bar"><button class="bp" onclick="saveBadges()"><i class="fa-solid fa-check"></i> Save Badge Visibility</button></div>'}c.innerHTML=h}

function rDashSettings(c){var u=CU;c.innerHTML='<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Settings</h2><div class="card" style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:14px">Display Name</h3><input id="sDn" class="ifield" type="text" value="'+E(u.displayName||'')+'" placeholder="Your display name"></div><div class="card" style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:14px">Username</h3><div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px">seashell.lol/</span><input id="sUn" class="ifield" type="text" value="'+E(u.username||'')+'" style="padding-left:112px" placeholder="username"></div><p style="font-size:11px;color:var(--muted);margin-top:6px">Changing username will update your profile URL.</p></div><div class="card" style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:14px">Change Password</h3><div style="display:flex;flex-direction:column;gap:10px"><input id="sPw1" class="ifield" type="password" placeholder="New password (min 6 chars)"><input id="sPw2" class="ifield" type="password" placeholder="Confirm new password"><button class="bs" onclick="changePw()"><i class="fa-solid fa-key"></i> Update Password</button></div></div><div class="mu-save-bar"><button class="bp" onclick="saveSettings()"><i class="fa-solid fa-check"></i> Save Settings</button></div>'}

function saveSettings(){var dn=document.getElementById('sDn').value.trim(),un=document.getElementById('sUn').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!dn){toast('Display name required','er');return}if(!un||un.length<3){toast('Username min 3 chars','er');return}if(un!==CU.username){D.gUN(un).then(function(ex){if(ex){toast('Username taken','er');return}return D.chUn(CU.username,un,CU.uid,auth.currentUser?auth.currentUser.email:'')}).then(function(){return D.uU(CU.uid,{displayName:dn,username:un})}).then(function(u){if(u){CU=u;toast('Settings saved!','ok');iDash()}}).catch(function(e){toast('Failed to save','er')})}else{D.uU(CU.uid,{displayName:dn}).then(function(u){if(u){CU=u;toast('Settings saved!','ok');iDash()}}).catch(function(){toast('Failed to save','er')})}}

function changePw(){var p1=document.getElementById('sPw1').value,p2=document.getElementById('sPw2').value;if(!p1||p1.length<6){toast('Password min 6 chars','er');return}if(p1!==p2){toast('Passwords don\'t match','er');return}if(!auth.currentUser){toast('Not signed in','er');return}auth.currentUser.updatePassword(p1).then(function(){toast('Password updated!','ok');document.getElementById('sPw1').value='';document.getElementById('sPw2').value=''}).catch(function(e){if(e.code==='auth/requires-recent-login')toast('Please sign out and back in first','er');else toast('Failed to update password','er')})}

function rAUsers(c){c.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px"><h2 style="font-size:20px;font-weight:700">Users</h2><div class="a-search-wrap"><i class="fa-solid fa-search"></i><input class="a-search" id="aUsSearch" placeholder="Search users..." oninput="filterAUsers()"></div></div><div id="aUsList"><div style="text-align:center;padding:40px;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>';D.aU().then(function(users){allUsers=users;renderAUsersList(users)}).catch(function(){document.getElementById('aUsList').innerHTML='<div class="a-empty">Failed to load users.</div>'})}

function aDoDel(uid){D.dU(uid).then(function(){toast('User deleted','ok');clM();rAUsers(document.getElementById('aCont'))}).catch(function(){toast('Failed','er')})}

function rABadges(c){c.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px"><h2 style="font-size:20px;font-weight:700">Manage Badges</h2><div class="a-search-wrap"><i class="fa-solid fa-search"></i><input class="a-search" id="aBdSearch" placeholder="Search users..." oninput="filterABadges()"></div></div><div id="aBdList"><div style="text-align:center;padding:40px;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>';D.aU().then(function(users){allUsers=users;renderABadgesList(users)}).catch(function(){document.getElementById('aBdList').innerHTML='<div class="a-empty">Failed to load.</div>'})}

function renderABadgesList(users){var el=document.getElementById('aBdList');if(!el)return;if(!users.length){el.innerHTML='<div class="a-empty">No users found.</div>';return}var h='';users.sort(function(a,b){return(a.username||'').localeCompare(b.username||'')});users.forEach(function(u){var bList=u.badges||[];var bStr=bList.length?bList.map(function(bk){var b=BG[bk];return b?'<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600;background:'+b.bg+';color:'+b.c+';margin:2px">'+b.n+'</span>':''}).join(''):'<span style="font-size:11px;color:var(--muted)">None</span>';h+='<div class="a-user-row"><div class="a-user-av">'+(u.avatar?'<img src="'+E(u.avatar)+'">':'<span>'+(u.displayName||u.username||'?').charAt(0).toUpperCase()+'</span>')+'</div><div class="a-user-info"><div class="a-user-name">'+E(u.displayName||u.username)+'</div><div class="a-user-un">@'+E(u.username)+'</div><div style="margin-top:4px">'+bStr+'</div></div><div class="a-user-actions"><button class="a-btn" onclick="aBadgeModal(\''+u.uid+'\')"><i class="fa-solid fa-plus"></i> Edit</button></div></div>'});el.innerHTML=h}

function filterABadges(){var q=(document.getElementById('aBdSearch').value||'').toLowerCase();var filtered=allUsers.filter(function(u){return(u.displayName||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q)});renderABadgesList(filtered)}

function aBadgeModal(uid){var user=allUsers.find(function(u){return u.uid===uid});if(!user)return;var curBadges=user.badges||[];var h='<div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto">';Object.keys(BG).forEach(function(bk){var b=BG[bk];var on=curBadges.indexOf(bk)!==-1;h+='<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;'+(on?'background:var(--adim)':'')+'" onmouseover="this.style.background=\'rgba(255,255,255,0.03)\'" onmouseout="this.style.background=\''+(on?'var(--adim)':'transparent')+'\'"><input type="checkbox" class="aBdChk" value="'+bk+'"'+(on?' checked':'')+' style="accent-color:var(--accent);width:16px;height:16px;cursor:pointer"><span style="display:inline-flex;align-items:center;gap:4px">'+b.s+' <span style="font-size:13px;font-weight:500;color:var(--fg)">'+b.n+'</span></span></label>'});h+='</div>';showModal('Badges for @'+user.username,h,[{l:'Cancel',a:'clM()',c:'bs'},{l:'Save',a:'aSaveBadges(\''+uid+'\')',c:'bp'}])}

function aSaveBadges(uid){var checks=document.querySelectorAll('.aBdChk');var badges=[];checks.forEach(function(chk){if(chk.checked)badges.push(chk.value)});D.uU(uid,{badges:badges,activeBadges:badges}).then(function(){toast('Badges updated','ok');clM();rABadges(document.getElementById('aCont'))}).catch(function(){toast('Failed','er')})}

function p404(){return'<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 20px"><div class="card" style="max-width:420px;width:100%;text-align:center"><i class="fa-solid fa-ghost" style="font-size:48px;color:var(--muted);margin-bottom:16px"></i><h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Page not found</h2><p style="color:var(--fg2);font-size:14px;margin-bottom:24px">The page you\'re looking for doesn\'t exist.</p><span class="bp" onclick="nav(\'/\')" style="cursor:pointer"><i class="fa-solid fa-house"></i> Go Home</span></div></div>'}

window.addEventListener('popstate',router);
restoreSess().then(function(){router()});
})();
</script>
