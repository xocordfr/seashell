function dBadges(){var u=CU;var all=Object.keys(BG);var ab=u.activeBadges||[];return'<div><h2 style="font-size:22px;font-weight:700;margin-bottom:20px;font-family:Outfit,sans-serif">Badges</h2><div class="card"><p style="color:var(--fg2);font-size:13px;margin-bottom:16px">Toggle badges on or off. Contact staff on Discord to request badges.</p>'+(all.length?all.map(function(k){var b=BG[k],has=u.badges&&u.badges.indexOf(k)!==-1,on=ab.indexOf(k)!==-1;return'<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)"><div style="flex:1;display:flex;align-items:center;gap:10px">'+bH(k,true)+'<span style="font-size:13px;color:'+(has?'var(--fg)':'var(--muted)')+'">'+b.d+'</span>'+(has?'':'<span style="font-size:10px;color:var(--muted);font-style:italic">(not earned)</span>')+'</div><button class="btoggle'+(on&&has?' on':'')+'" '+(has?'':'disabled style="opacity:.3;cursor:not-allowed"')+' onclick="togBadge(\''+k+'\')"></button></div>'}).join(''):'<div class="a-empty">No badges available.</div>')+'</div></div>'}

function togBadge(k){var ab=CU.activeBadges?CU.activeBadges.slice():[];var idx=ab.indexOf(k);if(idx===-1)ab.push(k);else ab.splice(idx,1);D.uU(CU.uid,{activeBadges:ab}).then(function(u){if(u){CU=u;toast('Badge updated','ok');rDC()}}).catch(function(){toast('Error updating badge','er')})}

function dSettings(){var u=CU;return'<div><h2 style="font-size:22px;font-weight:700;margin-bottom:20px;font-family:Outfit,sans-serif">Settings</h2><div class="card" style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Display Name</h3><input id="sDN" class="ifield" type="text" value="'+E(u.displayName||'')+'"></div><div class="card" style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Username</h3><div style="position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px">seashell.lol/</span><input id="sUN" class="ifield" type="text" value="'+E(u.username||'')+'" style="padding-left:112px"></div><p style="font-size:11px;color:var(--muted);margin-top:4px">Changing username will update your profile URL</p></div><div class="card" style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Change Password</h3><div style="display:flex;flex-direction:column;gap:10px"><input id="sPW" class="ifield" type="password" placeholder="Current password"><input id="sNPW" class="ifield" type="password" placeholder="New password"><input id="sNPW2" class="ifield" type="password" placeholder="Confirm new password"><button class="bp bsm" onclick="chPW()"><i class="fa-solid fa-key"></i> Update Password</button></div></div><div class="card" style="margin-bottom:16px;border-color:rgba(239,68,68,0.2)"><h3 style="font-size:15px;font-weight:600;color:var(--danger);margin-bottom:8px">Danger Zone</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:12px">Permanently delete your account and all data.</p><button class="bd" onclick="delAcc()"><i class="fa-solid fa-trash"></i> Delete Account</button></div><div class="mu-save-bar"><button class="bs" onclick="rDC()">Cancel</button><button class="bp" onclick="saveSettings()"><i class="fa-solid fa-check"></i> Save Settings</button></div></div>'}

function saveSettings(){var dn=document.getElementById('sDN').value.trim(),un=document.getElementById('sUN').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!dn){toast('Display name required','er');return}if(!un||un.length<3){toast('Username min 3 chars','er');return}if(un!==CU.username){D.gUN(un).then(function(ex){if(ex){toast('Username taken','er');return null}return D.chUn(CU.username,un,CU.uid,auth.currentUser?auth.currentUser.email:'')}).then(function(r){if(r!==null)return D.uU(CU.uid,{displayName:dn,username:un})}).then(function(u){if(u){CU=u;toast('Settings saved','ok');rDC()}}).catch(function(){toast('Error saving settings','er')})}else{D.uU(CU.uid,{displayName:dn}).then(function(u){if(u){CU=u;toast('Settings saved','ok');rDC()}}).catch(function(){toast('Error saving settings','er')})}}

function chPW(){var cp=document.getElementById('sPW').value,np=document.getElementById('sNPW').value,np2=document.getElementById('sNPW2').value;if(!cp||!np){toast('Fill in password fields','er');return}if(np!==np2){toast('New passwords don\'t match','er');return}if(np.length<6){toast('New password min 6 chars','er');return}if(!auth.currentUser)return;auth.currentUser.reauthenticateWithCredential(firebase.auth.EmailAuthProvider.credential(auth.currentUser.email,cp)).then(function(){return auth.currentUser.updatePassword(np)}).then(function(){toast('Password updated','ok');document.getElementById('sPW').value='';document.getElementById('sNPW').value='';document.getElementById('sNPW2').value=''}).catch(function(e){if(e.code==='auth/wrong-password')toast('Current password incorrect','er');else toast(e.message,'er')})}

function delAcc(){showModal('Delete Account','<p style="color:var(--fg2);font-size:14px">This will permanently delete your account and all associated data. This cannot be undone.</p>',[{l:'Cancel',a:'clM()'},{l:'Delete Forever',c:'bd',a:'doDelAcc()'}])}

function doDelAcc(){clM();D.dU(CU.uid).then(function(){if(auth)auth.currentUser.delete().catch(function(){});CU=null;toast('Account deleted','in');nav('/')}).catch(function(){toast('Error deleting account','er')})}

function cpLink(){var u=CU;if(!u)return;var url=window.location.origin+'/'+u.username;navigator.clipboard.writeText(url).then(function(){toast('Link copied!','ok')}).catch(function(){toast('Could not copy','er')})}

function pAdmin(){return'<div style="display:flex;min-height:calc(100vh - 60px)"><div class="aside"><div class="anav on" data-at="users" onclick="sAT(\'users\')"><i class="fa-solid fa-users"></i>Users</div></div><div class="abody" id="aContent"></div></div>'}

function sAT(t){aTab=t;document.querySelectorAll('.anav').forEach(function(el){el.classList.toggle('on',el.getAttribute('data-at')===t)});rAC()}

function rAC(){var c=document.getElementById('aContent');if(!c)return;if(aTab==='users')c.innerHTML=aUsers()}

function aUsers(){if(!allUsers.length)return'<div class="a-empty"><i class="fa-solid fa-spinner fa-spin" style="font-size:24px;margin-bottom:10px;display:block"></i>Loading users...</div>';var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:20px;font-weight:700;font-family:Outfit,sans-serif">All Users ('+allUsers.length+')</h2><div class="a-search-wrap"><i class="fa-solid fa-search"></i><input class="a-search" id="aSearch" placeholder="Search users..." oninput="filtUsers()"></div></div><div id="aUsersList">';h+=allUsers.map(function(u){return'<div class="a-user-row" data-search="'+E((u.displayName||'').toLowerCase()+' '+(u.username||'').toLowerCase())+'"><div class="a-user-av">'+(u.avatar?'<img src="'+u.avatar+'">':'<span>'+(u.displayName||u.username||'?')[0].toUpperCase()+'</span>')+'</div><div class="a-user-info"><div class="a-user-name">'+E(u.displayName||u.username)+'</div><div class="a-user-un">@'+E(u.username)+'</div><div class="a-user-meta">'+rT(u.role||'user')+' &middot; '+fmtDate(u.createdAt)+' &middot; '+(u.views||0)+' views</div></div><div class="a-user-actions">'+(canEdit(u.role,CU.role)?'<button class="a-btn" onclick="aRoleMenu(\''+u.uid+'\',\''+(u.role||'user')+'\')"><i class="fa-solid fa-shield-halved"></i></button>':'')+'<button class="a-btn danger" onclick="aBanToggle(\''+u.uid+'\','+(!!u.banned)+')"><i class="fa-solid fa-'+(u.banned?'lock-open':'ban')+'"></i></button>'+(canEdit(u.role,CU.role)?'<button class="a-btn danger" onclick="aDelUser(\''+u.uid+'\',\''+E(u.username||'')+'\')"><i class="fa-solid fa-trash"></i></button>':'')+'</div></div>'}).join('');h+='</div>';return h}

function filtUsers(){var q=(document.getElementById('aSearch').value||'').toLowerCase();document.querySelectorAll('.a-user-row').forEach(function(el){el.style.display=el.getAttribute('data-search').indexOf(q)!==-1?'':'none'})}

function aRoleMenu(uid,cur){var roles=Object.keys(RL).filter(function(r){return canEdit(r,CU.role)});var h='<div style="display:flex;flex-direction:column;gap:6px">';h+=roles.map(function(r){return'<button class="bs" style="justify-content:center;'+(r===cur?'border-color:var(--accent);color:var(--accent)':'')+'" onclick="aSetRole(\''+uid+'\',\''+r+'\')">'+rT(r)+' '+r.charAt(0).toUpperCase()+r.slice(1)+'</button>'}).join('');h+='</div>';showModal('Change Role',h)}

function aSetRole(uid,role){clM();db.collection('users').doc(uid).update({role:role}).then(function(){allUsers=allUsers.map(function(u){if(u.uid===uid)u.role=role;return u});toast('Role updated','ok');rAC()}).catch(function(){toast('Error updating role','er')})}

function aBanToggle(uid,banned){db.collection('users').doc(uid).update({banned:!banned}).then(function(){allUsers=allUsers.map(function(u){if(u.uid===uid)u.banned=!banned;return u});toast(!banned?'User banned':'User unbanned','ok');rAC()}).catch(function(){toast('Error','er')})}

function aDelUser(uid,un){showModal('Delete User','<p style="color:var(--fg2);font-size:14px">Delete <strong>@'+un+'</strong> and all their data?</p>',[{l:'Cancel',a:'clM()'},{l:'Delete',c:'bd',a:'doADelUser(\''+uid+'\')'}])}

function doADelUser(uid){clM();D.dU(uid).then(function(){allUsers=allUsers.filter(function(u){return u.uid!==uid});toast('User deleted','ok');rAC()}).catch(function(){toast('Error deleting user','er')})}

window.addEventListener('popstate',router);

restoreSess().then(function(){
  router();
  if(CU && RL[CU.role]>=RL.moderator && db){
    D.aU().then(function(u){allUsers=u;if(aTab==='users'){var c=document.getElementById('aContent');if(c)c.innerHTML=aUsers()}})
  }
});

})();
</script>
</body>
