var P={cv:null,cx:null,pts:[],on:false,raf:0,init:function(){this.cv=document.getElementById('bg-canvas');if(!this.cv)return;this.cx=this.cv.getContext('2d');this.resize();window.addEventListener('resize',this.resize.bind(this));this.make();},resize:function(){if(!this.cv)return;this.cv.width=window.innerWidth;this.cv.height=window.innerHeight;},make:function(){if(!this.cv)return;this.pts=[];var n=Math.min(50,Math.floor(this.cv.width*this.cv.height/22000));for(var i=0;i<n;i++)this.pts.push({x:Math.random()*this.cv.width,y:Math.random()*this.cv.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.5+.5,a:Math.random()*.5+.2});},start:function(){if(this.on)return;this.on=true;this.loop();},stop:function(){this.on=false;if(this.raf)cancelAnimationFrame(this.raf);if(this.cx&&this.cv)this.cx.clearRect(0,0,this.cv.width,this.cv.height);},loop:function(){if(!this.on||!this.cx||!this.cv)return;var c=this.cx,w=this.cv.width,h=this.cv.height,pts=this.pts;c.clearRect(0,0,w,h);for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle='rgba(125,211,252,'+p.a+')';c.fill();}for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){c.beginPath();c.moveTo(pts[i].x,pts[i].y);c.lineTo(pts[j].x,pts[j].y);c.strokeStyle='rgba(125,211,252,'+(0.07*(1-d/130))+')';c.lineWidth=.5;c.stroke();}}var self=this;this.raf=requestAnimationFrame(function(){self.loop();});}};

  if(saveAppBtn&&!saveAppBtn.disabled){var s=getSession();if(!s)return;var errEl=document.getElementById('appearance-err'),okEl=document.getElementById('appearance-ok');errEl.classList.add('hidden');okEl.classList.add('hidden');saveAppBtn.disabled=true;saveAppBtn.dataset.submitting='true';saveAppBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving...';var bg=document.querySelector('.bg-opt.sel');var bgKey=bg?bg.dataset.bg:'void';var bgImage=document.getElementById('inp-bgImage').value.trim();var accent=document.getElementById('inp-accent').value;var fx=document.querySelector('.fx-opt.sel');var fxKey=fx?fx.dataset.fx:'none';updateUser(s.userId,{background:bgKey,bgImage:bgImage,accentColor:accent,displayNameEffect:fxKey}).then(function(){saveAppBtn.disabled=false;saveAppBtn.dataset.submitting='false';saveAppBtn.innerHTML='<i class="fa-solid fa-check"></i> Save Appearance';okEl.textContent='Appearance saved!';okEl.classList.remove('hidden');toast('Appearance updated!','success');}).catch(function(err){saveAppBtn.disabled=false;saveAppBtn.dataset.submitting='false';saveAppBtn.innerHTML='<i class="fa-solid fa-check"></i> Save Appearance';errEl.textContent=err.message||'Error saving';errEl.classList.remove('hidden');});return;}

  var delAccBtn=e.target.closest('.delete-account-btn');
  if(delAccBtn){showModal('<h3 class="font-display font-bold text-xl mb-2 text-red-400">Delete Account?</h3><p class="text-void-100 text-sm mb-6">This action is permanent and cannot be undone.</p><div class="flex gap-3"><button class="vl-btn vl-btn-secondary flex-1 justify-center cancel-delete-btn">Cancel</button><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-delete-btn" data-submitting="false"><i class="fa-solid fa-trash"></i> Delete</button></div>');return;}

  var confirmDelBtn=e.target.closest('.confirm-delete-btn');
  if(confirmDelBtn&&confirmDelBtn.dataset.submitting!=='true'){confirmDelBtn.disabled=true;confirmDelBtn.dataset.submitting='true';confirmDelBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Deleting...';var s=getSession();if(s){deleteUser(s.userId).then(function(){clearSession();closeModal();toast('Account deleted.','info');navigateTo('/');}).catch(function(err){confirmDelBtn.disabled=false;confirmDelBtn.dataset.submitting='false';confirmDelBtn.innerHTML='<i class="fa-solid fa-trash"></i> Delete';toast('Error: '+err.message,'error');});}return;}

  var cancelDelBtn=e.target.closest('.cancel-delete-btn');
  if(cancelDelBtn){closeModal();return;}

  /* ===== ADMIN CLICK HANDLERS ===== */
  var adminViewBtn=e.target.closest('.admin-view-btn');
  if(adminViewBtn){var uid=adminViewBtn.dataset.uid;findById(uid).then(function(u){if(u)window.open('/'+u.username,'_blank');});return;}

  var adminBanBtn=e.target.closest('.admin-ban-btn');
  if(adminBanBtn){var uid=adminBanBtn.dataset.uid;showModal('<h3 class="font-display font-bold text-xl mb-2 text-warning">Ban User</h3><p class="text-void-100 text-sm mb-4">Enter a reason for banning this user:</p><form id="frm-ban-user" data-uid="'+uid+'"><textarea class="vl-input mb-4" name="reason" placeholder="Reason for ban..." rows="3"></textarea><div id="ban-err" class="text-red-400 text-xs mb-4 hidden"></div><button type="submit" class="vl-btn vl-btn-danger w-full justify-center" data-submitting="false"><i class="fa-solid fa-gavel"></i> Ban User</button></form>');return;}

  var adminUnbanBtn=e.target.closest('.admin-unban-btn');
  if(adminUnbanBtn){var uid=adminUnbanBtn.dataset.uid;updateUser(uid,{banned:false,banReason:''}).then(function(){toast('User unbanned.','success');loadAdminUsers();}).catch(function(err){toast('Error: '+err.message,'error');});return;}

  var adminRoleBtn=e.target.closest('.admin-role-btn');
  if(adminRoleBtn){var uid=adminRoleBtn.dataset.uid;findById(uid).then(function(u){if(u)showModal('<h3 class="font-display font-bold text-xl mb-2">Change Role</h3><p class="text-void-100 text-sm mb-4">@'+esc(u.username)+' &middot; Current role: <strong class="capitalize">'+esc(u.role)+'</strong></p><form id="frm-change-role" data-uid="'+uid+'"><select class="vl-input mb-4" name="role"><option value="user" '+(u.role==='user'?'selected':'')+'>User</option><option value="moderator" '+(u.role==='moderator'?'selected':'')+'>Moderator</option><option value="admin" '+(u.role==='admin'?'selected':'')+'>Admin</option></select><div id="role-err" class="text-red-400 text-xs mb-4 hidden"></div><button type="submit" class="vl-btn vl-btn-primary w-full justify-center" data-submitting="false"><i class="fa-solid fa-check"></i> Update Role</button></form>');});return;}

  var adminDeluserBtn=e.target.closest('.admin-deluser-btn');
  if(adminDeluserBtn){var uid=adminDeluserBtn.dataset.uid;findById(uid).then(function(u){if(u)showModal('<h3 class="font-display font-bold text-xl mb-2 text-red-400">Delete User</h3><p class="text-void-100 text-sm mb-6">Permanently delete <strong>@'+esc(u.username)+'</strong> ('+u.uid+')? This cannot be undone.</p><div class="flex gap-3"><button class="vl-btn vl-btn-secondary flex-1 justify-center cancel-admin-del-btn">Cancel</button><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-admin-del-btn" data-uid="'+uid+'" data-submitting="false"><i class="fa-solid fa-trash"></i> Delete</button></div>');});return;}

  var confirmAdminDel=e.target.closest('.confirm-admin-del-btn');
  if(confirmAdminDel&&confirmAdminDel.dataset.submitting!=='true'){confirmAdminDel.disabled=true;confirmAdminDel.dataset.submitting='true';confirmAdminDel.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Deleting...';var uid=confirmAdminDel.dataset.uid;deleteUser(uid).then(function(){closeModal();toast('User deleted.','success');loadAdminUsers();}).catch(function(err){confirmAdminDel.disabled=false;confirmAdminDel.dataset.submitting='false';confirmAdminDel.innerHTML='<i class="fa-solid fa-trash"></i> Delete';toast('Error: '+err.message,'error');});return;}

  var cancelAdminDel=e.target.closest('.cancel-admin-del-btn');
  if(cancelAdminDel){closeModal();return;}
});

/* Admin form handlers */
document.addEventListener('submit', function(e) {
  if(e.target.id==='frm-ban-user'){
    e.preventDefault();
    var form=e.target, errEl=document.getElementById('ban-err'), btn=form.querySelector('button[type="submit"]'), uid=form.dataset.uid, reason=form.reason.value.trim();
    errEl.classList.add('hidden');
    if(btn.disabled||btn.dataset.submitting==='true')return;
    btn.disabled=true;btn.dataset.submitting='true';btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Banning...';
    updateUser(uid,{banned:true,banReason:reason||'No reason specified'}).then(function(){closeModal();toast('User banned.','success');loadAdminUsers();}).catch(function(err){btn.disabled=false;btn.dataset.submitting='false';btn.innerHTML='<i class="fa-solid fa-gavel"></i> Ban User';errEl.textContent=err.message;errEl.classList.remove('hidden');});
    return;
  }
  if(e.target.id==='frm-change-role'){
    e.preventDefault();
    var form=e.target, errEl=document.getElementById('role-err'), btn=form.querySelector('button[type="submit"]'), uid=form.dataset.uid, role=form.role.value;
    errEl.classList.add('hidden');
    if(btn.disabled||btn.dataset.submitting==='true')return;
    btn.disabled=true;btn.dataset.submitting='true';btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
    var perms=ROLE_PERMS[role]?JSON.parse(JSON.stringify(ROLE_PERMS[role])):JSON.parse(JSON.stringify(ROLE_PERMS.user));
    updateUser(uid,{role:role,permissions:perms}).then(function(){closeModal();toast('Role updated to '+role+'.','success');loadAdminUsers();}).catch(function(err){btn.disabled=false;btn.dataset.submitting='false';btn.innerHTML='<i class="fa-solid fa-check"></i> Update Role';errEl.textContent=err.message;errEl.classList.remove('hidden');});
    return;
  }
});

/* Admin search */
document.addEventListener('input', function(e) {
  if(e.target.id==='admin-search'){
    var q=e.target.value.trim().toLowerCase();
    var rows=document.querySelectorAll('#admin-users-tbody tr');
    for(var i=0;i<rows.length;i++){
      var text=rows[i].textContent.toLowerCase();
      rows[i].style.display=text.indexOf(q)>-1?'':'none';
    }
  }
});

/* Accent color sync */
document.addEventListener('input', function(e) {
  if(e.target.id==='inp-accent')document.getElementById('inp-accent-text').value=e.target.value;
  if(e.target.id==='inp-accent-text'){var v=e.target.value;if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('inp-accent').value=v;}
});

/* ===== ROUTER ===== */
function router(){
  var path=window.location.pathname.replace(/\/+$/,'')||'/';
  var app=document.getElementById('app');
  if(!app)return;

  if(path==='/'){
    curUser().then(function(u){app.innerHTML=renderHome(u);});
    return;
  }

  if(path==='/s'){
    findByUsername('s').then(function(u){
      if(u){app.innerHTML=renderProfile(u);db.collection("users").doc(u.id).update({views:firebase.firestore.FieldValue.increment(1)}).catch(function(){});}
      else{app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><p class="text-void-100">User not found</p></div>';}
    });
    return;
  }

  if(path.indexOf('/admin')===0){
    var parts=path.split('/').filter(Boolean);
    var tab=parts[1]||'users';
    needAdmin().then(function(u){
      if(!u)return;
      app.innerHTML=renderAdmin(u,tab);
      if(tab==='users')loadAdminUsers();
    });
    return;
  }

  if(path.indexOf('/dashboard')===0){
    var parts=path.split('/').filter(Boolean);
    var tab=parts[1]||'profile';
    needAuth().then(function(u){
      if(!u)return;
      app.innerHTML=renderDashboard(u,tab);
    });
    return;
  }

  /* Profile page - MUST be last since it matches any /username */
  var username=path.slice(1);
  if(username){
    /* Exclude known routes that aren't usernames */
    var knownRoutes=['admin','dashboard','s'];
    if(knownRoutes.indexOf(username)>-1){
      app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px"><h2 class="font-display text-2xl text-void-100">Page not found</h2><a href="/" class="vl-btn vl-btn-primary"><i class="fa-solid fa-home"></i> Go Home</a></div>';
      return;
    }
    findByUsername(username).then(function(u){
      if(u){app.innerHTML=renderProfile(u);db.collection("users").doc(u.id).update({views:firebase.firestore.FieldValue.increment(1)}).catch(function(){});}
      else{app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px"><h2 class="font-display text-2xl text-void-100">User not found</h2><a href="/" class="vl-btn vl-btn-primary"><i class="fa-solid fa-home"></i> Go Home</a></div>';}
    });
    return;
  }

  app.innerHTML=renderHome(null);
}

window.addEventListener('popstate',router);

initFirebase().then(function(){
  P.init();
  router();
}).catch(function(err){
  document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center"><h2 style="color:#ff5555;font-family:Space Grotesk,sans-serif;font-size:22px;margin-bottom:12px">Connection Error</h2><p style="color:#888;font-size:13px;max-width:500px">Could not connect to the database. Please check your internet connection and try again.<br><br><code style="color:#555;font-size:11px">'+esc(err.message||err)+'</code></p></div>';
});
</script>
