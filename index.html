<style>

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.nav-bar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;backdrop-filter:blur(24px);background:rgba(10,10,15,0.75);border-bottom:1px solid rgba(34,34,53,0.5)}

.home-btns{display:flex;gap:12px;flex-wrap:wrap}

.preview-name{text-align:center;font-weight:700;font-size:17px;margin-bottom:2px}

.preview-bio{text-align:center;font-size:12px;color:var(--fg2);margin-bottom:16px;line-height:1.5}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;transition:all .3s}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px 2px 3px;border-radius:20px;font-size:10px;font-weight:600;vertical-align:middle;line-height:1.6}

.badge-tip{position:relative}.badge-tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);color:var(--fg);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:400;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}.badge-tip:hover::after{opacity:1}
.role-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

.toast{padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;backdrop-filter:blur(10px);animation:tin .3s ease;min-width:240px;display:flex;align-items:center;gap:10px;border:1px solid}
.toast-ok{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.25);color:var(--success)}

.toast-info{background:rgba(244,114,182,0.12);border-color:rgba(244,114,182,0.25);color:var(--accent)}

.modal-bg{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:mfin .2s}

/* ===== Role Hierarchy ===== */
const ROLES={user:0,moderator:1,admin:2,manager:3,owner:4};
const RC={user:'var(--fg2)',moderator:'#22c55e',admin:'#3b82f6',manager:'#a855f7',owner:'#fbbf24'};
const RB={user:'var(--accent-dim)',moderator:'rgba(34,197,94,0.12)',admin:'rgba(59,130,246,0.12)',manager:'rgba(168,85,247,0.12)',owner:'rgba(251,191,36,0.12)'};

/* ===== Known Routes (to distinguish from usernames) ===== */
const KNOWN_ROUTES = ['/', '/login', '/signup', '/dashboard', '/admin'];

function bHTML(k,showN){const b=BADGES[k];if(!b)return'';return`<span class="badge badge-tip" data-tip="${b.d}" style="background:${b.bg};color:${b.c};">${b.svg}${showN?' '+b.n:''}</span>`}
function rTag(r){return`<span class="role-tag" style="background:${RB[r]};color:${RC[r]};">${r.toUpperCase()}</span>`}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function linkIcon(u){if(!u)return'fa-solid fa-link';const l=u.toLowerCase();if(l.includes('github'))return'fa-brands fa-github';if(l.includes('twitter')||l.includes('x.com'))return'fa-brands fa-x-twitter';if(l.includes('discord'))return'fa-brands fa-discord';if(l.includes('youtube'))return'fa-brands fa-youtube';if(l.includes('twitch'))return'fa-brands fa-twitch';if(l.includes('spotify'))return'fa-brands fa-spotify';if(l.includes('instagram'))return'fa-brands fa-instagram';if(l.includes('tiktok'))return'fa-brands fa-tiktok';if(l.includes('reddit'))return'fa-brands fa-reddit';if(l.includes('steam'))return'fa-brands fa-steam';if(l.includes('telegram'))return'fa-brands fa-telegram';if(l.includes('linkedin'))return'fa-brands fa-linkedin';if(l.includes('paypal'))return'fa-brands fa-paypal';if(l.includes('ko-fi'))return'fa-solid fa-mug-hot';return'fa-solid fa-arrow-up-right-from-square'}

/* ===== Firestore Data Layer ===== */
const D={
  async getU(uid){try{const doc=await db.collection('users').doc(uid).get();return doc.exists?doc.data():null}catch(e){console.error('getU error:',e);return null}},
  async getUN(un){try{const snap=await db.collection('users').where('username','==',un).limit(1).get();if(snap.empty)return null;return snap.docs[0].data()}catch(e){console.error('getUN error:',e);return null}},
  async createU(uid,data){const userData={uid,displayName:data.displayName||'',username:data.username||'',bio:'',avatar:'',links:[],badges:[],role:'user',banned:false,createdAt:Date.now(),views:0,themeColor:'#f472b6'};await db.collection('users').doc(uid).set(userData);return userData},
  async updateU(uid,data){await db.collection('users').doc(uid).update(data);const u=await this.getU(uid);return u},
  async delU(uid){await db.collection('users').doc(uid).delete()},
  async allU(){try{const snap=await db.collection('users').get();return snap.docs.map(d=>d.data())}catch(e){console.error('allU error:',e);return[]}},
  async incV(un){try{const snap=await db.collection('users').where('username','==',un).limit(1).get();if(!snap.empty){const ref=snap.docs[0].ref;await db.runTransaction(async tx=>{const doc=await tx.get(ref);if(doc.exists){tx.update(ref,{views:(doc.data().views||0)+1})}})}}catch(e){console.error('incV error:',e)}}
};

let CU = null;

/* ===== Toast Notifications ===== */
function toast(m,t='info'){const c=document.getElementById('toast-box'),e=document.createElement('div');const ic={ok:'fa-check-circle',err:'fa-times-circle',info:'fa-info-circle'};e.className=`toast toast-${t}`;e.innerHTML=`<i class="fa-solid ${ic[t]||ic.info}"></i><span>${m}</span>`;c.appendChild(e);setTimeout(()=>{e.style.animation='tout .3s ease forwards';setTimeout(()=>e.remove(),300)},3000)}

/* ===== Modal ===== */
function showModal(title,html,acts){document.getElementById('modal-box').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h3 class="font-display" style="font-size:17px;font-weight:700">${title}</h3><button onclick="closeModal()" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;transition:background .2s" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background='none'"><i class="fa-solid fa-xmark"></i></button></div><div>${html}</div>${acts&&acts.length?`<div style="display:flex;gap:10px;margin-top:22px;justify-content:flex-end">${acts.map(a=>`<button class="${a.c||'btn-sec'}" onclick="${a.a}">${a.l}</button>`).join('')}</div>`:''}</div></div>`}
function closeModal(){document.getElementById('modal-box').innerHTML=''}

/* ===== Authentication ===== */
async function doSignup(email,pw,name,un){
  if(await D.getUN(un)){toast('Username already taken','err');return}
  try{
    const cr=await auth.createUserWithEmailAndPassword(email,pw);
    await D.createU(cr.user.uid,{displayName:name,username:un});
    CU=await D.getU(cr.user.uid);
    toast('Account created successfully!','ok');
    nav('/dashboard');
  }catch(e){toast(e.message,'err')}
}

async function doLogin(email,pw){
  try{
    const cr=await auth.signInWithEmailAndPassword(email,pw);
    const u=await D.getU(cr.user.uid);
    if(u&&u.banned){auth.signOut();toast('This account has been banned','err');return}
    CU=u;
    toast('Welcome back!','ok');
    nav('/dashboard');
  }catch(e){toast(e.message,'err')}
}

async function doLogout(){
  try{await auth.signOut()}catch(e){}
  CU=null;
  toast('Logged out','info');
  nav('/');
}

async function restoreSess(){
  return new Promise((resolve)=>{
    const unsub=auth.onAuthStateChanged(async user=>{
      unsub();
      if(user){
        CU=await D.getU(user.uid);
        if(CU&&CU.banned){await auth.signOut();CU=null}
      }
      resolve();
    });
  });
}

/* ===== Router ===== */
function nav(p){window.location.hash=p}
function getP(){return window.location.hash.slice(1)||'/'}

async function router(){
  const p=getP();
  updateNav();
  const a=document.getElementById('app');

  /* Check known routes first */
  if(p==='/'){a.innerHTML=pgHome()}
  else if(p==='/login'){a.innerHTML=pgLogin()}
  else if(p==='/signup'){a.innerHTML=pgSignup()}
  else if(p==='/dashboard'){
    if(!CU){nav('/login');return}
    a.innerHTML=pgDash();initDash();
  }
  else if(p==='/admin'){
    if(!CU||ROLES[CU.role]<ROLES.moderator){toast('Access denied','err');nav('/');return}
    a.innerHTML=pgAdmin();await renderAC();
  }
  else{
    /* Treat everything else as a username — seashell.lol/username */
    const username=p.startsWith('/')?p.slice(1):p;
    if(username){await pgBio(username)}
    else{a.innerHTML=pg404()}
  }
  window.scrollTo(0,0);
}

function updateNav(){
  const e=document.getElementById('navAuth');
  if(CU){
    let ab='';
    if(ROLES[CU.role]>=ROLES.moderator)ab=`<a href="#/admin" class="nl nl-hide" style="font-size:13px;color:var(--fg2);text-decoration:none">Admin</a>`;
    e.innerHTML=`${ab}<a href="#/dashboard" class="nl" style="font-size:13px;color:var(--accent);text-decoration:none;font-weight:500">Dashboard</a><a href="#/login" class="nl" style="font-size:13px;color:var(--fg2);text-decoration:none" onclick="event.preventDefault();doLogout()">Logout</a><a href="#/signup" class="btn-signup" style="margin-left:4px">Sign Up Free</a>`;
  }else{
    e.innerHTML=`<a href="#/login" class="nl" style="font-size:13px;color:var(--fg2);text-decoration:none">Login</a><a href="#/signup" class="btn-signup" style="margin-left:4px">Sign Up Free</a>`;
  }
}

  const t=document.getElementById('lT').value.trim(),u=document.getElementById('lU').value.trim();
  if(!t||!u){toast('Please fill in all fields','err');return}
  const ls=[...CU.links];
  if(idx>=0)ls[idx]={title:t,url:u};else ls.push({title:t,url:u});
  await D.updateU(CU.uid,{links:ls});
  CU=await D.getU(CU.uid);
  closeModal();toast(idx>=0?'Link updated':'Link added','ok');router();
}
function editLink(i){addLinkM(i)}
async function rmLink(i){const ls=CU.links.filter((_,x)=>x!==i);await D.updateU(CU.uid,{links:ls});CU=await D.getU(CU.uid);toast('Link removed','ok');router()}

/* ===== Bio Profile Page ===== */
async function pgBio(un){
  const a=document.getElementById('app');
  await D.incV(un);
  const u=await D.getUN(un);
  if(!u||u.banned){
    a.innerHTML=`<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center"><div style="text-align:center"><i class="fa-solid fa-ghost" style="font-size:44px;color:var(--muted);margin-bottom:14px"></i><h2 class="font-display" style="font-size:20px;font-weight:700">User not found</h2><p style="color:var(--muted);margin-top:6px;font-size:14px">This profile doesn't exist or has been removed.</p><a href="#/" class="btn-pri" style="margin-top:18px;display:inline-flex">Go Home</a></div></div>`;
    return;
  }
  const tc=u.themeColor||'#f472b6';
  const bH=u.badges.map(b=>bHTML(b)).join(' ');
  const lH=u.links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener" class="bio-link" style="--accent:${tc}"><i class="${linkIcon(l.url)}" style="color:${tc}"></i><span style="flex:1;font-size:13px;font-weight:500">${esc(l.title)}</span><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;color:var(--muted)"></i></a>`).join('');

  a.innerHTML=`<div class="bio-wrap" style="--accent:${tc}"><div class="bio-bg"><div style="position:absolute;inset:0;background:var(--bg)"></div><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 15%,${tc}12 0%,transparent 55%)"></div><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 75%,${tc}06 0%,transparent 45%)"></div><canvas id="bpC" style="position:absolute;inset:0;z-index:0"></canvas></div><div class="bio-card" style="position:relative;z-index:2"><div style="display:flex;flex-direction:column;align-items:center;text-align:center"><div class="bio-avatar-ring">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid var(--bg)">`:`<div style="width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);background:linear-gradient(135deg,${tc},#c084fc);display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:700;font-size:38px;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div style="margin-top:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center"><h1 class="font-display" style="font-size:22px;font-weight:800">${esc(u.displayName||u.username)}</h1>${bH}</div><p style="color:var(--accent);font-size:12px;margin-top:3px">@${esc(u.username)}</p>${u.bio?`<p style="color:var(--fg2);font-size:13px;line-height:1.6;margin-top:10px;max-width:360px">${esc(u.bio)}</p>`:''}<div style="width:44px;height:1.5px;background:linear-gradient(90deg,transparent,${tc},transparent);margin:22px 0;border-radius:2px"></div>${lH?`<div style="width:100%;display:flex;flex-direction:column;gap:9px">${lH}</div>`:'<p style="color:var(--muted);font-size:12px;margin-top:6px">No links yet.</p>'}<div style="margin-top:24px;display:flex;align-items:center;gap:5px;color:var(--muted);font-size:11px"><i class="fa-solid fa-eye" style="font-size:10px"></i> ${u.views||0} views<span style="margin:0 7px">·</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2C8 2 4 6 4 10c0 4 3 7 5 9 1 1 2 2 3 3 1-1 2-2 3-3 2-2 5-5 5-9 0-4-4-8-8-8z" fill="${tc}30" stroke="${tc}" stroke-width="1.5"/></svg>seashell.lol</div></div></div></div>`;
  initBP(tc);
}

function initBP(c){
  const cv=document.getElementById('bpC');if(!cv)return;
  const ctx=cv.getContext('2d');let w,h,ps=[];
  function rs(){w=cv.width=cv.parentElement.offsetWidth;h=cv.height=cv.parentElement.offsetHeight}rs();
  window.addEventListener('resize',rs);
  for(let i=0;i<45;i++)ps.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8+.4,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,o:Math.random()*.35+.08});
  function dr(){ctx.clearRect(0,0,w,h);ps.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.4,p.r),0,Math.PI*2);ctx.fillStyle=c;ctx.globalAlpha=p.o;ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(dr)}dr();
}

/* ===== Admin Panel ===== */
let aTab='users',aSearch='';

function pgAdmin(){
  return`<div class="admin-side"><div style="padding:0 18px 16px;border-bottom:1px solid var(--border);margin-bottom:8px"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Admin Panel</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">${rTag(CU.role)} ${esc(CU.displayName)}</div></div><div class="admin-nav ${aTab==='users'?'on':''}" onclick="sAT('users')"><i class="fa-solid fa-users" style="width:16px;font-size:13px"></i>Users</div><div class="admin-nav ${aTab==='badges-mgmt'?'on':''}" onclick="sAT('badges-mgmt')"><i class="fa-solid fa-award" style="width:16px;font-size:13px"></i>Badge Manager</div><div class="admin-nav ${aTab==='roles'?'on':''}" onclick="sAT('roles')"><i class="fa-solid fa-shield-halved" style="width:16px;font-size:13px"></i>Roles</div><div class="admin-nav ${aTab==='stats'?'on':''}" onclick="sAT('stats')"><i class="fa-solid fa-chart-bar" style="width:16px;font-size:13px"></i>Statistics</div></div><div class="admin-body" id="aC"></div>`;
}

async function sAT(t){aTab=t;document.querySelectorAll('.admin-nav').forEach(n=>n.classList.remove('on'));document.querySelector(`.admin-nav[onclick*="'${t}'"]`)?.classList.add('on');await renderAC()}

async function renderAC(){
  const el=document.getElementById('aC');if(!el)return;

  if(aTab==='users'){
    let us=await D.allU();
    if(aSearch){const q=aSearch.toLowerCase();us=us.filter(u=>(u.displayName||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q)||u.uid.toLowerCase().includes(q))}
    us.sort((a,b)=>(ROLES[b.role]||0)-(ROLES[a.role]||0));
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px"><h2 class="font-display" style="font-size:20px;font-weight:700">User Management</h2><div style="display:flex;gap:9px;align-items:center"><input id="aS" class="input-field" type="text" placeholder="Search users..." style="width:220px" value="${esc(aSearch)}" oninput="aSearch=this.value;renderAC()"><span style="font-size:12px;color:var(--muted)">${us.length} users</span></div></div><div style="overflow-x:auto;border:1px solid var(--border);border-radius:11px"><table class="user-tbl"><thead><tr><th>User</th><th>Username</th><th>Role</th><th>Badges</th><th>Views</th><th>Status</th><th>Actions</th></tr></thead><tbody>${us.map(u=>`<tr><td><div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--border)">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg)">${(u.displayName||'?')[0].toUpperCase()}</div>`}</div><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px" title="${esc(u.displayName||'')}">${esc(u.displayName||'Unnamed')}</div></div></td><td style="color:var(--accent);font-size:11px">@${esc(u.username||'—')}</td><td>${rTag(u.role)}</td><td style="max-width:100px">${u.badges&&u.badges.length?u.badges.slice(0,2).map(b=>bHTML(b)).join(' ')+(u.badges.length>2?`<span style="font-size:10px;color:var(--muted)">+${u.badges.length-2}</span>`:''):'<span style="color:var(--muted);font-size:11px">None</span>'}</td><td style="font-size:12px">${u.views||0}</td><td>${u.banned?'<span style="color:var(--danger);font-size:11px;font-weight:600">BANNED</span>':'<span style="color:var(--success);font-size:11px">Active</span>'}</td><td><button onclick="adminUA('${u.uid}')" class="btn-sec btn-sm" style="padding:4px 10px;font-size:10px">Manage</button></td></tr>`).join('')}</tbody></table></div>`;
  }

  else if(aTab==='badges-mgmt'){
    const ab=Object.entries(BADGES);
    el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:6px">Badge Manager</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">All available badges. Assign them through User Management.</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${ab.map(([k,b])=>`<div class="card" style="padding:16px;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:10px;background:${b.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="width:26px;height:26px;display:flex">${b.svg}</span></div><div><div style="font-weight:600;font-size:13px">${b.n}</div><div style="font-size:11px;color:var(--fg2)">${b.d}</div><div style="font-size:10px;color:var(--muted);margin-top:1px">ID: ${k}</div></div></div>`).join('')}</div>`;
  }

  else if(aTab==='roles'){
    const ri=[{r:'owner',l:4,d:'Full access to everything. Can manage all users including other Owners.',c:RC.owner},{r:'manager',l:3,d:'Can manage Admins, Moderators, and Users. Cannot edit Owners.',c:RC.manager},{r:'admin',l:2,d:'Can manage Moderators and Users. Cannot edit Managers or Owners.',c:RC.admin},{r:'moderator',l:1,d:'Can manage regular Users only. Cannot edit any staff members.',c:RC.moderator},{r:'user',l:0,d:'Default role. No admin privileges.',c:RC.user}];
    el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:6px">Role Hierarchy</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">Higher roles can manage all roles below them. Lower roles cannot edit higher roles.</p><div style="display:flex;flex-direction:column;gap:10px;max-width:560px">${ri.map(x=>`<div class="card" style="padding:16px;display:flex;align-items:flex-start;gap:14px;border-left:3px solid ${x.c}"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">${rTag(x.r)}<span style="font-size:10px;color:var(--muted)">Level ${x.l}</span></div><p style="font-size:12px;color:var(--fg2);line-height:1.5">${x.d}</p></div></div>`).join('')}</div>`;
  }

  else if(aTab==='stats'){
    const us=await D.allU();
    const tv=us.reduce((s,u)=>s+(u.views||0),0);
    const tl=us.reduce((s,u)=>s+(u.links||[]).length,0);
    const rc={};us.forEach(u=>{rc[u.role]=(rc[u.role]||0)+1});
    const bc={};us.forEach(u=>(u.badges||[]).forEach(b=>{bc[b]=(bc[b]||0)+1}));
    el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:20px">Statistics</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:26px"><div class="card" style="text-align:center"><div class="font-display" style="font-size:28px;font-weight:800;color:var(--accent)">${us.length}</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">Total Users</div></div><div class="card" style="text-align:center"><div class="font-display" style="font-size:28px;font-weight:800;color:var(--accent)">${tv}</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">Total Views</div></div><div class="card" style="text-align:center"><div class="font-display" style="font-size:28px;font-weight:800;color:var(--accent)">${tl}</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">Total Links</div></div><div class="card" style="text-align:center"><div class="font-display" style="font-size:28px;font-weight:800;color:var(--accent)">${Object.keys(BADGES).length}</div><div style="font-size:12px;color:var(--fg2);margin-top:3px">Badge Types</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><h3 class="font-display" style="font-size:14px;font-weight:600;margin-bottom:14px">Users by Role</h3>${Object.entries(rc).sort((a,b)=>ROLES[b[0]]-ROLES[a[0]]).map(([r,c])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:7px">${rTag(r)}</div><span style="font-size:13px;font-weight:600">${c}</span></div>`).join('')}</div><div class="card"><h3 class="font-display" style="font-size:14px;font-weight:600;margin-bottom:14px">Badge Distribution</h3>${Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([b,c])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:7px">${bHTML(b)}</div><span style="font-size:13px;font-weight:600">${c}</span></div>`).join('')||'<p style="color:var(--muted);font-size:12px">No badges assigned yet.</p>'}</div></div>`;
  }
}

/* ===== Admin User Actions ===== */
async function adminUA(uid){
  const t=await D.getU(uid);if(!t){toast('User not found','err');return}
  const canE=ROLES[CU.role]>ROLES[t.role];
  const isS=CU.uid===uid;
  const aks=Object.keys(BADGES);
  const ubH=aks.map(k=>{const h=(t.badges||[]).includes(k);const b=BADGES[k];return`<label style="display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;cursor:pointer;transition:background .2s;${h?'background:'+b.bg:''}" onmouseover="this.style.background=this.style.background||'var(--card2)'" onmouseout="this.style.background='${h?b.bg:'transparent'}'"><input type="checkbox" value="${k}" ${h?'checked':''} style="accent-color:var(--accent)"><span style="width:18px;height:18px;display:flex">${b.svg}</span><span style="font-size:12px">${b.n}</span></label>`}).join('');
  const rO=Object.keys(ROLES).map(r=>`<option value="${r}" ${t.role===r?'selected':''} ${!canE&&ROLES[r]>ROLES[CU.role]?'disabled':''}>${r.charAt(0).toUpperCase()+r.slice(1)}${!canE&&ROLES[r]>ROLES[CU.role]?' (no permission)':''}</option>`).join('');

  showModal(`Manage @${t.username}`,`${!canE&&!isS?`<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.18);border-radius:9px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--danger)"><i class="fa-solid fa-triangle-exclamation" style="margin-right:5px"></i>You cannot modify this user — their role is higher than or equal to yours.</div>`:''}<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px;background:var(--bg2);border-radius:10px"><div style="width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0">${t.avatar?`<img src="${t.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:16px">${(t.displayName||'?')[0].toUpperCase()}</div>`}</div><div><div style="font-weight:600;font-size:14px">${esc(t.displayName||'Unnamed')}</div><div style="font-size:11px;color:var(--accent)">@${esc(t.username)} · ${rTag(t.role)}</div><div style="font-size:10px;color:var(--muted);margin-top:1px">UID: ${t.uid.substring(0,18)}...</div></div></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Username</label><div style="display:flex;gap:7px"><input id="aNU" class="input-field" type="text" placeholder="New username" value="${esc(t.username)}" style="flex:1"><button class="btn-sec btn-sm" onclick="aCU('${uid}')" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}>Update</button></div></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Role</label><select id="aNR" class="input-field" ${!canE?'disabled style="opacity:.35"':''}>${rO}</select></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Manage Badges</label><div id="aBL" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;max-height:220px;overflow-y:auto;padding:3px">${ubH}</div></div><div style="border-top:1px solid var(--border);padding-top:18px"><label style="font-size:11px;font-weight:600;color:var(--danger);display:block;margin-bottom:9px">Danger Zone</label><div style="display:flex;gap:9px;flex-wrap:wrap"><button class="btn-dan" onclick="aTB('${uid}',${!t.banned})" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-${t.banned?'unlock':'ban'}" style="margin-right:3px"></i>${t.banned?'Unban':'Ban'} User</button><button class="btn-dan" onclick="aCD('${uid}','${esc(t.displayName||t.username)}')" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-trash" style="margin-right:3px"></i>Delete Account</button></div></div>`,[{l:'Cancel',c:'btn-sec',a:'closeModal()'},{l:'Save Changes',c:'btn-pri',a:`aSU('${uid}')`,id:'aSB'}]);
  if(!canE){const b=document.getElementById('aSB');if(b){b.disabled=true;b.style.opacity='.35';b.style.cursor='not-allowed'}}
}

async function aSU(uid){
  const t=await D.getU(uid);if(!t||ROLES[CU.role]<=ROLES[t.role]){toast('Permission denied','err');return}
  const nr=document.getElementById('aNR').value;
  if(ROLES[nr]>ROLES[CU.role]){toast('Cannot assign a role higher than your own','err');return}
  const cbs=document.querySelectorAll('#aBL input[type="checkbox"]:checked');
  const nb=Array.from(cbs).map(c=>c.value);
  await D.updateU(uid,{role:nr,badges:nb});
  toast('User updated successfully','ok');closeModal();await renderAC();
}

async function aCU(uid){
  const t=await D.getU(uid);if(!t||ROLES[CU.role]<=ROLES[t.role]){toast('Permission denied','err');return}
  const nu=document.getElementById('aNU').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!nu||nu.length<3){toast('Username must be at least 3 characters','err');return}
  const existing=await D.getUN(nu);
  if(existing&&existing.uid!==uid){toast('Username already taken','err');return}
  await D.updateU(uid,{username:nu});
  toast('Username changed to @'+nu,'ok');closeModal();await renderAC();
}

async function aTB(uid,ban){
  const t=await D.getU(uid);if(!t||ROLES[CU.role]<=ROLES[t.role]){toast('Permission denied','err');return}
  await D.updateU(uid,{banned:ban});
  toast(ban?'User has been banned':'User has been unbanned',ban?'err':'ok');
  if(ban&&CU.uid===uid){doLogout();return}
  closeModal();await renderAC();
}

function aCD(uid,name){
  showModal('Confirm Deletion',`<div style="text-align:center;padding:8px 0"><i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:var(--danger);margin-bottom:14px"></i><p style="font-size:14px;margin-bottom:6px">Are you sure you want to delete <strong>${name}</strong>'s account?</p><p style="font-size:12px;color:var(--muted)">This action cannot be undone.</p></div>`,[{l:'Cancel',c:'btn-sec',a:'closeModal()'},{l:'Delete Forever',c:'btn-dan',a:`aDU('${uid}')`}]);
}

async function aDU(uid){
  const t=await D.getU(uid);if(!t||ROLES[CU.role]<=ROLES[t.role]){toast('Permission denied','err');return}
  await D.delU(uid);
  toast('Account has been deleted','err');
  if(uid===CU.uid){doLogout();return}
  closeModal();await renderAC();
}

function pg404(){return`<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center"><div style="text-align:center"><div class="font-display" style="font-size:88px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">404</div><p style="color:var(--fg2);font-size:15px;margin-top:6px">Page not found</p><a href="#/" class="btn-pri" style="margin-top:18px;display:inline-flex">Go Home</a></div></div>`}

/* ===== Bootstrap ===== */
(async function(){
  try{
    await restoreSess();
  }catch(e){
    console.error('Session restore error:',e);
    CU=null;
  }
  /* Hide loading screen */
  const ls=document.getElementById('loadScreen');
  if(ls){ls.classList.add('done');setTimeout(()=>ls.remove(),500)}
  router();
  window.addEventListener('hashchange',router);
})();
</script>
