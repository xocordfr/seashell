var ROLE_PERMS={user:{admin_panel:false,manage_users:false,manage_badges:false,change_uid:false,ban_users:false,delete_users:false,bypass_link_limit:false,bypass_ban:false},moderator:{admin_panel:true,manage_users:false,manage_badges:true,change_uid:false,ban_users:true,delete_users:false,bypass_link_limit:false,bypass_ban:true},admin:{admin_panel:true,manage_users:true,manage_badges:true,change_uid:true,ban_users:true,delete_users:true,bypass_link_limit:true,bypass_ban:true}};

var userCache={};var allUsersCache=null;var cacheValid=false;

function snapToUser(doc){if(!doc.exists)return null;var d=doc.data();return{id:doc.id,uid:d.uid||'',username:d.username||'',displayName:d.displayName||'',email:d.email||'',bio:d.bio||'',avatar:d.avatar||'',bgImage:d.bgImage||'',background:d.background||'void',accentColor:d.accentColor||'#7dd3fc',links:d.links||[],badges:d.badges||[],banned:d.banned||false,banReason:d.banReason||'',role:d.role||'user',permissions:d.permissions||null,createdAt:d.createdAt||Date.now(),views:d.views||0,password:d.password||''};}
function getAllUsers(){if(allUsersCache&&cacheValid)return Promise.resolve(allUsersCache);return db.collection("users").get().then(function(s){allUsersCache=[];s.forEach(function(d){var u=snapToUser(d);if(u)allUsersCache.push(u);});cacheValid=true;return allUsersCache;});}
function invalidateCache(){cacheValid=false;allUsersCache=null;}
function findByUsername(un){invalidateCache();return db.collection("users").where("username","==",un).limit(1).get().then(function(s){return s.empty?null:snapToUser(s.docs[0]);});}
function findByEmail(em){invalidateCache();return db.collection("users").where("email","==",em).limit(1).get().then(function(s){return s.empty?null:snapToUser(s.docs[0]);});}
function findByUID(uid){return db.collection("users").where("uid","==",uid).limit(1).get().then(function(s){return s.empty?null:snapToUser(s.docs[0]);});}
function findById(id){if(userCache[id])return Promise.resolve(userCache[id]);return db.collection("users").doc(id).get().then(function(s){if(!s.exists)return null;var u=snapToUser(s);if(u)userCache[u.id]=u;return u;});}
function getNextUID(){return db.collection("_meta").doc("counters").get().then(function(d){var c=0;if(d.exists&&typeof d.data().uidCounter==='number')c=d.data().uidCounter;c++;return db.collection("_meta").doc("counters").set({uidCounter:c},{merge:true}).then(function(){return '#'+c;});});}
function createUser(data){return getNextUID().then(function(uid){var perms=ROLE_PERMS[data.role||'user']?JSON.parse(JSON.stringify(ROLE_PERMS[data.role||'user'])):JSON.parse(JSON.stringify(ROLE_PERMS.user));var u={uid:uid,username:data.username,displayName:data.displayName||data.username,email:data.email,password:hashPw(data.password),bio:'',avatar:'',bgImage:'',background:'void',accentColor:'#7dd3fc',links:[],badges:[],banned:false,banReason:'',role:data.role||'user',permissions:perms,createdAt:Date.now(),views:0};return db.collection("users").add(u).then(function(ref){u.id=ref.id;userCache[u.id]=u;invalidateCache();return u;});});}

function deleteUser(id){delete userCache[id];invalidateCache();return db.collection("users").doc(id).delete();}

function hasPerm(u,p){if(!u)return false;if(u.permissions&&typeof u.permissions[p]==='boolean')return u.permissions[p];var rp=ROLE_PERMS[u.role];return rp?!!rp[p]:false;}
function curUser(){var s=getSession();if(!s)return Promise.resolve(null);if(userCache[s.userId])return Promise.resolve(userCache[s.userId]);return findById(s.userId);}
function needAuth(){var s=getSession();if(!s){location.hash='#home';showModal(loginHTML());return Promise.resolve(null);}return findById(s.userId).then(function(u){if(!u){clearSession();location.hash='#home';showModal(loginHTML());return null;}if(u.banned&&!hasPerm(u,'bypass_ban')){clearSession();location.hash='#home';toast('Account banned.','error');return null;}return u;});}

// ==================== ROUTING ====================
function router(){
  var hash=location.hash||'#home';
  var parts=hash.replace('#','').split('/');
  var route=parts[0];
  var param=parts.slice(1).join('/');
  
  var app=document.getElementById('app');
  
  if(route==='home'){
    curUser().then(function(u){
      app.innerHTML=renderHome(u);
      bindHomeEvents();
      P.init();
    });
  } else if(route==='u'){
    if(!param){location.hash='#home';return;}
    findByUsername(param).then(function(u){
      if(!u){app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center"><h2 style="color:#ff5555;font-family:Space Grotesk,sans-serif;font-size:22px;margin-bottom:12px">User Not Found</h2><p style="color:#888;font-size:13px">@'+esc(param)+' does not exist.</p><a href="#home" class="vl-btn vl-btn-secondary mt-6 inline-flex"><i class="fa-solid fa-arrow-left"></i> Go Home</a></div>';return;}
      app.innerHTML=renderProfile(u);
      updateUser(u.id,{views:firebase.firestore.FieldValue.increment(1)});
    });
  } else if(route==='dashboard'){
    needAuth().then(function(u){
      if(!u)return;
      app.innerHTML=renderDashboard(u,param);
      bindDashEvents(u);
      P.init();
    });
  } else if(route==='admin'){
    needAdmin().then(function(u){
      if(!u)return;
      if(param==='roles'){
        getAllUsers().then(function(users){
          app.innerHTML=renderRolesPage(u,users);
          bindAdminEvents(u);
          P.init();
        });
      } else {
        getAllUsers().then(function(users){
          app.innerHTML=renderAdminTable(u,users);
          bindAdminEvents(u);
          P.init();
        });
      }
    });
  } else {
    location.hash='#home';
  }
}

// ==================== EVENT BINDINGS ====================
function bindHomeEvents(){
  document.addEventListener('click',function handler(e){
    var t=e.target.closest('.open-login');
    if(t){e.preventDefault();showModal(loginHTML());bindLoginEvents();return;}
    var t2=e.target.closest('.open-signup');
    if(t2){e.preventDefault();showModal(signupHTML());bindSignupEvents();return;}
  });
}

function bindLoginEvents(){
  setTimeout(function(){
    var form=document.getElementById('frm-login');
    if(!form)return;
    form.addEventListener('submit',function(e){
      e.preventDefault();
      var fd=new FormData(form);
      var loginId=fd.get('loginId').trim();
      var pw=fd.get('password');
      var err=document.getElementById('login-err');
      
      if(!loginId||!pw){if(err){err.textContent='All fields required.';err.classList.remove('hidden');}return;}
      
      var prom=loginId.indexOf('@')>-1?findByEmail(loginId):findByUsername(loginId);
      prom.then(function(u){
        if(!u){if(err){err.textContent='Account not found.';err.classList.remove('hidden');}return;}
        if(u.password!==hashPw(pw)){if(err){err.textContent='Wrong password.';err.classList.remove('hidden');}return;}
        if(u.banned&&!hasPerm(u,'bypass_ban')){if(err){err.textContent='Account banned: '+(u.banReason||'No reason given');err.classList.remove('hidden');}return;}
        setSession(u.id);
        closeModal();
        toast('Welcome back!','success');
        router();
      }).catch(function(ex){if(err){err.textContent='Login error: '+ex.message;err.classList.remove('hidden');}});
    });
    
    var su=document.querySelector('.open-signup');
    if(su)su.addEventListener('click',function(e){e.preventDefault();closeModal();showModal(signupHTML());bindSignupEvents();});
  },100);
}

function bindSignupEvents(){
  setTimeout(function(){
    var form=document.getElementById('frm-signup');
    if(!form)return;
    form.addEventListener('submit',function(e){
      e.preventDefault();
      var fd=new FormData(form);
      var username=fd.get('username').trim().toLowerCase();
      var displayName=fd.get('displayName').trim()||username;
      var email=fd.get('email').trim().toLowerCase();
      var pw=fd.get('password');
      var err=document.getElementById('signup-err');
      
      if(!/^[a-z0-9_]{3,20}$/.test(username)){if(err){err.textContent='Username: 3-20 chars, letters/numbers/_ only.';err.classList.remove('hidden');}return;}
      if(!email||!/\S+@\S+\.\S+/.test(email)){if(err){err.textContent='Invalid email.';err.classList.remove('hidden');}return;}
      if(pw.length<6){if(err){err.textContent='Password must be 6+ chars.';err.classList.remove('hidden');}return;}
      
      findByUsername(username).then(function(exists){
        if(exists){if(err){err.textContent='Username taken.';err.classList.remove('hidden');}return;}
        return findByEmail(email);
      }).then(function(exists){
        if(exists){if(err){err.textContent='Email already registered.';err.classList.remove('hidden');}return;}
        return createUser({username:username,displayName:displayName,email:email,password:pw});
      }).then(function(u){
        if(!u)return;
        setSession(u.id);
        closeModal();
        toast('Account created!','success');
        router();
      }).catch(function(ex){if(err){err.textContent='Signup error: '+ex.message;err.classList.remove('hidden');}});
    });
    
    var li=document.querySelector('.open-login');
    if(li)li.addEventListener('click',function(e){e.preventDefault();closeModal();showModal(loginHTML());bindLoginEvents();});
  },100);
}

function bindDashEvents(user){
  setTimeout(function(){
    var pf=document.getElementById('frm-profile');
    if(pf){
      pf.addEventListener('submit',function(e){
        e.preventDefault();
        var fd=new FormData(pf);
        var username=fd.get('username').trim().toLowerCase();
        var displayName=fd.get('displayName').trim();
        var bio=fd.get('bio').trim();
        var avatar=fd.get('avatar').trim();
        
        if(!/^[a-z0-9_]{3,20}$/.test(username)){toast('Invalid username format.','error');return;}
        
        if(username!==user.username){
          findByUsername(username).then(function(exists){
            if(exists&&exists.id!==user.id){toast('Username taken.','error');return;}
            updateUser(user.id,{username:username,displayName:displayName,bio:bio,avatar:avatar}).then(function(){toast('Profile updated!','success');router();}).catch(function(ex){toast('Update error: '+ex.message,'error');});
          });
        } else {
          updateUser(user.id,{displayName:displayName,bio:bio,avatar:avatar}).then(function(){toast('Profile updated!','success');router();}).catch(function(ex){toast('Update error: '+ex.message,'error');});
        }
      });
    }
    
    var pwf=document.getElementById('frm-pw');
    if(pwf){
      pwf.addEventListener('submit',function(e){
        e.preventDefault();
        var fd=new FormData(pwf);
        var curPw=fd.get('curPw');
        var newPw=fd.get('newPw');
        
        if(user.password!==hashPw(curPw)){toast('Current password incorrect.','error');return;}
        if(newPw.length<6){toast('New password must be 6+ chars.','error');return;}
        
        updateUser(user.id,{password:hashPw(newPw)}).then(function(){toast('Password updated!','success');pwf.reset();}).catch(function(ex){toast('Error: '+ex.message,'error');});
      });
    }
    
    var lo=document.querySelector('.do-logout');
    if(lo)lo.addEventListener('click',function(){clearSession();toast('Logged out.','info');router();});
    
    var da=document.querySelector('.do-del-acct');
    if(da){
      da.addEventListener('click',function(){
        showModal('<h3 class="font-display font-bold text-xl mb-1">Delete Account?</h3><p class="text-void-100 text-sm mb-6">This action cannot be undone. All your data will be permanently deleted.</p><div class="flex gap-3"><button class="vl-btn vl-btn-danger flex-1 modal-confirm-del" data-action="delete-account"><i class="fa-solid fa-trash"></i> Delete Forever</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>');

        setTimeout(function(){
          var fl=document.getElementById('frm-add-link');
          if(fl){
            fl.addEventListener('submit',function(e){
              e.preventDefault();
              var fd=new FormData(fl);
              var links=user.links||[];
              var maxLinks=hasPerm(user,'bypass_link_limit')?999:10;
              if(links.length>=maxLinks){toast('Link limit reached ('+maxLinks+').','error');return;}
              links.push({id:newId,title:fd.get('title').trim(),url:fd.get('url').trim()});
              updateUser(user.id,{links:links}).then(function(){closeModal();toast('Link added!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
            });
          }
        },100);
      });
    }
    
    document.querySelectorAll('.do-set-bg').forEach(function(btn){
      btn.addEventListener('click',function(){
        var bg=btn.getAttribute('data-bg');
        updateUser(user.id,{background:bg}).then(function(){toast('Background updated!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
      });
    });
    
    var sa=document.querySelector('.do-save-app');
    if(sa){
      sa.addEventListener('click',function(){
        var bgImg=document.getElementById('inp-bgimg').value.trim();
        var accent=document.getElementById('inp-accent').value;
        updateUser(user.id,{bgImage:bgImg,accentColor:accent}).then(function(){toast('Appearance saved!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
      });
    }
    
  },100);
}

function bindAdminEvents(admin){
  setTimeout(function(){
    var search=document.getElementById('admin-search');
    if(search){
      search.addEventListener('input',function(){
        var q=search.value.toLowerCase();
        document.querySelectorAll('#adm-tbl tbody tr, #roles-tbl tbody tr').forEach(function(r){
          var s=(r.getAttribute('data-search')||'').toLowerCase();
          r.style.display=s.indexOf(q)>-1?'':'none';
        });
      });
    }
  },100);
}

document.addEventListener('click',function(e){
  
  if(e.target.closest('.modal-cancel')){
    e.preventDefault();
    e.stopPropagation();
    closeModal();
    return;
  }
  
  var delAcct=e.target.closest('.modal-confirm-del[data-action="delete-account"]');
  if(delAcct){
    e.preventDefault();
    e.stopPropagation();
    var s=getSession();
    if(s){
      deleteUser(s.userId).then(function(){clearSession();closeModal();toast('Account deleted.','info');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    }
    return;
  }
  
  var editLink=e.target.closest('.do-edit-link');
  if(editLink){
    e.preventDefault();
    e.stopPropagation();
    var lid=editLink.getAttribute('data-lid');
    curUser().then(function(user){
      if(!user)return;
      var links=user.links||[];
      var link=links.find(function(l){return l.id===lid;});
      if(!link){toast('Link not found.','error');return;}
      showModal('<h3 class="font-display font-bold text-xl mb-1">Edit Link</h3><p class="text-void-100 text-sm mb-6">Modify this link</p><form id="frm-edit-link" class="space-y-4"><input class="vl-input" name="title" value="'+esc(link.title)+'" required><input class="vl-input" name="url" value="'+esc(link.url)+'" required><button type="submit" class="vl-btn vl-btn-primary w-full justify-center">Save Changes</button><button type="button" class="vl-btn vl-btn-secondary w-full justify-center modal-cancel">Cancel</button></form>');
      setTimeout(function(){
        var fl=document.getElementById('frm-edit-link');
        if(fl){
          fl.addEventListener('submit',function(ev){
            ev.preventDefault();
            var fd=new FormData(fl);
            var newLinks=links.map(function(l){return l.id===lid?{id:lid,title:fd.get('title').trim(),url:fd.get('url').trim()}:l;});
            updateUser(user.id,{links:newLinks}).then(function(){closeModal();toast('Link updated!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
          });
        }
      },100);
    });
    return;
  }
  
  var delLink=e.target.closest('.do-del-link');
  if(delLink){
    e.preventDefault();
    e.stopPropagation();
    var lid2=delLink.getAttribute('data-lid');
    curUser().then(function(user){
      if(!user)return;
      var newLinks2=(user.links||[]).filter(function(l){return l.id!==lid2;});
      updateUser(user.id,{links:newLinks2}).then(function(){toast('Link removed.','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    });
    return;
  }
  
  var banBtn=e.target.closest('.do-ban');
  if(banBtn){
    e.preventDefault();
    e.stopPropagation();
    var uid=banBtn.getAttribute('data-uid');
    findById(uid).then(function(u){
      if(!u){toast('User not found.','error');return;}
      var newBanned=!u.banned;
      showModal('<h3 class="font-display font-bold text-xl mb-1">'+(newBanned?'Ban User':'Unban User')+'</h3><p class="text-void-100 text-sm mb-4">@'+esc(u.username)+'</p>'+(newBanned?'<textarea class="vl-input mb-4" id="ban-reason" placeholder="Reason for ban (optional)"></textarea>':'')+'<div class="flex gap-3"><button class="vl-btn '+(newBanned?'vl-btn-danger':'vl-btn-success')+' flex-1 modal-confirm-ban" data-uid="'+uid+'" data-ban="'+newBanned+'"><i class="fa-solid '+(newBanned?'fa-ban':'fa-unlock')+'"></i> '+(newBanned?'Ban':'Unban')+'</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>');
    });
    return;
  }
  
  var confirmBan=e.target.closest('.modal-confirm-ban');
  if(confirmBan){
    e.preventDefault();
    e.stopPropagation();
    var uidB=confirmBan.getAttribute('data-uid');
    var doBan=confirmBan.getAttribute('data-ban')==='true';
    var reason=document.getElementById('ban-reason')?document.getElementById('ban-reason').value.trim():'';
    updateUser(uidB,{banned:doBan,banReason:reason}).then(function(){closeModal();toast(doBan?'User banned.':'User unbanned.','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    return;
  }
  
  var uidBtn=e.target.closest('.do-uid');
  if(uidBtn){
    e.preventDefault();
    e.stopPropagation();
    var uid2=uidBtn.getAttribute('data-uid');
    findById(uid2).then(function(u){
      if(!u){toast('User not found.','error');return;}
      showModal('<h3 class="font-display font-bold text-xl mb-1">Change UID</h3><p class="text-void-100 text-sm mb-4">@'+esc(u.username)+' - Current: <code class="text-accent">'+u.uid+'</code></p><input class="vl-input mb-4" id="new-uid" placeholder="New UID (e.g. #123)" value="'+u.uid+'"><div class="flex gap-3"><button class="vl-btn vl-btn-primary flex-1 modal-confirm-uid" data-uid="'+uid2+'"><i class="fa-solid fa-check"></i> Update</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>');
    });
    return;
  }
  
  var confirmUid=e.target.closest('.modal-confirm-uid');
  if(confirmUid){
    e.preventDefault();
    e.stopPropagation();
    var uidU=confirmUid.getAttribute('data-uid');
    var newUid=document.getElementById('new-uid')?document.getElementById('new-uid').value.trim():'';
    if(!newUid){toast('UID required.','error');return;}
    updateUser(uidU,{uid:newUid}).then(function(){closeModal();toast('UID updated!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    return;
  }
  
  var badgeBtn=e.target.closest('.do-badges');
  if(badgeBtn){
    e.preventDefault();
    e.stopPropagation();
    var uid3=badgeBtn.getAttribute('data-uid');
    findById(uid3).then(function(u){
      if(!u){toast('User not found.','error');return;}
      var bh='<h3 class="font-display font-bold text-xl mb-1">Manage Badges</h3><p class="text-void-100 text-sm mb-4">@'+esc(u.username)+'</p><div class="space-y-2 mb-6">';
      for(var k in BADGES){
        var b=BADGES[k];
        var has=(u.badges||[]).indexOf(k)>-1;
        bh+='<label class="flex items-center gap-3 p-3 rounded-lg cursor-pointer hover:bg-white/5 transition"><input type="checkbox" class="badge-cb" data-badge="'+k+'" '+(has?'checked':'')+' style="width:18px;height:18px;accent-color:#7dd3fc"><span class="badge" style="background:'+b.c+'20;color:'+b.c+'"><i class="'+b.i+'" style="font-size:10px"></i></span><span class="text-sm">'+b.l+'</span></label>';
      }
      bh+='</div><div class="flex gap-3"><button class="vl-btn vl-btn-primary flex-1 modal-confirm-badges" data-uid="'+uid3+'"><i class="fa-solid fa-check"></i> Save Badges</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>';
      showModal(bh);
    });
    return;
  }
  
  var confirmBadges=e.target.closest('.modal-confirm-badges');
  if(confirmBadges){
    e.preventDefault();
    e.stopPropagation();
    var uidBd=confirmBadges.getAttribute('data-uid');
    var cbs=document.querySelectorAll('.badge-cb');
    var newBadges=[];
    cbs.forEach(function(cb){if(cb.checked)newBadges.push(cb.getAttribute('data-badge'));});
    updateUser(uidBd,{badges:newBadges}).then(function(){closeModal();toast('Badges updated!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    return;
  }
  
  var roleBtn=e.target.closest('.do-roles');
  if(roleBtn){
    e.preventDefault();
    e.stopPropagation();
    var uid4=roleBtn.getAttribute('data-uid');
    findById(uid4).then(function(u){
      if(!u){toast('User not found.','error');return;}
      var currentPerms=u.permissions||ROLE_PERMS[u.role]||ROLE_PERMS.user;
      var rh='<h3 class="font-display font-bold text-xl mb-1">Edit Role & Permissions</h3><p class="text-void-100 text-sm mb-4">@'+esc(u.username)+'</p><div class="mb-6"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Role</label><select id="role-select" class="vl-input">';
      ['user','moderator','admin'].forEach(function(r){rh+='<option value="'+r+'" '+(u.role===r?'selected':'')+'>'+r.charAt(0).toUpperCase()+r.slice(1)+'</option>';});
      rh+='</select></div><div class="mb-6"><label class="block text-xs font-semibold text-void-100 mb-3 uppercase tracking-wider">Permissions</label><div class="space-y-1">';
      for(var pk in PERM_LABELS){
        var isOn=!!currentPerms[pk];
        rh+='<div class="perm-row"><div><div class="text-sm font-medium">'+PERM_LABELS[pk]+'</div><div class="text-xs text-void-200">'+PERM_DESC[pk]+'</div></div><div class="perm-toggle '+(isOn?'on':'')+'" data-perm="'+pk+'"></div></div>';
      }
      rh+='</div></div><div class="flex gap-3"><button class="vl-btn vl-btn-primary flex-1 modal-confirm-role" data-uid="'+uid4+'"><i class="fa-solid fa-check"></i> Save</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>';
      showModal(rh);
      
      setTimeout(function(){
        document.querySelectorAll('.perm-toggle').forEach(function(t){
          t.addEventListener('click',function(ev){
            ev.preventDefault();
            ev.stopPropagation();
            t.classList.toggle('on');
          });
        });
      },100);
    });
    return;
  }
  
  var confirmRole=e.target.closest('.modal-confirm-role');
  if(confirmRole){
    e.preventDefault();
    e.stopPropagation();
    var uidR=confirmRole.getAttribute('data-uid');
    var roleSelect=document.getElementById('role-select');
    var role=roleSelect?roleSelect.value:'user';
    var newPerms={};
    document.querySelectorAll('.perm-toggle').forEach(function(t){
      newPerms[t.getAttribute('data-perm')]=t.classList.contains('on');
    });
    updateUser(uidR,{role:role,permissions:newPerms}).then(function(){closeModal();toast('Role & permissions updated!','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    return;
  }
  
  var delUser=e.target.closest('.do-adm-del');
  if(delUser){
    e.preventDefault();
    e.stopPropagation();
    var uid5=delUser.getAttribute('data-uid');
    findById(uid5).then(function(u){
      if(!u){toast('User not found.','error');return;}
      showModal('<h3 class="font-display font-bold text-xl mb-1">Delete User?</h3><p class="text-void-100 text-sm mb-6">Permanently delete @'+esc(u.username)+'? This cannot be undone.</p><div class="flex gap-3"><button class="vl-btn vl-btn-danger flex-1 modal-confirm-del-user" data-uid="'+uid5+'"><i class="fa-solid fa-trash"></i> Delete</button><button class="vl-btn vl-btn-secondary flex-1 modal-cancel">Cancel</button></div>');
    });
    return;
  }
  
  var confirmDelUser=e.target.closest('.modal-confirm-del-user');
  if(confirmDelUser){
    e.preventDefault();
    e.stopPropagation();
    var uidD=confirmDelUser.getAttribute('data-uid');
    deleteUser(uidD).then(function(){closeModal();toast('User deleted.','success');router();}).catch(function(ex){toast('Error: '+ex.message,'error');});
    return;
  }
  
});

// ==================== INITIALIZE ====================
initFirebase().then(function(){
  router();
  window.addEventListener('hashchange',router);
}).catch(function(err){
  var app=document.getElementById('app');
  if(app){
    app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center"><div style="width:64px;height:64px;border-radius:16px;background:rgba(255,45,45,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><i class="fa-solid fa-triangle-exclamation" style="font-size:28px;color:#ff5555"></i></div><h2 style="color:#e8e8e8;font-family:Space Grotesk,sans-serif;font-size:22px;margin-bottom:8px">Firebase Not Connected</h2><p style="color:#888;font-size:13px;margin-bottom:24px;line-height:1.6">Could not connect to Firestore. Check your Firebase config and make sure Firestore is created in <strong style="color:#e8e8e8">test mode</strong>.</p><div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;padding:16px;text-align:left;margin-bottom:20px;max-width:500px;margin-left:auto;margin-right:auto"><p style="color:#7dd3fc;font-size:12px;font-weight:600;margin-bottom:8px">ERROR DETAIL:</p><p style="color:#ff5555;font-size:12px;word-break:break-all">'+(err.message||String(err))+'</p></div></div>';
  }
});
</script>
</body>
</html>
