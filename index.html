function bH(k,sn){const b=B[k];if(!b)return'';return`<span class="badge btip" data-tip="${b.d}" style="background:${b.bg};color:${b.c};">${b.s}${sn?' '+b.n:''}</span>`}
function rT(r){return`<span class="rtag" style="background:${RB[r]};color:${RC[r]};">${r.toUpperCase()}</span>`}
function E(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function lI(u){if(!u)return'fa-solid fa-link';const l=u.toLowerCase();if(l.includes('github'))return'fa-brands fa-github';if(l.includes('twitter')||l.includes('x.com'))return'fa-brands fa-x-twitter';if(l.includes('discord'))return'fa-brands fa-discord';if(l.includes('youtube'))return'fa-brands fa-youtube';if(l.includes('twitch'))return'fa-brands fa-twitch';if(l.includes('spotify'))return'fa-brands fa-spotify';if(l.includes('instagram'))return'fa-brands fa-instagram';if(l.includes('tiktok'))return'fa-brands fa-tiktok';if(l.includes('reddit'))return'fa-brands fa-reddit';if(l.includes('steam'))return'fa-brands fa-steam';if(l.includes('telegram'))return'fa-brands fa-telegram';if(l.includes('linkedin'))return'fa-brands fa-linkedin';if(l.includes('paypal'))return'fa-brands fa-paypal';if(l.includes('ko-fi'))return'fa-solid fa-mug-hot';return'fa-solid fa-arrow-up-right-from-square'}

/* ===================== DATA LAYER ===================== */
const D={
  async gU(uid){try{const d=await db.collection('users').doc(uid).get();return d.exists?d.data():null}catch(e){console.error(e);return null}},
  async gUN(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();return s.empty?null:s.docs[0].data()}catch(e){console.error(e);return null}},
  async cU(uid,d){const u={uid,displayName:d.displayName||'',username:d.username||'',bio:'',avatar:'',links:[],badges:[],role:'user',banned:false,createdAt:Date.now(),views:0,themeColor:'#f472b6'};await db.collection('users').doc(uid).set(u);return u},
  async uU(uid,d){await db.collection('users').doc(uid).update(d);return this.gU(uid)},
  async dU(uid){await db.collection('users').doc(uid).delete()},
  async aU(){try{const s=await db.collection('users').get();return s.docs.map(d=>d.data())}catch(e){console.error(e);return[]}},
  async iV(un){try{const s=await db.collection('users').where('username','==',un).limit(1).get();if(!s.empty){const r=s.docs[0].ref;await db.runTransaction(async t=>{const d=await t.get(r);if(d.exists)t.update(r,{views:(d.data().views||0)+1})})}}catch(e){console.error(e)}}
};

/* ===================== AUTH ===================== */
async function doSignup(email,pw,name,un){
  if(!FB){toast('Authentication is not configured','er');return}
  if(await D.gUN(un)){toast('Username already taken','er');return}
  try{
    const cr=await auth.createUserWithEmailAndPassword(email,pw);
    await D.cU(cr.user.uid,{displayName:name,username:un});
    CU=await D.gU(cr.user.uid);
    toast('Account created successfully!','ok');nav('/dashboard');
  }catch(e){
    if(e.code==='auth/configuration-not-found'){toast('Email/Password sign-in is not enabled in Firebase Console','er');return}
    toast(e.message,'er');
  }
}
async function doLogin(email,pw){
  if(!FB){toast('Authentication is not configured','er');return}
  try{
    const cr=await auth.signInWithEmailAndPassword(email,pw);
    const u=await D.gU(cr.user.uid);
    if(u&&u.banned){auth.signOut();toast('This account has been banned','er');return}
    CU=u;toast('Welcome back!','ok');nav('/dashboard');
  }catch(e){
    if(e.code==='auth/configuration-not-found'){toast('Email/Password sign-in is not enabled in Firebase Console. Go to Firebase Console > Authentication > Sign-in method and enable Email/Password.','er');return}
    toast(e.message,'er');
  }
}
async function doLogout(){try{await auth.signOut()}catch(e){}CU=null;toast('Logged out','in');nav('/')}
async function restoreSess(){
  if(!FB)return;
  return new Promise(r=>{const u=auth.onAuthStateChanged(async us=>{u();if(us){CU=await D.gU(us.uid);if(CU&&CU.banned){await auth.signOut();CU=null}}r()})});
}

/* ===================== ROUTER (History API) ===================== */
function nav(path){window.history.pushState({},'',path);router()}

function getPath(){
  let p=window.location.pathname;
  if(p==='/'||!p)return '/';
  return p.startsWith('/')?p:'/'+p;
}

function isRoute(name){return getPath()===('/'+name)}

async function router(){
  const p=getPath();
  upNav();
  const a=document.getElementById('app');

  if(p==='/')a.innerHTML=pHome();
  else if(p==='/login')a.innerHTML=pLogin();
  else if(p==='/signup')a.innerHTML=pSignup();
  else if(p==='/redirect')a.innerHTML=pRedirect();
  else if(p==='/help')a.innerHTML=pHelp();
  else if(p==='/donate')a.innerHTML=pDonate();
  else if(p==='/dashboard'){if(!CU){nav('/login');return}a.innerHTML=pDash();iDash()}
  else if(p==='/admin'){if(!CU||RL[CU.role]<RL.moderator){toast('Access denied','er');nav('/');return}a.innerHTML=pAdmin();await rAC()}
  else{
    const un=p.startsWith('/')?p.slice(1):p;
    if(un&&!ROUTES.includes(un))await pBio(un);
    else a.innerHTML=p404();
  }
  window.scrollTo(0,0);
}

function upNav(){
  const e=document.getElementById('navA');
  if(CU){
    let ab='';if(RL[CU.role]>=RL.moderator)ab=`<span class="nl nh" onclick="nav('/admin')">Admin</span>`;
    e.innerHTML=`${ab}<span class="nl" onclick="nav('/dashboard')" style="color:var(--accent);font-weight:500">Dashboard</span><span class="nl" onclick="doLogout()">Logout</span><span class="btn-su" onclick="nav('/signup')" style="margin-left:4px">Sign Up Free</span>`;
  }else{
    e.innerHTML=`<span class="nl" onclick="nav('/login')">Login</span><span class="btn-su" onclick="nav('/signup')" style="margin-left:4px">Sign Up Free</span>`;
  }
}

function iBP(c){const cv=document.getElementById('bpC');if(!cv)return;const ctx=cv.getContext('2d');let w,h,ps=[];function rs(){w=cv.width=cv.parentElement.offsetWidth;h=cv.height=cv.parentElement.offsetHeight}rs();window.addEventListener('resize',rs);for(let i=0;i<45;i++)ps.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8+.4,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,o:Math.random()*.35+.08});function dr(){ctx.clearRect(0,0,w,h);ps.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.4,p.r),0,Math.PI*2);ctx.fillStyle=c;ctx.globalAlpha=p.o;ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(dr)}dr()}

</td><td><button onclick="aUA('${u.uid}')" class="bs bsm" style="padding:4px 10px;font-size:10px">Manage</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  else if(aT==='badges-mgmt'){
    el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:6px">Badge Manager</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">All available badges. Assign them through User Management.</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${Object.entries(B).map(([k,b])=>`<div class="card" style="padding:16px;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:10px;background:${b.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="width:26px;height:26px;display:flex">${b.s}</span></div><div><div style="font-weight:600;font-size:13px">${b.n}</div><div style="font-size:11px;color:var(--fg2)">${b.d}</div><div style="font-size:10px;color:var(--muted);margin-top:1px">ID: ${k}</div></div></div>`).join('')}</div>`;
  }
  else if(aT==='roles'){
    const ri=[{r:'owner',l:4,d:'Full access to everything. Can manage all users including other Owners.',c:RC.owner},{r:'manager',l:3,d:'Can manage Admins, Moderators, and Users. Cannot edit Owners.',c:RC.manager},{r:'admin',l:2,d:'Can manage Moderators and Users. Cannot edit Managers or Owners.',c:RC.admin},{r:'moderator',l:1,d:'Can manage regular Users only. Cannot edit any staff members.',c:RC.moderator},{r:'user',l:0,d:'Default role. No admin privileges.',c:RC.user}];
    el.innerHTML=`<h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:6px">Role Hierarchy</h2><p style="color:var(--fg2);font-size:13px;margin-bottom:20px">Higher roles can manage all roles below them. Lower roles cannot edit higher roles.</p><div style="display:flex;flex-direction:column;gap:10px;max-width:560px">${ri.map(x=>`<div class="card" style="padding:16px;display:flex;align-items:flex-start;gap:14px;border-left:3px solid ${x.c}"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">${rT(x.r)}<span style="font-size:10px;color:var(--muted)">Level ${x.l}</span></div><p style="font-size:12px;color:var(--fg2);line-height:1.5">${x.d}</p></div></div>`).join('')}</div>`;

play:flex;align-items:center;gap:7px">${bH(b)}</div><span style="font-size:13px;font-weight:600">${c}</span></div>`).join('')||'<p style="color:var(--muted);font-size:12px">No badges assigned yet.</p>'}</div></div>`;

/* ===================== ADMIN USER ACTIONS ===================== */
async function aUA(uid){
  const t=await D.gU(uid);if(!t){toast('User not found','er');return}
  const canE=RL[CU.role]>RL[t.role];const aks=Object.keys(B);
  const ubH=aks.map(k=>{const h=(t.badges||[]).includes(k);const b=B[k];return`<label style="display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;cursor:pointer;transition:background .2s;${h?'background:'+b.bg:''}" onmouseover="this.style.background=this.style.background||'var(--card2)'" onmouseout="this.style.background='${h?b.bg:'transparent'}'"><input type="checkbox" value="${k}" ${h?'checked':''} style="accent-color:var(--accent)"><span style="width:18px;height:18px;display:flex">${b.s}</span><span style="font-size:12px">${b.n}</span></label>`}).join('');
  const rO=Object.keys(RL).map(r=>`<option value="${r}" ${t.role===r?'selected':''} ${!canE&&RL[r]>RL[CU.role]?'disabled':''}>${r.charAt(0).toUpperCase()+r.slice(1)}${!canE&&RL[r]>RL[CU.role]?' (no permission)':''}</option>`).join('');
  showModal(`Manage @${t.username}`,`${!canE?`<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.18);border-radius:9px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--danger)"><i class="fa-solid fa-triangle-exclamation" style="margin-right:5px"></i>You cannot modify this user — their role is higher than or equal to yours.</div>`:''}<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px;background:var(--bg2);border-radius:10px"><div style="width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);flex-shrink:0">${t.avatar?`<img src="${t.avatar}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:16px">${(t.displayName||'?')[0].toUpperCase()}</div>`}</div><div><div style="font-weight:600;font-size:14px">${E(t.displayName||'Unnamed')}</div><div style="font-size:11px;color:var(--accent)">@${E(t.username)} · ${rT(t.role)}</div><div style="font-size:10px;color:var(--muted);margin-top:1px">UID: ${t.uid.substring(0,18)}...</div></div></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Username</label><div style="display:flex;gap:7px"><input id="aNU" class="ifield" type="text" placeholder="New username" value="${E(t.username)}" style="flex:1"><button class="bs bsm" onclick="aCU('${uid}')" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}>Update</button></div></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Change Role</label><select id="aNR" class="ifield" ${!canE?'disabled style="opacity:.35"':''}>${rO}</select></div><div style="margin-bottom:18px"><label style="font-size:11px;font-weight:600;color:var(--fg2);display:block;margin-bottom:5px">Manage Badges</label><div id="aBL" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;max-height:220px;overflow-y:auto;padding:3px">${ubH}</div></div><div style="border-top:1px solid var(--border);padding-top:18px"><label style="font-size:11px;font-weight:600;color:var(--danger);display:block;margin-bottom:9px">Danger Zone</label><div style="display:flex;gap:9px;flex-wrap:wrap"><button class="bd" onclick="aTB('${uid}',${!t.banned})" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-${t.banned?'unlock':'ban'}" style="margin-right:3px"></i>${t.banned?'Unban':'Ban'} User</button><button class="bd" onclick="aCD('${uid}','${E(t.displayName||t.username)}')" ${!canE?'disabled style="opacity:.35;cursor:not-allowed"':''}><i class="fa-solid fa-trash" style="margin-right:3px"></i>Delete Account</button></div></div>`,[{l:'Cancel',c:'bs',a:'clM()'},{l:'Save Changes',c:'bp',a:`aSU('${uid}')`,id:'aSB'}]);
  if(!canE){const b=document.getElementById('aSB');if(b){b.disabled=true;b.style.opacity='.35';b.style.cursor='not-allowed'}}
}

async function aSU(uid){const t=await D.gU(uid);if(!t||RL[CU.role]<=RL[t.role]){toast('Permission denied','er');return}const nr=document.getElementById('aNR').value;if(RL[nr]>RL[CU.role]){toast('Cannot assign a role higher than your own','er');return}const cbs=document.querySelectorAll('#aBL input[type="checkbox"]:checked');const nb=Array.from(cbs).map(c=>c.value);await D.uU(uid,{role:nr,badges:nb});toast('User updated successfully','ok');clM();await rAC()}
async function aCU(uid){const t=await D.gU(uid);if(!t||RL[CU.role]<=RL[t.role]){toast('Permission denied','er');return}const nu=document.getElementById('aNU').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');if(!nu||nu.length<3){toast('Username must be at least 3 characters','er');return}const ex=await D.gUN(nu);if(ex&&ex.uid!==uid){toast('Username already taken','er');return}await D.uU(uid,{username:nu});toast('Username changed to @'+nu,'ok');clM();await rAC()}
async function aTB(uid,ban){const t=await D.gU(uid);if(!t||RL[CU.role]<=RL[t.role]){toast('Permission denied','er');return}await D.uU(uid,{banned:ban});toast(ban?'User has been banned':'User has been unbanned',ban?'er':'ok');if(ban&&CU.uid===uid){doLogout();return}clM();await rAC()}
function aCD(uid,name){showModal('Confirm Deletion',`<div style="text-align:center;padding:8px 0"><i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:var(--danger);margin-bottom:14px"></i><p style="font-size:14px;margin-bottom:6px">Are you sure you want to delete <strong>${name}</strong>'s account?</p><p style="font-size:12px;color:var(--muted)">This action cannot be undone.</p></div>`,[{l:'Cancel',c:'bs',a:'clM()'},{l:'Delete Forever',c:'bd',a:`aDU('${uid})'`}])}
async function aDU(uid){const t=await D.gU(uid);if(!t||RL[CU.role]<=RL[t.role]){toast('Permission denied','er');return}await D.dU(uid);toast('Account has been deleted','er');if(uid===CU.uid){doLogout();return}clM();await rAC()}

/* ===================== BOOT ===================== */
(async function(){
  try{await restoreSess()}catch(e){console.error('Session error:',e);CU=null}
  const ls=document.getElementById('lds');

    const a=e.target.closest('a');
    if(a&&a.getAttribute('href')&&a.getAttribute('href').startsWith('/')&&!a.getAttribute('target')&&!a.getAttribute('rel')){
      e.preventDefault();nav(a.getAttribute('href'));
    }
  });
})();
</script>
