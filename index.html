var MUSIC_MAX_SIZE=10*1024*1024; /* 10MB */

function uploadMusicFile(file,userId){
  var progressDiv=document.getElementById('music-upload-progress');
  var progressBar=document.getElementById('music-upload-bar');
  var progressPct=document.getElementById('music-upload-pct');
  var progressName=document.getElementById('music-upload-name');
  var uploadBtn=document.querySelector('.do-upload-music');

  if(progressDiv)progressDiv.classList.remove('hidden');
  if(progressName)progressName.textContent=file.name;
  if(progressBar)progressBar.style.width='0%';
  if(progressPct)progressPct.textContent='0%';
  if(uploadBtn){uploadBtn.disabled=true;uploadBtn.style.opacity='0.5';}

  var storage=firebase.storage();
  var safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var ref=storage.ref('music/'+userId+'/'+Date.now()+'_'+safeName);
  var task=ref.put(file);

  task.on('state_changed',function(snapshot){
    var pct=(snapshot.bytesTransferred/snapshot.totalBytes)*100;
    if(progressBar)progressBar.style.width=pct+'%';
    if(progressPct)progressPct.textContent=Math.round(pct)+'%';
  },function(err){
    toast('Upload failed: '+err.message,'error');
    if(progressDiv)progressDiv.classList.add('hidden');
    if(uploadBtn){uploadBtn.disabled=false;uploadBtn.style.opacity='1';}
  },function(){
    task.snapshot.ref.getDownloadURL().then(function(url){
      var urlInp=document.getElementById('inp-music-url');
      var nameInp=document.getElementById('inp-music-name');
      if(urlInp)urlInp.value=url;
      if(nameInp)nameInp.value=file.name;

      var currentArea=document.getElementById('music-current-area');
      if(currentArea){
        currentArea.innerHTML='<div class="music-embed-wrap" style="padding:16px"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-lg bg-accent/10 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-music text-accent"></i></div><div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">'+esc(file.name)+'</div><div class="text-xs text-void-200">MP3 Audio</div></div></div><audio controls style="width:100%"><source src="'+url+'" type="audio/mpeg"></audio></div>';
      }

      var removeBtn=document.querySelector('.do-remove-music');
      if(removeBtn)removeBtn.style.display='';

      if(progressDiv)progressDiv.classList.add('hidden');
      if(uploadBtn){uploadBtn.disabled=false;uploadBtn.style.opacity='1';}
      toast('Music uploaded! Click Save to apply.','success');
    }).catch(function(err){
      toast('Failed to get download URL: '+err.message,'error');
      if(progressDiv)progressDiv.classList.add('hidden');
      if(uploadBtn){uploadBtn.disabled=false;uploadBtn.style.opacity='1';}
    });
  });
}

  if(badgeBtn){var uid=badgeBtn.getAttribute('data-uid');needAdmin().then(function(a){if(!a)return;findById(uid).then(function(tu){if(!tu)return;var h='<h3 class="font-display font-bold text-xl mb-4">Manage Badges</h3><p class="text-void-100 text-sm mb-4">'+esc(tu.displayName||tu.username)+'</p><div class="space-y-2 mb-6">';for(var k in BADGES){var b=BADGES[k];var has=(tu.badges||[]).indexOf(k)>-1;h+='<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer"><input type="checkbox" name="badge" value="'+k+'" '+(has?'checked':'')+' class="accent-sky-400"><i class="'+b.i+'" style="color:'+b.c+'"></i><span class="text-sm">'+b.l+'</span></label>';}h+='</div><div class="flex gap-2 justify-end"><button type="button" class="vl-btn vl-btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="vl-btn vl-btn-primary" id="do-save-badges-admin">Save</button></div>';showModal(h);document.getElementById('do-save-badges-admin').onclick=function(ev){ev.preventDefault();var cbs=document.querySelectorAll('input[name="badge"]:checked');var nb=[];for(var i=0;i<cbs.length;i++)nb.push(cbs[i].value);updateUser(uid,{badges:nb}).then(function(){closeModal();navigateTo('/admin');toast('Badges updated.','success');}).catch(function(er){toast('Error: '+er.message,'error');});};});});return;}

  var roleBtn=e.target.closest('.do-role');
  if(roleBtn){var uid=roleBtn.getAttribute('data-uid');needAdmin().then(function(a){if(!a)return;findById(uid).then(function(tu){if(!tu)return;showModal('<h3 class="font-display font-bold text-xl mb-4">Change Role</h3><p class="text-void-100 text-sm mb-4">'+esc(tu.displayName||tu.username)+' — <span class="text-accent capitalize">'+tu.role+'</span></p><form id="frm-role" class="space-y-4"><select class="vl-input" name="role"><option value="user" '+(tu.role==='user'?'selected':'')+'>User</option><option value="moderator" '+(tu.role==='moderator'?'selected':'')+'>Moderator</option><option value="admin" '+(tu.role==='admin'?'selected':'')+'>Admin</option></select><div class="flex gap-2 justify-end"><button type="button" class="vl-btn vl-btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="vl-btn vl-btn-primary">Save</button></div></form>');document.getElementById('frm-role').onsubmit=function(ev){ev.preventDefault();var fd=new FormData(this);var nr=fd.get('role');updateUser(uid,{role:nr,permissions:JSON.parse(JSON.stringify(ROLE_PERMS[nr]||ROLE_PERMS.user))}).then(function(){closeModal();navigateTo('/admin');toast('Role updated.','success');}).catch(function(er){toast('Error: '+er.message,'error');});};});});return;}

  var delUserBtn=e.target.closest('.do-del-user');
  if(delUserBtn){var uid=delUserBtn.getAttribute('data-uid');needAdmin().then(function(a){if(!a)return;showModal('<h3 class="font-display font-bold text-xl mb-2" style="color:#ff5555">Delete User</h3><p class="text-void-100 text-sm mb-6">Permanently delete this user?</p><div class="flex gap-2 justify-end"><button class="vl-btn vl-btn-secondary" onclick="closeModal()">Cancel</button><button class="do-confirm-del-user vl-btn vl-btn-danger" data-uid="'+uid+'">Delete</button></div>');document.querySelector('.do-confirm-del-user').onclick=function(){deleteUser(uid).then(function(){closeModal();navigateTo('/admin');toast('User deleted.','success');}).catch(function(er){toast('Error: '+er.message,'error');});};});return;}
});
