);navigateTo('/dashboard/badges');}).catch(function(err){errEl.textContent='Error: '+err.message;errEl.classList.remove('hidden');});});return;}var t=e.target.closest('.del-cbadge');if(t){e.preventDefault();var idx=parseInt(t.dataset.cidx);var customs=(u.customBadges||[]).slice();customs.splice(idx,1);updateUser(u.id,{customBadges:customs}).then(function(){toast('Custom badge removed','success');invalidateCache();navigateTo('/dashboard/badges');});return;}});}

function bindDashAppearance(u){var app=document.getElementById('app');if(!app)return;app.addEventListener('click',function(e){var t=e.target.closest('.bg-opt');if(t){e.preventDefault();updateUser(u.id,{background:t.dataset.bg}).then(function(){invalidateCache();navigateTo('/dashboard/appearance');});return;}var t=e.target.closest('.acc-opt');if(t){e.preventDefault();updateUser(u.id,{accentColor:t.dataset.acc}).then(function(){invalidateCache();navigateTo('/dashboard/appearance');});return;}var t=e.target.closest('.fx-opt');if(t){e.preventDefault();updateUser(u.id,{displayNameEffect:t.dataset.fx}).then(function(){invalidateCache();navigateTo('/dashboard/appearance');});return;}});var ca=document.getElementById('custom-acc');if(ca){var to;ca.addEventListener('input',function(e){clearTimeout(to);to=setTimeout(function(){updateUser(u.id,{accentColor:e.target.value}).catch(function(){});},400);});}var bi=document.getElementById('bg-img-input');if(bi){var to;bi.addEventListener('input',function(e){clearTimeout(to);to=setTimeout(function(){updateUser(u.id,{bgImage:e.target.value.trim()}).then(function(){invalidateCache();navigateTo('/dashboard/appearance');});},500);});}var bc=document.getElementById('bg-img-clear');if(bc){bc.addEventListener('click',function(e){e.preventDefault();updateUser(u.id,{bgImage:''}).then(function(){invalidateCache();navigateTo('/dashboard/appearance');});});}}

function bindDashSettings(u){var app=document.getElementById('app');if(!app)return;app.addEventListener('click',function(e){var t=e.target.closest('.connect-dc');if(t){e.preventDefault();startDiscordOAuth();return;}var t=e.target.closest('.disconnect-dc');if(t){e.preventDefault();showModal('<h3 class="font-display font-bold text-xl mb-2">Disconnect Discord?</h3><p class="text-void-100 text-sm mb-6">This will remove all Discord data from your profile.</p><div class="flex gap-3"><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-dc-disconnect"><i class="fa-solid fa-unlink"></i> Disconnect</button><button class="vl-btn vl-btn-secondary flex-1 justify-center modal-cancel">Cancel</button></div>');document.querySelector('.confirm-dc-disconnect').addEventListener('click',function(){updateUser(u.id,{discordId:'',discordUsername:'',discordAvatar:'',discordStatus:'offline',discordActivityType:'',discordActivityName:'',discordActivityDetails:'',discordActivityState:'',discordActivityImage:'',discordGuildName:'',discordPublicFlags:0}).then(function(){closeModal();toast('Discord disconnected','success');invalidateCache();navigateTo('/dashboard/settings');});});document.querySelector('.modal-cancel').addEventListener('click',function(){closeModal();});return;}var t=e.target.closest('.refresh-dc');if(t){e.preventDefault();t.disabled=true;t.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Refreshing...';refreshDiscordData(u).then(function(){toast('Discord data refreshed!','success');invalidateCache();navigateTo('/dashboard/settings');}).catch(function(err){toast('Failed to refresh: '+err.message,'error');t.disabled=false;t.innerHTML='<i class="fa-solid fa-rotate"></i> Refresh Data';});return;}var t=e.target.closest('.change-pw-btn');if(t){e.preventDefault();showModal('<h3 class="font-display font-bold text-xl mb-6">Change Password</h3><form id="frm-cpw"><div class="mb-4"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Current Password</label><input class="vl-input" name="current" type="password" required></div><div class="mb-4"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">New Password</label><input class="vl-input" name="newpw" type="password" required minlength="6"></div><div class="mb-4"><label class="block text-xs font-semibold text-void-100 mb-2 uppercase tracking-wider">Confirm New Password</label><input class="vl-input" name="confirmpw" type="password" required minlength="6"></div><div id="cpw-err" class="text-red-400 text-xs mb-4 hidden"></div><button type="submit" class="vl-btn vl-btn-primary w-full justify-center"><i class="fa-solid fa-check"></i> Update Password</button></form>');document.getElementById('frm-cpw').addEventListener('submit',function(me){me.preventDefault();var errEl=document.getElementById('cpw-err');errEl.classList.add('hidden');if(this.newpw.value!==this.confirmpw.value){errEl.textContent='Passwords do not match';errEl.classList.remove('hidden');return;}if(hashPw(this.current.value)!==u.password){errEl.textContent='Current password is incorrect';errEl.classList.remove('hidden');return;}updateUser(u.id,{password:hashPw(this.newpw.value)}).then(function(){closeModal();toast('Password updated!','success');}).catch(function(err){errEl.textContent='Error: '+err.message;errEl.classList.remove('hidden');});});return;}var t=e.target.closest('.del-acct-btn');if(t){e.preventDefault();showModal('<h3 class="font-display font-bold text-xl mb-2" style="color:#ff2d2d">Delete Account?</h3><p class="text-void-100 text-sm mb-6">This is permanent and cannot be undone.</p><div class="flex gap-3"><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-del"><i class="fa-solid fa-trash"></i> Delete Forever</button><button class="vl-btn vl-btn-secondary flex-1 justify-center modal-cancel">Cancel</button></div>');document.querySelector('.confirm-del').addEventListener('click',function(){deleteUser(u.id).then(function(){closeModal();clearSession();invalidateCache();navigateTo('/');toast('Account deleted','info');}).catch(function(err){toast('Error: '+err.message,'error');});});document.querySelector('.modal-cancel').addEventListener('click',function(){closeModal();});return;}});}

function bindLogin(){var frm=document.getElementById('frm-login');if(!frm)return;frm.addEventListener('submit',function(e){e.preventDefault();var btn=frm.querySelector('[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;var errEl=document.getElementById('login-err');errEl.classList.add('hidden');var id=frm.loginId.value.trim(),pw=frm.password.value;var promise=id.indexOf('@')>-1?findByEmail(id):findByUsername(id);promise.then(function(u){if(!u){errEl.textContent='Account not found';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}if(u.password!==hashPw(pw)){errEl.textContent='Incorrect password';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}if(u.banned&&!hasPerm(u,'bypass_ban')){errEl.textContent='Account banned: '+(u.banReason||'No reason');errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return;}setSession(u.id);closeModal();navigateTo('/dashboard');toast('Welcome back, '+(u.displayName||u.username)+'!','success');}).catch(function(err){errEl.textContent='Error: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;});});var app=document.getElementById('app');if(app)app.addEventListener('click',function(e){if(e.target.closest('.open-signup')){e.preventDefault();closeModal();showModal(signupHTML());bindSignup();}});}
function bindSignup(){var frm=document.getElementById('frm-signup');if(!frm)return;frm.addEventListener('submit',function(e){e.preventDefault();var btn=frm.querySelector('[type="submit"]');if(btn.dataset.submitting==='true')return;btn.dataset.submitting='true';btn.disabled=true;var errEl=document.getElementById('signup-err');errEl.classList.add('hidden');var username=frm.username.value.trim().toLowerCase(),email=frm.email.value.trim(),pw=frm.password.value,displayName=frm.displayName.value.trim()||username;Promise.all([findByUsername(username),findByEmail(email)]).then(function(r){if(r[0]){errEl.textContent='Username already taken';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return null;}if(r[1]){errEl.textContent='Email already registered';errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;return null;}return createUser({username:username,email:email,password:pw,displayName:displayName});}).then(function(u){if(!u)return;setSession(u.id);closeModal();navigateTo('/dashboard');toast('Welcome to Seashell, '+(u.displayName||u.username)+'!','success');}).catch(function(err){errEl.textContent='Error: '+err.message;errEl.classList.remove('hidden');btn.dataset.submitting='false';btn.disabled=false;});});var app=document.getElementById('app');if(app)app.addEventListener('click',function(e){if(e.target.closest('.open-login')){e.preventDefault();closeModal();showModal(loginHTML());bindLogin();}});}
</script>
</body>
