function bindSignup(){var form=document.getElementById('frm-signup');if(!form)return;form.addEventListener('submit',function(e){e.preventDefault();var errEl=document.getElementById('signup-err');if(errEl){errEl.classList.add('hidden');errEl.textContent='';}var username=form.username.value.trim().toLowerCase();var displayName=form.displayName.value.trim();var email=form.email.value.trim().toLowerCase();var pw=form.password.value;if(!username||!email||!pw){if(errEl){errEl.textContent='Please fill in all required fields.';errEl.classList.remove('hidden');}return;}if(!/^[a-z0-9_]{3,20}$/.test(username)){if(errEl){errEl.textContent='Username must be 3-20 characters (letters, numbers, underscores only).';errEl.classList.remove('hidden');}return;}findByUsername(username).then(function(existing){if(existing){if(errEl){errEl.textContent='Username is already taken.';errEl.classList.remove('hidden');}return null;}return findByEmail(email);}).then(function(existing){if(existing===null)return;if(existing){if(errEl){errEl.textContent='An account with this email already exists.';errEl.classList.remove('hidden');}return;}return createUser({username:username,displayName:displayName||username,email:email,password:pw});}).then(function(user){if(!user)return;setSession(user.id);closeModal();toast('Account created! Welcome to Seashell.','success');router();}).catch(function(err){if(errEl){errEl.textContent='Signup failed. Please try again.';errEl.classList.remove('hidden');}});});}

function bindDashboard(user){document.addEventListener('click',function handler(e){if(e.target.closest('.do-logout')){e.preventDefault();clearSession();toast('Logged out.','info');navigateTo('/');document.removeEventListener('click',handler);return;}var rmLink=e.target.closest('.rm-link');if(rmLink){e.preventDefault();var idx=parseInt(rmLink.dataset.idx);var links=(user.links||[]).slice();if(idx>=0&&idx<links.length){links.splice(idx,1);updateUser(user.id,{links:links}).then(function(){user.links=links;toast('Link removed.','success');router();}).catch(function(){toast('Failed to remove link.','error');});}document.removeEventListener('click',handler);return;}var rmBadge=e.target.closest('.rm-cbadge');if(rmBadge){e.preventDefault();var idx=parseInt(rmBadge.dataset.idx);var customs=(user.customBadges||[]).slice();if(idx>=0&&idx<customs.length){customs.splice(idx,1);updateUser(user.id,{customBadges:customs}).then(function(){user.customBadges=customs;toast('Custom badge removed.','success');router();}).catch(function(){toast('Failed to remove badge.','error');});}document.removeEventListener('click',handler);return;}var badgeToggle=e.target.closest('.perm-toggle[data-badge]');if(badgeToggle){var badgeKey=badgeToggle.dataset.badge;var hidden=(user.hiddenBadges||[]).slice();var idx=hidden.indexOf(badgeKey);if(idx>-1){hidden.splice(idx,1);}else{hidden.push(badgeKey);}updateUser(user.id,{hiddenBadges:hidden}).then(function(){user.hiddenBadges=hidden;router();}).catch(function(){});document.removeEventListener('click',handler);return;}var bgOpt=e.target.closest('.bg-opt');if(bgOpt){var bg=bgOpt.dataset.bg;updateUser(user.id,{background:bg}).then(function(){user.background=bg;router();}).catch(function(){toast('Failed to update background.','error');});document.removeEventListener('click',handler);return;}var fxOpt=e.target.closest('.fx-opt[data-fx]');if(fxOpt){var fx=fxOpt.dataset.fx;updateUser(user.id,{displayNameEffect:fx}).then(function(){user.displayNameEffect=fx;router();}).catch(function(){toast('Failed to update effect.','error');});document.removeEventListener('click',handler);return;}var accentPreset=e.target.closest('.accent-preset');if(accentPreset){var color=accentPreset.dataset.color;document.getElementById('accent-picker').value=color;updateUser(user.id,{accentColor:color}).then(function(){user.accentColor=color;router();}).catch(function(){toast('Failed to update accent color.','error');});document.removeEventListener('click',handler);return;}var saveApp=e.target.closest('.save-appearance');if(saveApp){var color=document.getElementById('accent-picker').value;var bgImg=document.getElementById('bg-image-input').value.trim();var data={accentColor:color,bgImage:bgImg};updateUser(user.id,data).then(function(){user.accentColor=color;user.bgImage=bgImg;toast('Appearance saved!','success');router();}).catch(function(){toast('Failed to save appearance.','error');});document.removeEventListener('click',handler);return;}var delAcc=e.target.closest('.del-account');if(delAcc){e.preventDefault();showModal('<h3 class="font-display font-bold text-xl mb-2 text-red-400">Delete Account?</h3><p class="text-void-100 text-sm mb-6">This action cannot be undone. All your data will be permanently deleted.</p><div class="flex gap-3"><button class="vl-btn vl-btn-secondary flex-1 justify-center cancel-del">Cancel</button><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-del"><i class="fa-solid fa-trash"></i> Delete</button></div>');document.querySelector('.cancel-del').addEventListener('click',closeModal);document.querySelector('.confirm-del').addEventListener('click',function(){deleteUser(user.id).then(function(){clearSession();closeModal();toast('Account deleted.','info');navigateTo('/');}).catch(function(){toast('Failed to delete account.','error');});});document.removeEventListener('click',handler);return;}});var frmProfile=document.getElementById('frm-profile');if(frmProfile){frmProfile.addEventListener('submit',function(e){e.preventDefault();var displayName=frmProfile.displayName.value.trim();var username=frmProfile.username.value.trim().toLowerCase();var bio=frmProfile.bio.value.trim();var avatar=frmProfile.avatar.value.trim();if(!username){toast('Username is required.','error');return;}if(!/^[a-z0-9_]{3,20}$/.test(username)){toast('Username must be 3-20 characters (letters, numbers, underscores only).','error');return;}var updateData={displayName:displayName,username:username,bio:bio,avatar:avatar};var usernameChanged=username!==user.username;var promise=Promise.resolve();if(usernameChanged){promise=findByUsername(username).then(function(existing){if(existing&&existing.id!==user.id){toast('Username is already taken.','error');throw new Error('taken');}});}promise.then(function(){return updateUser(user.id,updateData);}).then(function(){user.displayName=displayName;user.username=username;user.bio=bio;user.avatar=avatar;toast('Profile updated!','success');router();}).catch(function(err){if(err.message!=='taken')toast('Failed to update profile.','error');});});}var frmAddLink=document.getElementById('frm-add-link');if(frmAddLink){frmAddLink.addEventListener('submit',function(e){e.preventDefault();var maxLinks=hasPerm(user,'bypass_link_limit')?999:5;var links=(user.links||[]).slice();if(links.length>=maxLinks){toast('Link limit reached.','error');return;}var title=frmAddLink.title.value.trim();var url=frmAddLink.url.value.trim();if(!title||!url){toast('Please fill in all fields.','error');return;}links.push({title:title,url:url});updateUser(user.id,{links:links}).then(function(){user.links=links;toast('Link added!','success');router();}).catch(function(){toast('Failed to add link.','error');});});}var frmAddBadge=document.getElementById('frm-add-badge');if(frmAddBadge){frmAddBadge.addEventListener('submit',function(e){e.preventDefault();var label=frmAddBadge.label.value.trim();var color=frmAddBadge.color.value;var img=frmAddBadge.img.value.trim();if(!label){toast('Label is required.','error');return;}var customs=(user.customBadges||[]).slice();customs.push({id:'cb_'+Date.now(),l:label,c:color,img:img});updateUser(user.id,{customBadges:customs}).then(function(){user.customBadges=customs;toast('Custom badge added!','success');router();}).catch(function(){toast('Failed to add badge.','error');});});}var frmPw=document.getElementById('frm-pw');if(frmPw){frmPw.addEventListener('submit',function(e){e.preventDefault();var errEl=document.getElementById('pw-err');if(errEl){errEl.classList.add('hidden');errEl.textContent='';}var current=frmPw.current.value;var newPw=frmPw.newPw.value;var confirm=frmPw.confirm.value;if(!current||!newPw||!confirm){if(errEl){errEl.textContent='Please fill in all fields.';errEl.classList.remove('hidden');}return;}if(newPw!==confirm){if(errEl){errEl.textContent='New passwords do not match.';errEl.classList.remove('hidden');}return;}if(newPw.length<6){if(errEl){errEl.textContent='Password must be at least 6 characters.';errEl.classList.remove('hidden');}return;}if(user.password!==hashPw(current)){if(errEl){errEl.textContent='Current password is incorrect.';errEl.classList.remove('hidden');}return;}updateUser(user.id,{password:hashPw(newPw)}).then(function(){user.password=hashPw(newPw);toast('Password updated!','success');frmPw.reset();}).catch(function(){toast('Failed to update password.','error');});});}var copyUid=document.querySelector('.copy-uid');if(copyUid){copyUid.addEventListener('click',function(){navigator.clipboard.writeText(user.uid).then(function(){toast('UID copied!','success');}).catch(function(){toast('Failed to copy.','error');});});}}

function bindAdmin(user){var searchInput=document.getElementById('admin-search');var table=document.getElementById('admin-users-table');function loadUsers(filter){var filterLower=(filter||'').toLowerCase();getAllUsers().then(function(users){if(!table)return;var filtered=users.filter(function(u){if(!filterLower)return true;return u.username.toLowerCase().indexOf(filterLower)>-1||u.email.toLowerCase().indexOf(filterLower)>-1||u.uid.toLowerCase().indexOf(filterLower)>-1;});filtered.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});if(filtered.length===0){table.querySelector('tbody').innerHTML='<tr><td colspan="6" class="text-center text-void-200 py-8">No users found</td></tr>';return;}var html='';for(var i=0;i<filtered.length;i++){var u=filtered[i];var banBtn=u.banned?'<button class="unban-user vl-btn vl-btn-success vl-btn-sm" data-id="'+u.id+'">Unban</button>':'<button class="ban-user vl-btn vl-btn-danger vl-btn-sm" data-id="'+u.id+'">Ban</button>';var delBtn=hasPerm(user,'delete_users')?'<button class="del-user vl-btn vl-btn-danger vl-btn-sm" data-id="'+u.id+'"><i class="fa-solid fa-trash"></i></button>':'';html+='<tr><td><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-void-400 flex items-center justify-center text-xs font-bold">'+esc((u.displayName||u.username)[0].toUpperCase())+'</div><div><div class="font-medium text-sm">'+esc(u.displayName||u.username)+'</div><div class="text-xs text-void-200">@'+esc(u.username)+'</div></div></div></td><td class="font-mono text-xs text-void-100">'+u.uid+'</td><td><span class="text-xs font-semibold px-2 py-1 rounded-md '+(u.role==='admin'?'bg-red-500/10 text-red-400':u.role==='moderator'?'bg-yellow-500/10 text-yellow-400':'bg-void-300/10 text-void-100')+'">'+u.role+'</span></td><td class="text-void-100 text-sm">'+(u.views||0).toLocaleString()+'</td><td>'+(u.banned?'<span class="text-xs font-semibold text-red-400">Banned</span>':'<span class="text-xs font-semibold text-success">Active</span>')+'</td><td><div class="flex gap-2">'+banBtn+delBtn+'</div></td></tr>';}table.querySelector('tbody').innerHTML=html;});}if(searchInput){var timeout;searchInput.addEventListener('input',function(){clearTimeout(timeout);timeout=setTimeout(function(){loadUsers(searchInput.value);},300);});}loadUsers('');document.addEventListener('click',function handler(e){var banBtn=e.target.closest('.ban-user');if(banBtn){e.preventDefault();var id=banBtn.dataset.id;showModal('<h3 class="font-display font-bold text-xl mb-2">Ban User</h3><p class="text-void-100 text-sm mb-4">Enter a reason for banning this user:</p><input class="vl-input mb-4" id="ban-reason" placeholder="Reason for ban..."><div class="flex gap-3"><button class="vl-btn vl-btn-secondary flex-1 justify-center cancel-ban">Cancel</button><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-ban" data-id="'+id+'"><i class="fa-solid fa-gavel"></i> Ban</button></div>');document.querySelector('.cancel-ban').addEventListener('click',closeModal);document.querySelector('.confirm-ban').addEventListener('click',function(){var reason=document.getElementById('ban-reason').value.trim();updateUser(id,{banned:true,banReason:reason}).then(function(){closeModal();toast('User banned.','success');loadUsers(searchInput?searchInput.value:'');}).catch(function(){toast('Failed to ban user.','error');});});document.removeEventListener('click',handler);return;}var unbanBtn=e.target.closest('.unban-user');if(unbanBtn){e.preventDefault();var id=unbanBtn.dataset.id;updateUser(id,{banned:false,banReason:''}).then(function(){toast('User unbanned.','success');loadUsers(searchInput?searchInput.value:'');}).catch(function(){toast('Failed to unban user.','error');});document.removeEventListener('click',handler);return;}var delBtn=e.target.closest('.del-user');if(delBtn){e.preventDefault();var id=delBtn.dataset.id;showModal('<h3 class="font-display font-bold text-xl mb-2 text-red-400">Delete User?</h3><p class="text-void-100 text-sm mb-6">This will permanently delete this user and all their data.</p><div class="flex gap-3"><button class="vl-btn vl-btn-secondary flex-1 justify-center cancel-del">Cancel</button><button class="vl-btn vl-btn-danger flex-1 justify-center confirm-del" data-id="'+id+'"><i class="fa-solid fa-trash"></i> Delete</button></div>');document.querySelector('.cancel-del').addEventListener('click',closeModal);document.querySelector('.confirm-del').addEventListener('click',function(){deleteUser(id).then(function(){closeModal();toast('User deleted.','success');loadUsers(searchInput?searchInput.value:'');}).catch(function(){toast('Failed to delete user.','error');});});document.removeEventListener('click',handler);return;}});}
